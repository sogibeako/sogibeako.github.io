<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多言語タイピングメモ (Multi-Keyboard Notepad)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Multi-Keyboard Notepad</h1>
      <div class="controls">
        <select id="lang-selector">
          <option value="ko">韓国語 (Korean)</option>
          <option value="ru">ロシア語 (Russian)</option>
          <option value="el">ギリシャ語 (Greek)</option>
          <option value="grc">古代ギリシャ語 (Polytonic Greek)</option>
          <option value="grcLatn">古代ギリシャ語・ラテン転写</option>
          <option value="vi">ベトナム語 (Vietnamese Telex)</option>
        </select>
        <button id="copy-btn" class="primary">コピー</button>
      </div>
    </header>

    <div class="notepad-area">
      <textarea id="editor" autocomplete="off" spellcheck="false" placeholder="ここに入力してください..."></textarea>
      <div id="copy-toast" class="toast">コピーしました！</div>
    </div>

    <p id="input-guide" class="input-guide" aria-live="polite"></p>

    <!-- On-Screen Keyboard -->
    <div class="keyboard" id="keyboard">
      <!-- Generated by JS -->
    </div>
  </div>

  <script src="keyboard_layouts.js"></script>
  <script src="ime.js"></script>
  <script src="app.js"></script>
</body>
</html>
