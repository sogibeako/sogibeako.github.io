    function AutoBounds(values) {
      const finite = values.filter(Number.isFinite);
      if (!finite.length) return { min: -1, max: 1 };
      let min = Math.min(...finite);
      let max = Math.max(...finite);
      if (Math.abs(max - min) < 1e-12) {
        min -= 1;
        max += 1;
      }
      const pad = (max - min) * 0.08;
      return { min: min - pad, max: max + pad };
    }

    function SimpleLineChart({ data, lines, xKey, height = 360 }) {
      const width = 900;
      const m = { top: 20, right: 20, bottom: 32, left: 56 };
      const innerW = width - m.left - m.right;
      const innerH = height - m.top - m.bottom;
      const xs = data.map(d => d[xKey]);
      const ys = [];
      lines.forEach(line => data.forEach(d => ys.push(d[line.key])));
      const xMin = Math.min(...xs, 0), xMax = Math.max(...xs, 1);
      const { min: yMin, max: yMax } = AutoBounds(ys);
      const xScale = x => m.left + ((x - xMin) / Math.max(1e-12, xMax - xMin)) * innerW;
      const yScale = y => m.top + innerH - ((y - yMin) / Math.max(1e-12, yMax - yMin)) * innerH;
      const gridYs = 5;
      const gridXs = 6;
      return (
        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full bg-slate-950 rounded-xl">
          {Array.from({ length: gridYs + 1 }, (_, i) => {
            const y = m.top + innerH * (i / gridYs);
            const val = yMax - (yMax - yMin) * (i / gridYs);
            return <g key={`gy-${i}`}>
              <line x1={m.left} y1={y} x2={m.left + innerW} y2={y} stroke="#243041" strokeWidth="1" />
              <text x={m.left - 8} y={y + 4} textAnchor="end" fontSize="11" fill="#cbd5e1">{formatNum(val, 4)}</text>
            </g>;
          })}
          {Array.from({ length: gridXs + 1 }, (_, i) => {
            const x = m.left + innerW * (i / gridXs);
            const val = xMin + (xMax - xMin) * (i / gridXs);
            return <g key={`gx-${i}`}>
              <line x1={x} y1={m.top} x2={x} y2={m.top + innerH} stroke="#243041" strokeWidth="1" />
              <text x={x} y={height - 8} textAnchor="middle" fontSize="11" fill="#cbd5e1">{formatNum(val, 4)}</text>
            </g>;
          })}
          <rect x={m.left} y={m.top} width={innerW} height={innerH} fill="none" stroke="#334155" strokeWidth="1" />
          {lines.map((line, idx) => {
            const path = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(d[xKey])} ${yScale(d[line.key])}`).join(' ');
            return <g key={line.key}>
              <path d={path} fill="none" stroke={line.color} strokeWidth="2" />
              <g transform={`translate(${m.left + 12 + idx * 170}, ${m.top + 12})`}>
                <line x1="0" y1="0" x2="18" y2="0" stroke={line.color} strokeWidth="2" />
                <text x="24" y="4" fontSize="12" fill="#e2e8f0">{line.label}</text>
              </g>
            </g>;
          })}
        </svg>
      );
    }

    function clamp(x, a, b) {
      return Math.max(a, Math.min(b, x));
    }

    function formatNum(x, digits = 10) {
      if (x == null || !Number.isFinite(x)) return "—";
      if (Math.abs(x) < 1e-12) return "0";
      return Number(x).toPrecision(digits).replace(/\.0+$/, '').replace(/(\.[0-9]*?)0+$/, '$1');
    }

    function rationalApprox(x, maxDen = 1024, relTol = 1e-9) {
      if (x == null || !Number.isFinite(x)) return null;
      if (Math.abs(x) < 1e-12) return "0";
      if (Math.abs(x - Math.round(x)) <= relTol * Math.max(1, Math.abs(x))) return `${Math.round(x)}`;

      const sign = x < 0 ? -1 : 1;
      let v = Math.abs(x);
      let h1 = 1, h0 = 0, k1 = 0, k0 = 1;
      let iter = 0;

      while (iter++ < 32) {
        const a = Math.floor(v);
        const h2 = a * h1 + h0;
        const k2 = a * k1 + k0;
        if (k2 > maxDen) break;
        h0 = h1; h1 = h2;
        k0 = k1; k1 = k2;
        const frac = v - a;
        if (frac < 1e-14) break;
        v = 1 / frac;
      }

      let num = sign * h1;
      let den = k1;
      if (!den) return null;

      const approx = num / den;
      const err = Math.abs(x - approx);
      const scale = Math.max(1, Math.abs(x));
      if (err > relTol * scale) return null;
      if (den === 1) return `${num}`;
      return `${num}/${den}`;
    }

    function approxRationalLabel(x) {
      const rational = rationalApprox(x);
      if (x == null || !Number.isFinite(x)) return null;
      if (!rational || rational === "0" || rational === `${Math.round(x)}`) return null;
      return rational;
    }

    function mean(arr) {
      if (!arr.length) return 0;
      let s = 0;
      for (const x of arr) s += x;
      return s / arr.length;
    }

    function rms(arr) {
      if (!arr.length) return 0;
      let s = 0;
      for (const x of arr) s += x * x;
      return Math.sqrt(s / arr.length);
    }

    function variance(arr) {
      if (arr.length < 2) return 0;
      const m = mean(arr);
      let s = 0;
      for (const x of arr) s += (x - m) * (x - m);
      return s / arr.length;
    }

    function parseParams(text) {
      const out = {};
      const trimmed = text.trim();
      if (!trimmed) return out;
      const parts = trimmed.split(/[,\n;]/).map(s => s.trim()).filter(Boolean);
      for (const part of parts) {
        const m = part.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.+)$/);
        if (!m) throw new Error(`Invalid parameter entry: ${part}`);
        const key = m[1];
        const value = Number(m[2]);
        if (!Number.isFinite(value)) throw new Error(`Invalid numeric value for ${key}`);
        out[key] = value;
      }
      return out;
    }

    function extractIdentifiers(expr) {
      const matches = expr.match(/[A-Za-z_][A-Za-z0-9_]*/g) || [];
      return [...new Set(matches)];
    }

    function sanitizeExpression(expr) {
      return expr.replace(/\*\*/g, "^").replace(/\^/g, "**");
    }

    function buildEvaluator(expr, params) {
      const identifiers = extractIdentifiers(expr);
      const allowed = new Set([
        "n", "floor", "ceil", "round", "sqrt", "log", "sin", "cos", "tan", "abs", "pow",
        "pi", "e", ...Object.keys(params)
      ]);
      for (const id of identifiers) {
        if (!allowed.has(id)) throw new Error(`Unknown identifier: ${id}`);
      }

      const safeExpr = sanitizeExpression(expr);
      const argNames = ["n", ...Object.keys(params)];
      const body = `
        const floor=Math.floor, ceil=Math.ceil, round=Math.round, sqrt=Math.sqrt,
              log=Math.log, sin=Math.sin, cos=Math.cos, tan=Math.tan, abs=Math.abs,
              pow=Math.pow, pi=Math.PI, e=Math.E;
        return (${safeExpr});
      `;
      const fn = new Function(...argNames, body);
      return (n) => {
        const args = [n, ...Object.keys(params).map(k => params[k])];
        const y = fn(...args);
        if (typeof y !== "number" || !Number.isFinite(y)) {
          throw new Error(`Expression produced non-finite value at n=${n}`);
        }
        return y;
      };
    }

    function generateSequence(expr, params, Nmax) {
      const evalFn = buildEvaluator(expr, params);
      const seq = new Float64Array(Nmax);
      for (let n = 1; n <= Nmax; n++) seq[n - 1] = evalFn(n);
      return seq;
    }

    function solveLinearSystem(A, b) {
      const n = A.length;
      const M = A.map((row, i) => [...row, b[i]]);
      for (let col = 0; col < n; col++) {
        let pivot = col;
        for (let r = col + 1; r < n; r++) {
          if (Math.abs(M[r][col]) > Math.abs(M[pivot][col])) pivot = r;
        }
        if (Math.abs(M[pivot][col]) < 1e-14) throw new Error("Singular matrix");
        [M[col], M[pivot]] = [M[pivot], M[col]];
        const div = M[col][col];
        for (let j = col; j <= n; j++) M[col][j] /= div;
        for (let r = 0; r < n; r++) {
          if (r === col) continue;
          const factor = M[r][col];
          for (let j = col; j <= n; j++) M[r][j] -= factor * M[col][j];
        }
      }
      return M.map(row => row[n]);
    }

    function matMulAtA(X) {
      const p = X[0].length;
      const out = Array.from({ length: p }, () => Array(p).fill(0));
      for (let i = 0; i < X.length; i++) {
        for (let a = 0; a < p; a++) {
          for (let b = 0; b < p; b++) out[a][b] += X[i][a] * X[i][b];
        }
      }
      return out;
    }

    function matMulAtY(X, y) {
      const p = X[0].length;
      const out = Array(p).fill(0);
      for (let i = 0; i < X.length; i++) {
        for (let a = 0; a < p; a++) out[a] += X[i][a] * y[i];
      }
      return out;
    }

    function estimateConditionNumberGram(G) {
      let maxRow = 0;
      let minDiag = Infinity;
      let maxDiag = 0;
      for (let i = 0; i < G.length; i++) {
        let rs = 0;
        for (let j = 0; j < G.length; j++) rs += Math.abs(G[i][j]);
        maxRow = Math.max(maxRow, rs);
        minDiag = Math.min(minDiag, Math.abs(G[i][i]));
        maxDiag = Math.max(maxDiag, Math.abs(G[i][i]));
      }
      if (minDiag < 1e-20) return Infinity;
      return (maxRow || 1) * (maxDiag / minDiag);
    }

    function leastSquares(X, y) {
      const G = matMulAtA(X);
      const rhs = matMulAtY(X, y);
      const coeffs = solveLinearSystem(G, rhs);
      const fitted = X.map(row => row.reduce((s, v, i) => s + v * coeffs[i], 0));
      const residuals = fitted.map((v, i) => y[i] - v);
      const rss = residuals.reduce((s, v) => s + v * v, 0);
      return {
        coeffs,
        fitted,
        residuals,
        rss,
        rms: Math.sqrt(rss / Math.max(1, y.length)),
        conditionNumber: estimateConditionNumberGram(G)
      };
    }

    function leastSquaresScaled(X, y, weights = null) {
      const rows = X.length;
      const cols = X[0]?.length ?? 0;
      if (!rows || !cols) throw new Error('Empty design matrix');
      const w = weights && weights.length === rows ? weights.map(v => Math.max(1e-12, v)) : Array(rows).fill(1);
      const colScales = Array(cols).fill(0);
      const Xw = X.map((row, i) => {
        const sw = Math.sqrt(w[i]);
        return row.map((v, j) => {
          const vv = v * sw;
          colScales[j] = Math.max(colScales[j], Math.abs(vv));
          return vv;
        });
      });
      for (let j = 0; j < cols; j++) colScales[j] = Math.max(colScales[j], 1e-12);
      const Xn = Xw.map(row => row.map((v, j) => v / colScales[j]));
      const yw = y.map((v, i) => v * Math.sqrt(w[i]));
      const fit = leastSquares(Xn, yw);
      const coeffs = fit.coeffs.map((c, j) => c / colScales[j]);
      const fitted = X.map(row => row.reduce((s, v, i) => s + v * coeffs[i], 0));
      const residuals = fitted.map((v, i) => y[i] - v);
      const rss = residuals.reduce((s, v, i) => s + w[i] * v * v, 0);
      return {
        coeffs,
        fitted,
        residuals,
        rss,
        rms: Math.sqrt(rss / Math.max(1, y.length)),
        conditionNumber: fit.conditionNumber,
        columnScales: colScales
      };
    }

    function median(arr) {
      if (!arr.length) return null;
      const s = [...arr].sort((a, b) => a - b);
      const m = Math.floor(s.length / 2);
      return s.length % 2 ? s[m] : 0.5 * (s[m - 1] + s[m]);
    }

    function mad(arr, center = null) {
      if (!arr.length) return 0;
      const c = center == null ? median(arr) : center;
      return median(arr.map(v => Math.abs(v - c))) ?? 0;
    }

    function fitPolynomial(ns, ys, degree) {
      const X = ns.map(n => {
        const row = [];
        for (let k = 0; k <= degree; k++) row.push(n ** k);
        return row;
      });
      return leastSquares(X, ys);
    }

    function detectQuasiPolynomial(sequence, options = {}) {
      const N = sequence.length;
      const Nfit = Math.min(options.N_fit ?? Math.min(N, 2048), N);
      const mMax = options.m_max ?? 12;
      const dMax = options.d_max ?? 4;
      const threshold = options.residualThreshold ?? 1e-6;
      const slice = Array.from(sequence.slice(0, Nfit));
      let best = null;

      for (let m = 1; m <= Math.min(mMax, Nfit); m++) {
        for (let d = 0; d <= dMax; d++) {
          let rss = 0;
          let totalCount = 0;
          const coefficients = Array.from({ length: m }, () => Array(d + 1).fill(0));
          let failed = false;
          for (let r = 0; r < m; r++) {
            const ns = [];
            const ys = [];
            for (let idx = 0; idx < Nfit; idx++) {
              const n = idx + 1;
              if (n % m === r) {
                ns.push(n);
                ys.push(slice[idx]);
              }
            }
            if (ns.length < d + 1) {
              failed = true;
              break;
            }
            try {
              const fit = fitPolynomial(ns, ys, d);
              rss += fit.rss;
              totalCount += ys.length;
              coefficients[r] = fit.coeffs;
            } catch {
              failed = true;
              break;
            }
          }
          if (failed) continue;
          const aic = Nfit * Math.log(Math.max(rss / Math.max(1, totalCount), 1e-30)) + 2 * (m * (d + 1));
          const residualRMS = Math.sqrt(rss / Math.max(1, totalCount));
          const candidate = { period: m, degree: d, coefficients, residualRMS, aic };
          if (!best || aic < best.aic - 1e-9 || (Math.abs(aic - best.aic) < 1e-9 && (m < best.period || (m === best.period && d < best.degree)))) {
            best = candidate;
          }
        }
      }

      if (!best) return { type: "none", confidence: "poor", notes: ["no quasi-polynomial candidate"] };

      const skeleton = new Float64Array(N);
      for (let n = 1; n <= N; n++) {
        const r = n % best.period;
        let v = 0;
        for (let k = 0; k <= best.degree; k++) v += best.coefficients[r][k] * (n ** k);
        skeleton[n - 1] = v;
      }
      const residual = new Float64Array(N);
      for (let i = 0; i < N; i++) residual[i] = sequence[i] - skeleton[i];
      const rmsAll = Math.sqrt(Array.from(residual).reduce((s, x) => s + x * x, 0) / N);
      const accepted = best.residualRMS <= threshold;
      return {
        type: accepted ? "quasiPolynomial" : "quasiPolynomialCandidate",
        confidence: accepted ? (best.residualRMS < threshold * 0.1 ? "good" : "uncertain") : "poor",
        period: best.period,
        degree: best.degree,
        coefficients: best.coefficients,
        skeleton,
        residual,
        residualRMS: rmsAll,
        fitResidualRMS: best.residualRMS,
        notes: [accepted
          ? `quasi-polynomial detected: period=${best.period}, degree=${best.degree}`
          : `quasi-polynomial candidate: period=${best.period}, degree=${best.degree}, fitRMS=${best.residualRMS}`]
      };
    }

    function detectPowerLaw(sequence, options = {}) {
      const N = sequence.length;
      const Nfit = Math.min(options.N_fit ?? Math.min(N, 2048), N);
      
      let residualSeq = Float64Array.from(sequence);
      const components = [];
      const skeleton = new Float64Array(N);
      
      const maxComponents = options.maxPowerComponents ?? 3;
      let lastRms = Infinity;
      const scale = Math.max(1e-12, rms(Array.from(sequence.slice(0, Nfit))));
      const notes = [];

      for (let comp = 0; comp < maxComponents; comp++) {
        let posCount = 0, negCount = 0;
        for (let n = Math.floor(Nfit / 2); n <= Nfit; n++) {
          if (residualSeq[n - 1] > 0) posCount++;
          else if (residualSeq[n - 1] < 0) negCount++;
        }
        const sign = posCount >= negCount ? 1 : -1;

        const xs = [];
        const ys = [];
        for (let n = 1; n <= Nfit; n++) {
          const a = sign * residualSeq[n - 1];
          // We only take log of significantly positive values
          if (a > scale * 1e-14) {
            xs.push(Math.log(n));
            ys.push(Math.log(a));
          }
        }

        // If too many points are invalid (e.g. oscillating or zero), stop peeling
        if (xs.length < Nfit * 0.5) {
          if (comp === 0) return { type: "none", confidence: "poor", notes: ["power-law skipped: non-positive or oscillating values present"] };
          notes.push(`peeling stopped: residual sign flips too much or is near zero`);
          break;
        }

        const mx = mean(xs), my = mean(ys);
        let num = 0, den = 0;
        for (let i = 0; i < xs.length; i++) {
          num += (xs[i] - mx) * (ys[i] - my);
          den += (xs[i] - mx) * (xs[i] - mx);
        }
        let alpha = num / den;
        let c = sign * Math.exp(my - alpha * mx);

        for (let iter = 0; iter < 5; iter++) {
          let j11 = 0, j12 = 0, j22 = 0, b1 = 0, b2 = 0;
          for (let n = 1; n <= Nfit; n++) {
            const na = n ** alpha;
            const pred = c * na;
            const r = residualSeq[n - 1] - pred;
            const dc = na;
            const da = c * na * Math.log(n);
            j11 += dc * dc;
            j12 += dc * da;
            j22 += da * da;
            b1 += dc * r;
            b2 += da * r;
          }
          const det = j11 * j22 - j12 * j12;
          if (Math.abs(det) < 1e-25) break;
          const dcStep = (b1 * j22 - b2 * j12) / det;
          const daStep = (j11 * b2 - j12 * b1) / det;
          c += dcStep;
          alpha += daStep;
        }

        const rounded = Math.round(alpha);
        if (Math.abs(alpha - rounded) < 0.01) {
          if (comp === 0) return { type: "none", confidence: "poor", notes: [`power-law near integer exponent ${alpha}, defer to quasi-polynomial`] };
          notes.push(`peeling stopped: near-integer exponent ${alpha}`);
          break;
        }

        // We expect subsequent components to have smaller exponents
        if (comp > 0 && alpha >= components[comp - 1].exponent - 0.02) {
          notes.push(`peeling stopped: exponent did not decrease meaningfully (${alpha.toFixed(3)} >= ${components[comp-1].exponent.toFixed(3)})`);
          break; 
        }

        components.push({ exponent: alpha, coefficient: 0 }); // placeholder

        // Global linear least squares for all detected components so far to avoid residual leakage
        const X = [];
        const y = Array.from(sequence.slice(0, Nfit));
        for (let n = 1; n <= Nfit; n++) {
          X.push(components.map(c => n ** c.exponent));
        }
        const fitParams = leastSquares(X, y);

        let newResidualSq = 0;
        for (let n = 1; n <= N; n++) {
          let v = 0;
          for (let i = 0; i < components.length; i++) {
            components[i].coefficient = fitParams.coeffs[i];
            v += fitParams.coeffs[i] * (n ** components[i].exponent);
          }
          residualSeq[n - 1] = sequence[n - 1] - v;
          if (n <= Nfit) newResidualSq += residualSeq[n - 1] * residualSeq[n - 1];
        }
        const newResidualRMS = Math.sqrt(newResidualSq / Nfit);

        if (comp > 0 && newResidualRMS > lastRms * 0.999) {
          notes.push(`peeling stopped: no RMS improvement from term ${alpha.toFixed(3)}`);
          components.pop();
          // Restore previous residual (approximated by breaking)
          break;
        }

        lastRms = newResidualRMS;

        if (newResidualRMS / scale < 1e-6) {
          notes.push(`peeling converged cleanly`);
          break;
        }
      }

      // If sequential peeling failed to find a good fit, attempt a joint 2-component damped Gauss-Newton fit
      if (components.length === 1 && lastRms / scale > 5e-5) {
        let a1 = components[0].exponent + 0.05;
        let a2 = components[0].exponent - 0.05;
        let c1 = components[0].coefficient / 2;
        let c2 = components[0].coefficient / 2;
        let converged = false;

        for (let iter = 0; iter < 40; iter++) {
          const J = [];
          const r = [];
          for (let n = 1; n <= Nfit; n++) {
            const n_a1 = n ** a1;
            const n_a2 = n ** a2;
            const logn = Math.log(n);
            const pred = c1 * n_a1 + c2 * n_a2;
            r.push(sequence[n - 1] - pred);
            J.push([n_a1, c1 * n_a1 * logn, n_a2, c2 * n_a2 * logn]);
          }
          try {
            const step = leastSquares(J, r).coeffs;
            if (!Number.isFinite(step[0])) break;
            const lr = 0.35; // Damping factor for stability
            c1 += step[0] * lr;
            a1 += step[1] * lr;
            c2 += step[2] * lr;
            a2 += step[3] * lr;
            if (Math.abs(step[1] * lr) < 1e-6 && Math.abs(step[3] * lr) < 1e-6) {
              converged = true;
              break;
            }
          } catch {
            break; // singular
          }
        }

        if (Math.abs(a1 - a2) > 0.01 && c1 > 0 && c2 > 0) {
          let newResidualSq = 0;
          for (let n = 1; n <= Nfit; n++) {
            const err = sequence[n - 1] - (c1 * (n ** a1) + c2 * (n ** a2));
            newResidualSq += err * err;
          }
          const gnRms = Math.sqrt(newResidualSq / Nfit);
          if (gnRms < lastRms && (gnRms / scale) < 5e-3) {
            components.length = 0;
            // Sort by exponent descending
            if (a1 < a2) { [a1, a2] = [a2, a1]; [c1, c2] = [c2, c1]; }
            components.push({ exponent: a1, coefficient: c1 });
            components.push({ exponent: a2, coefficient: c2 });
            notes.push(`joint 2-component GN fit succeeded: α1=${a1.toFixed(4)}, α2=${a2.toFixed(4)}`);
            lastRms = gnRms;
          }
        }
      }

      if (components.length === 0) {
        return { type: "none", confidence: "poor", notes: ["power-law peeling failed"] };
      }

      const finalResidual = new Float64Array(N);
      let headResSq = 0;
      for (let n = 1; n <= N; n++) {
        let v = 0;
        for (const comp of components) v += comp.coefficient * (n ** comp.exponent);
        skeleton[n - 1] = v;
        finalResidual[n - 1] = sequence[n - 1] - v;
        if (n <= Nfit) headResSq += finalResidual[n - 1] * finalResidual[n - 1];
      }
      const finalResidualRMS = Math.sqrt(headResSq / Nfit);

      if (finalResidualRMS / scale > 1e-4) {
        if (components.length === 1) {
          return { type: "none", confidence: "poor", notes: [`power-law rejected (relative RMS=${finalResidualRMS / scale})`] };
        } else {
          notes.push(`warning: mixed power-law fit loose (relative RMS=${finalResidualRMS / scale})`);
        }
      }

      notes.push(`exponents: ${components.map(c => c.exponent.toFixed(5)).join(', ')}`);

      return {
        type: components.length > 1 ? "mixedPowerLaw" : "powerLaw",
        confidence: finalResidualRMS / scale < 1e-6 ? "good" : "uncertain",
        exponent: components[0].exponent,
        coefficient: components[0].coefficient,
        components,
        logCorrection: 0,
        period: 1,
        skeleton,
        residual: finalResidual,
        residualRMS: finalResidualRMS,
        notes
      };
    }

    function detectExtendedSkeleton(sequence, options = {}) {
      const N = sequence.length;
      const Nfit = Math.min(options.N_fit ?? Math.min(N, 2048), N);
      const ns = Array.from({ length: Nfit }, (_, i) => i + 1);
      const ys = Array.from(sequence.slice(0, Nfit));
      const scale = Math.max(1e-12, rms(ys));

      function fitBasis(terms, label, complexityPenalty = 0) {
        const X = ns.map(n => terms.map(t => t.fn(n)));
        const fit = leastSquaresScaled(X, ys);
        const skeleton = new Float64Array(N);
        const residual = new Float64Array(N);
        for (let n = 1; n <= N; n++) {
          let v = 0;
          for (let i = 0; i < terms.length; i++) v += fit.coeffs[i] * terms[i].fn(n);
          skeleton[n - 1] = v;
          residual[n - 1] = sequence[n - 1] - v;
        }
        const headResidual = Array.from(residual.slice(0, Nfit));
        const residualRMS = Math.sqrt(headResidual.reduce((s, x) => s + x * x, 0) / Nfit);
        const rel = residualRMS / scale;

        const cutPoints = [0.45, 0.65, 0.85, 1.0].map(frac => Math.max(terms.length + 8, Math.min(Nfit, Math.floor(Nfit * frac))));
        const uniqueCuts = [...new Set(cutPoints)].sort((a, b) => a - b);
        const coeffWindows = [];
        const relWindows = [];
        for (const cut of uniqueCuts) {
          const subNs = ns.slice(0, cut);
          const subYs = ys.slice(0, cut);
          try {
            const subFit = leastSquaresScaled(subNs.map(n => terms.map(t => t.fn(n))), subYs);
            coeffWindows.push(subFit.coeffs);
            const fitted = subNs.map(n => terms.reduce((s, t, i) => s + subFit.coeffs[i] * t.fn(n), 0));
            const subResidual = fitted.map((v, i) => subYs[i] - v);
            relWindows.push(Math.sqrt(subResidual.reduce((s, x) => s + x * x, 0) / cut) / scale);
          } catch {
          }
        }
        const leadIdx = 0;
        const leadVals = coeffWindows.map(c => c[leadIdx]).filter(Number.isFinite);
        const leadCenter = median(leadVals) ?? fit.coeffs[leadIdx];
        const coeffSpread = leadVals.length >= 2 ? mad(leadVals, leadCenter) / Math.max(1e-12, Math.abs(leadCenter)) : Infinity;
        const relSpread = relWindows.length >= 2 ? (Math.max(...relWindows) - Math.min(...relWindows)) : Infinity;
        const stability = (Number.isFinite(coeffSpread) && Number.isFinite(relSpread))
          ? clamp(1 - 2.5 * coeffSpread - 4 * relSpread, 0, 1)
          : 0;
        const score = rel + 0.3 * (1 - stability) + complexityPenalty;
        return {
          label,
          fit,
          skeleton,
          residual,
          residualRMS,
          rel,
          stability,
          score,
          terms,
          coeffWindows,
          relWindows,
          leadCoeff: fit.coeffs[leadIdx],
          leadCoeffSpread: Number.isFinite(coeffSpread) ? coeffSpread : null,
          complexityPenalty
        };
      }

      const candidates = [
        fitBasis([
          { label: 'log(n)', fn: n => Math.log(n) },
          { label: '1', fn: () => 1 }
        ], 'log', 0),
        fitBasis([
          { label: 'log(n)', fn: n => Math.log(n) },
          { label: '1', fn: () => 1 },
          { label: '1/n', fn: n => 1 / n }
        ], 'log', 0.004),
        fitBasis([
          { label: 'n*log(n)', fn: n => n * Math.log(n) },
          { label: 'n', fn: n => n },
          { label: '1', fn: () => 1 }
        ], 'nlogn', 0),
        fitBasis([
          { label: 'n*log(n)', fn: n => n * Math.log(n) },
          { label: 'n', fn: n => n },
          { label: 'log(n)', fn: n => Math.log(n) },
          { label: '1', fn: () => 1 }
        ], 'nlogn', 0.004)
      ].sort((a, b) => a.score - b.score);

      const best = candidates[0];
      const second = candidates[1] || null;
      const threshold = options.extendedThreshold ?? 5e-4;
      const minStability = options.extendedDetectionStability ?? 0.72;
      const ambiguityGap = second ? second.score - best.score : Infinity;
      if (!best || best.rel > threshold || best.stability < minStability) {
        return {
          type: 'none',
          confidence: 'poor',
          notes: ['extended skeleton rejected'],
          details: best ? {
            bestType: best.label,
            relResidual: best.rel,
            stability: best.stability,
            ambiguityGap
          } : {}
        };
      }

      const out = {
        type: 'extended',
        extendedType: best.label,
        confidence: best.rel < 1e-5 && best.stability > 0.9 ? 'good' : 'uncertain',
        coefficients: best.fit.coeffs,
        basis: best.terms.map(t => t.label),
        skeleton: best.skeleton,
        residual: best.residual,
        residualRMS: best.residualRMS,
        stability: best.stability,
        ambiguityGap,
        notes: [
          `extended skeleton detected: ${best.label}`,
          best.stability > 0.9 ? 'coefficient windows look stable' : 'coefficient windows moderately stable',
          ...(second && ambiguityGap < 0.015 ? [`close runner-up: ${second.label}`] : [])
        ],
        details: {
          relResidual: best.rel,
          stability: best.stability,
          ambiguityGap,
          candidateScores: candidates.map(c => ({
            label: c.label,
            relResidual: c.rel,
            stability: c.stability,
            score: c.score,
            basis: c.terms.map(t => t.label),
            leadCoeff: c.leadCoeff,
            leadCoeffSpread: c.leadCoeffSpread
          }))
        }
      };
      return out;
    }

    function detectFourierSimple(sequence, options = {}) {
      const N = sequence.length;
      const Nfit = Math.min(options.N_fit ?? Math.min(N, 1024), N);
      const data = Array.from(sequence.slice(0, Nfit));
      const maxK = Math.min(Math.floor(Nfit / 2) - 1, options.fourierBins ?? 512);
      const maxPeaks = options.fourierMaxPeaks ?? 3;

      function solveTrigSystem(omegas) {
        const p = 1 + 2 * omegas.length;
        const G = Array.from({ length: p }, () => Array(p).fill(0));
        const rhs = Array(p).fill(0);
        for (let n = 1; n <= Nfit; n++) {
          const row = [1];
          for (const omega of omegas) {
            row.push(Math.cos(omega * n));
            row.push(Math.sin(omega * n));
          }
          const y = data[n - 1];
          for (let i = 0; i < p; i++) {
            rhs[i] += row[i] * y;
            for (let j = 0; j < p; j++) G[i][j] += row[i] * row[j];
          }
        }
        const coeffs = solveLinearSystem(G, rhs);
        const dc = coeffs[0];
        const peaks = [];
        for (let i = 0; i < omegas.length; i++) {
          const a = coeffs[1 + 2 * i];
          const b = coeffs[1 + 2 * i + 1];
          peaks.push({
            frequency: omegas[i],
            cosCoeff: a,
            sinCoeff: b,
            amplitude: Math.hypot(a, b),
            phase: Math.atan2(-b, a)
          });
        }
        let rss = 0;
        for (let n = 1; n <= Nfit; n++) {
          let pred = dc;
          for (const peak of peaks) pred += peak.cosCoeff * Math.cos(peak.frequency * n) + peak.sinCoeff * Math.sin(peak.frequency * n);
          const r = data[n - 1] - pred;
          rss += r * r;
        }
        return { dc, peaks, rss };
      }

      function singlePeakAtOmega(omega) {
        const fit = solveTrigSystem([omega]);
        const peak = fit.peaks[0];
        return { dc: fit.dc, a: peak.cosCoeff, b: peak.sinCoeff, rss: fit.rss, amplitude: peak.amplitude, phase: peak.phase };
      }

      const amps = new Float64Array(maxK + 2);
      const rawPeaks = [];
      for (let k = 1; k <= maxK; k++) {
        const omega = 2 * Math.PI * k / Nfit;
        const fit = singlePeakAtOmega(omega);
        amps[k] = fit.amplitude;
      }
      for (let k = 2; k < maxK; k++) {
        if (amps[k] >= amps[k - 1] && amps[k] >= amps[k + 1]) rawPeaks.push({ k, amplitude: amps[k] });
      }
      rawPeaks.sort((a, b) => b.amplitude - a.amplitude);
      const selectedKs = rawPeaks.slice(0, maxPeaks).map(p => p.k);
      if (!selectedKs.length) {
        const bestK = amps.reduce((best, val, idx) => idx > 0 && val > amps[best] ? idx : best, 1);
        selectedKs.push(bestK);
      }

      const refinedOmegas = [];
      for (const k of selectedKs) {
        const y1 = amps[Math.max(1, k - 1)];
        const y2 = amps[k];
        const y3 = amps[Math.min(maxK, k + 1)];
        let delta = 0;
        const denom = y1 - 2 * y2 + y3;
        if (Math.abs(denom) > 1e-18) {
          delta = 0.5 * (y1 - y3) / denom;
          delta = clamp(delta, -0.5, 0.5);
        }
        let omega = 2 * Math.PI * (k + delta) / Nfit;
        let step = 2 * Math.PI / Nfit;
        for (let iter = 0; iter < (options.fourierRefineSteps ?? 5); iter++) {
          const cand = [omega - step, omega, omega + step].map(w => ({ omega: w, ...singlePeakAtOmega(w) }));
          cand.sort((p, q) => q.amplitude - p.amplitude);
          omega = cand[0].omega;
          step *= 0.35;
        }
        refinedOmegas.push(omega);
      }

      refinedOmegas.sort((a, b) => a - b);
      const deduped = [];
      const minSep = 0.02;
      for (const omega of refinedOmegas) {
        if (!deduped.length || Math.abs(omega - deduped[deduped.length - 1]) > minSep) deduped.push(omega);
      }

      const bestFit = solveTrigSystem(deduped);
      const skeleton = new Float64Array(N);
      const residual = new Float64Array(N);
      for (let n = 1; n <= N; n++) {
        let v = bestFit.dc;
        for (const peak of bestFit.peaks) v += peak.cosCoeff * Math.cos(peak.frequency * n) + peak.sinCoeff * Math.sin(peak.frequency * n);
        skeleton[n - 1] = v;
        residual[n - 1] = sequence[n - 1] - v;
      }
      const residualRMS = Math.sqrt(Array.from(residual.slice(0, Nfit)).reduce((s, x) => s + x * x, 0) / Nfit);
      const seqScale = Math.max(1e-12, rms(Array.from(sequence.slice(0, Nfit))));
      const rel = residualRMS / seqScale;
      if (rel > (options.fourierThreshold ?? 0.2)) {
        return { type: "none", confidence: "poor", notes: [`fourier rejected (relative RMS=${rel})`] };
      }

      const dcWindows = [
        sequence.slice(0, Math.min(sequence.length, 2048)),
        sequence.slice(Math.max(0, Math.floor(sequence.length / 2) - 1024), Math.max(0, Math.floor(sequence.length / 2) - 1024) + Math.min(sequence.length, 2048)),
        sequence.slice(Math.max(0, sequence.length - Math.min(sequence.length, 2048)))
      ].filter(arr => arr.length > 0).map(arr => mean(Array.from(arr)));
      const dcSpread = dcWindows.length ? Math.max(...dcWindows) - Math.min(...dcWindows) : 0;
      const dcScale = Math.max(1e-9, Math.abs(bestFit.dc), ...dcWindows.map(v => Math.abs(v)));
      const dcStability = clamp(1 - dcSpread / dcScale - rel, 0, 1);
      const dcDetails = {
        windows: dcWindows,
        spread: dcSpread,
        stability: dcStability,
        note: dcStability > 0.9
          ? 'Fourier skeleton DC component (stable time-average candidate for bounded oscillatory data)'
          : 'Fourier skeleton DC component (time-average candidate; check diagnostics)'
      };

      return {
        type: "fourier",
        confidence: rel < 0.05 ? "good" : "uncertain",
        dcComponent: bestFit.dc,
        dcDetails,
        peaks: bestFit.peaks.map(p => ({ ...p, rss: bestFit.rss })),
        numPeaks: bestFit.peaks.length,
        skeleton,
        residual,
        residualRMS,
        notes: [`fourier skeleton detected: peaks=${bestFit.peaks.length}, dc≈${bestFit.dc.toFixed(6)}`]
      };
    }

    function detectModel(sequence, options) {
      const Ncheck = Math.min(1024, sequence.length);
      const head = Array.from(sequence.slice(0, Ncheck));
      const firstDiff = [];
      for (let i = 1; i < head.length; i++) firstDiff.push(head[i] - head[i - 1]);
      const seqScale = Math.max(1e-12, rms(head));
      const diffScale = firstDiff.length ? rms(firstDiff) : 0;
      const quasiSoftRel = options.quasiSoftRelativeThreshold ?? 0.0025;

      const qp = detectQuasiPolynomial(sequence, options);
      if (qp.type === "quasiPolynomial") {
        const relResidual = (qp.residualRMS ?? Infinity) / seqScale;
        if ((qp.period ?? 1) <= 12 && relResidual < Math.max(1e-8, 1e-6)) {
          return qp;
        }
        if ((qp.period ?? 1) <= 4 && (qp.degree ?? 0) <= 2 && relResidual < quasiSoftRel) {
          return {
            ...qp,
            confidence: 'uncertain',
            notes: [...(qp.notes || []), `soft quasi acceptance (relative residual=${relResidual})`]
          };
        }
      }

      if (qp.type === "quasiPolynomialCandidate") {
        const relResidual = (qp.residualRMS ?? Infinity) / seqScale;
        if ((qp.period ?? 1) <= 4 && (qp.degree ?? 0) <= 2 && relResidual < quasiSoftRel) {
          return {
            ...qp,
            type: 'quasiPolynomial',
            confidence: 'uncertain',
            notes: [...(qp.notes || []), `soft quasi acceptance (relative residual=${relResidual})`]
          };
        }
      }

      const pw = detectPowerLaw(sequence, options);
      if (pw.type === "powerLaw" || pw.type === "mixedPowerLaw") return pw;

      const ext = detectExtendedSkeleton(sequence, options);
      if (ext.type === 'extended') return ext;

      const fourier = detectFourierSimple(sequence, options);
      if (fourier.type === "fourier") {
        const peak = fourier.peaks?.[0];
        const omega = peak?.frequency ?? Infinity;
        const amp = peak?.amplitude ?? 0;
        const dc = Math.abs(fourier.dcComponent ?? 0);
        const looksLikeTrend = diffScale < 0.02 * seqScale;
        const lowFreq = omega < (options.fourierMinOmega ?? 0.01);
        const dcDominant = dc > 0.25 * Math.max(1e-12, amp);
        const tinyOscillationOnQuasi =
          (qp.type === 'quasiPolynomial' || qp.type === 'quasiPolynomialCandidate') &&
          (qp.residualRMS ?? Infinity) / seqScale < quasiSoftRel &&
          amp < 0.05 * seqScale;
        if (!(lowFreq && looksLikeTrend) && !(lowFreq && dcDominant) && !tinyOscillationOnQuasi) {
          return fourier;
        }
      }

      if (qp.type === "quasiPolynomial" || qp.type === "quasiPolynomialCandidate") {
        return {
          ...qp,
          confidence: qp.confidence || 'uncertain',
          notes: [...(qp.notes || []), 'quasi fallback selected']
        };
      }

      return {
        type: "none",
        confidence: "poor",
        skeleton: qp.skeleton || fourier.skeleton || new Float64Array(sequence.length),
        residual: qp.residual || fourier.residual || new Float64Array(sequence.length),
        residualRMS: qp.residualRMS ?? fourier.residualRMS ?? null,
        notes: [
          ...(qp.notes || []),
          ...(pw.notes || []),
          ...(ext.notes || []),
          ...(fourier.notes || []),
          "no supported skeleton detected in current build"
        ]
      };
    }

    function bernoulliPolynomial(k, x) {
      let sum = 0;
      for (let j = 0; j <= k; j++) {
        const Bj = BERNOULLI[j] ?? 0;
        sum += comb(k, j) * Bj * (x ** (k - j));
      }
      return sum;
    }

    function comb(n, k) {
      if (k < 0 || k > n) return 0;
      if (k === 0 || k === n) return 1;
      let res = 1;
      for (let i = 1; i <= k; i++) res = res * (n - k + i) / i;
      return res;
    }

    function gamma(z) {
      const p = [
        0.99999999999980993, 676.5203681218851, -1259.1392167224028,
        771.32342877765313, -176.61502916214059, 12.507343278686905,
        -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7
      ];
      if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gamma(1 - z));
      z -= 1;
      let x = p[0];
      for (let i = 1; i < p.length; i++) x += p[i] / (z + i);
      const t = z + 7.5;
      return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
    }

    function zetaSeries(s, N = 20000) {
      let sum = 0;
      for (let n = 1; n <= N; n++) sum += 1 / (n ** s);
      return sum;
    }

    function zetaViaFunctionalEquation(s) {
      if (s > 1) return zetaSeries(s);
      const oneMinusS = 1 - s;
      const z = zetaSeries(oneMinusS, 50000);
      return (2 ** s) * (Math.PI ** (s - 1)) * Math.sin(Math.PI * s / 2) * gamma(1 - s) * z;
    }

    function hurwitzRegularize(model, sequence) {
      if (model.type === "quasiPolynomial") {
        const m = model.period;
        const d = model.degree;
        let total = 0;
        const residueBreakdown = [];
        for (let r = 0; r < m; r++) {
          let contrib = 0;
          for (let k = 0; k <= d; k++) {
            const c = model.coefficients[r][k];
            if (Math.abs(c) < 1e-15) continue;
            const a = r === 0 ? 1 : r / m;
            const B = bernoulliPolynomial(k + 1, a);
            const zetaVal = -B / (k + 1);
            contrib += c * (m ** k) * zetaVal;
          }
          residueBreakdown.push({ residue: r, contribution: contrib });
          total += contrib;
        }
        return {
          method: "hurwitz",
          status: "success",
          value: total,
          stability: "exact-ish",
          notes: [...model.notes],
          details: {
            exactForm: model.period === 1 ? "Bernoulli-polynomial exact-ish path" : "Residue-class Hurwitz/Bernoulli path",
            residueBreakdown
          }
        };
      }
      if ((model.type === "powerLaw" || model.type === "mixedPowerLaw") && model.period === 1) {
        const components = model.components || [{ exponent: model.exponent, coefficient: model.coefficient }];
        let value = 0;
        const termsText = [];
        for (const comp of components) {
          value += comp.coefficient * zetaViaFunctionalEquation(-comp.exponent);
          termsText.push(`${formatNum(comp.coefficient, 4)} * zeta(${-comp.exponent.toFixed(4)})`);
        }
        return {
          method: "hurwitz",
          status: "success",
          value,
          stability: "exact-ish",
          notes: [...(model.notes || [])],
          details: {
            exactForm: termsText.join('  +  ') + ' via functional equation',
            components
          }
        };
      }
      if (model.type === 'extended') {
        return {
          method: 'hurwitz',
          status: 'not_applicable',
          value: null,
          stability: null,
          notes: [`extended skeleton ${model.extendedType} detected — use ExpCutoff / Window in current build`],
          details: { basis: model.basis, coefficients: model.coefficients }
        };
      }
      if (model.type === "fourier") {
        return {
          method: "hurwitz",
          status: "not_applicable",
          value: null,
          stability: null,
          notes: ["fourier skeleton — use Abel/ExpCutoff"],
          details: {}
        };
      }
      return {
        method: "hurwitz",
        status: "not_applicable",
        value: null,
        stability: null,
        notes: ["supported only for quasi-polynomial and single power-law skeletons in Phase 1"],
        details: {}
      };
    }

    function buildExpBasis(model) {
      const basis = [];
      if (model.type === "quasiPolynomial") {
        for (let p = model.degree + 1; p >= 1; p--) basis.push({ label: `eps^-${p}`, fn: eps => eps ** (-p) });
        basis.push({ label: "1", fn: () => 1 });
        basis.push({ label: "eps", fn: eps => eps });
        return basis;
      }
      if (model.type === "powerLaw" || model.type === "mixedPowerLaw") {
        const a = model.exponent;
        const exponents = [a + 1, a, Math.max(a - 1, 0.5)].filter((v, i, arr) => arr.findIndex(u => Math.abs(u - v) < 1e-9) === i);
        for (const p of exponents) basis.push({ label: `eps^-${p.toFixed(3)}`, fn: eps => eps ** (-p) });
        basis.push({ label: "1", fn: () => 1 });
        basis.push({ label: "eps", fn: eps => eps });
        return basis;
      }
      if (model.type === 'extended') {
        if (model.extendedType === 'log') {
          return [
            { label: 'log(eps)/eps', fn: eps => Math.log(eps) / eps },
            { label: 'eps^-1', fn: eps => eps ** -1 },
            { label: '1', fn: () => 1 },
            { label: 'eps*log(eps)', fn: eps => eps * Math.log(eps) },
            { label: 'eps', fn: eps => eps },
            { label: 'eps^2', fn: eps => eps * eps }
          ];
        }
        if (model.extendedType === 'nlogn') {
          return [
            { label: 'log(eps)/eps^2', fn: eps => Math.log(eps) / (eps * eps) },
            { label: 'eps^-2', fn: eps => eps ** -2 },
            { label: 'eps^-1', fn: eps => eps ** -1 },
            { label: '1', fn: () => 1 },
            { label: 'eps*log(eps)', fn: eps => eps * Math.log(eps) },
            { label: 'eps', fn: eps => eps }
          ];
        }
      }
      return [
        { label: "eps^-3", fn: eps => eps ** -3 },
        { label: "eps^-2", fn: eps => eps ** -2 },
        { label: "eps^-1", fn: eps => eps ** -1 },
        { label: "log(eps)", fn: eps => Math.log(eps) },
        { label: "1", fn: () => 1 },
        { label: "eps", fn: eps => eps }
      ];
    }

    function logspace(a, b, n) {
      const out = [];
      const la = Math.log(a), lb = Math.log(b);
      for (let i = 0; i < n; i++) {
        const t = i / (n - 1);
        out.push(Math.exp(la + (lb - la) * t));
      }
      return out;
    }

    function expCutoffRegularize(sequence, model, options = {}) {
      const epsMin = options.epsMin ?? 0.001;
      const epsMax = options.epsMax ?? 0.5;
      const samples = options.samples ?? 60;
      const epsGrid = logspace(epsMin, epsMax, samples);
      const basis = buildExpBasis(model);
      const skeleton = model?.skeleton instanceof Float64Array ? model.skeleton : null;
      const residual = model?.residual instanceof Float64Array ? model.residual : null;
      const useResidualMode = !!(skeleton && residual && (model.type === 'quasiPolynomial' || model.type === 'powerLaw'));
      const baseHurwitz = useResidualMode ? hurwitzRegularize(model, sequence) : null;

      const curve = epsGrid.map(eps => {
        let sFull = 0;
        let sResidual = 0;
        for (let i = 0; i < sequence.length; i++) {
          const w = Math.exp(-eps * (i + 1));
          sFull += sequence[i] * w;
          if (useResidualMode) sResidual += residual[i] * w;
        }
        return { eps, sEps: useResidualMode ? sResidual : sFull, fullSEps: sFull };
      });

      function fitOn(subCurve, profile = 'default') {
        const X = subCurve.map(({ eps }) => basis.map(b => b.fn(eps)));
        const y = subCurve.map(p => p.sEps);
        const weights = subCurve.map((p, i) => {
          const t = subCurve.length <= 1 ? 0 : i / (subCurve.length - 1);
          if (model.type === 'extended') {
            if (profile === 'small-eps') return 1.6 - 0.7 * t;
            if (profile === 'mid-eps') return 0.9 + 0.3 * Math.sin(Math.PI * t);
          }
          return 1;
        });
        const fit = leastSquaresScaled(X, y, weights);
        const oneIdx = basis.findIndex(b => b.label === "1");
        const finitePartResidual = oneIdx >= 0 ? fit.coeffs[oneIdx] : null;
        const value = useResidualMode
          ? ((baseHurwitz?.status === 'success' ? baseHurwitz.value : 0) + (finitePartResidual ?? 0))
          : finitePartResidual;
        return { fit, finitePartResidual, value, profile };
      }

      try {
        const main = fitOn(curve, model.type === 'extended' ? 'small-eps' : 'default');
        const fit = main.fit;
        const fitVals = curve.map(({ eps }) => basis.reduce((s, b, i) => s + fit.coeffs[i] * b.fn(eps), 0));

        const rawWindows = [
          { a: epsMin, b: epsMax, profile: 'default', label: 'full' },
          { a: epsMin * 1.25, b: epsMax / 1.15, profile: 'small-eps', label: 'tight-inner' },
          { a: epsMin * 1.5, b: epsMax / 1.5, profile: 'small-eps', label: 'core' },
          { a: epsMin * 2, b: epsMax / 2, profile: 'small-eps', label: 'inner-core' },
          { a: epsMin, b: Math.sqrt(epsMin * epsMax), profile: 'small-eps', label: 'small-eps half' },
          { a: epsMin * 1.1, b: Math.sqrt(epsMin * epsMax) * 1.15, profile: 'mid-eps', label: 'small-mid blend' }
        ].filter(w => w.a < w.b && w.b <= epsMax * 1.01);

        function evaluateWindow(w) {
          const subCurve = curve.filter(p => p.eps >= w.a && p.eps <= w.b);
          if (subCurve.length < basis.length + 3) return null;
          try {
            const sub = fitOn(subCurve, w.profile);
            return { ...w, value: sub.value, fit: sub.fit, finitePartResidual: sub.finitePartResidual, size: subCurve.length };
          } catch {
            return null;
          }
        }

        const windowFits = [];
        for (const w of rawWindows) {
          const evaluated = evaluateWindow(w);
          if (evaluated) windowFits.push(evaluated);
        }

        for (const w of windowFits) {
          const variantDefs = [
            { a: Math.max(epsMin, w.a * 1.08), b: Math.min(epsMax, w.b / 1.08), profile: `${w.profile || ''}:inner` },
            { a: Math.max(epsMin, w.a / 1.08), b: Math.min(epsMax, w.b * 1.08), profile: `${w.profile || ''}:outer` }
          ].filter(v => v.a < v.b);
          const variantVals = [];
          for (const v of variantDefs) {
            const evaluated = evaluateWindow(v);
            if (evaluated && Number.isFinite(evaluated.value)) variantVals.push(evaluated.value);
          }
          const localCenter = variantVals.length ? median([w.value, ...variantVals]) : w.value;
          const localSpread = variantVals.length ? Math.max(...variantVals, w.value) - Math.min(...variantVals, w.value) : 0;
          const localScale = Math.max(1e-9, Math.abs(localCenter || 0), ...variantVals.map(v => Math.abs(v)), Math.abs(w.value || 0));
          const localRel = localSpread / (localScale + 1e-12);
          const profilePenalty = model.type === 'extended'
            ? ((w.label || '').includes('small-eps') ? 0.58
              : ((w.label || '').includes('small-mid') ? 0.72
              : ((model.extendedType === 'nlogn' && (w.label || '').includes('full')) ? 0.88 : 1.0)))
            : 1.0;
          w.localWindowValues = variantVals;
          w.localSpread = localSpread;
          w.localStability = clamp(1 - 3.2 * localRel, 0, 1);
          w.profilePenalty = profilePenalty;
        }

        const vals = windowFits.map(w => w.value).filter(Number.isFinite);
        const preCenter = vals.length ? (model.type === 'extended' ? (median(vals) ?? main.value) : main.value) : main.value;
        const spread = vals.length >= 2 ? Math.max(...vals) - Math.min(...vals) : Infinity;
        const preRobustSpread = vals.length >= 2 ? 1.4826 * mad(vals, preCenter) : Infinity;
        const preScale = Math.max(1e-12, Math.abs(preCenter || 0), ...vals.map(v => Math.abs(v)));
        const preRelMad = Number.isFinite(preRobustSpread) ? preRobustSpread / (preScale + 1e-12) : Infinity;

        const extendedConditionThreshold = options.extendedConditionThreshold ?? 1e9;
        const windowCondThreshold = Math.max(1e6, Math.sqrt(extendedConditionThreshold));
        const windowFitErrorScale = Math.max(1e-9, Math.abs(preCenter || 0), rms(curve.map(p => p.sEps)));
        const windowFitMedian = windowFits.length ? median(windowFits.map(w => w.fit.rms).filter(Number.isFinite)) : null;
        const outlierK = model.type === 'extended' ? 3.0 : 4.0;
        const fallbackBand = Math.max(1e-8, 0.02 * preScale);
        const acceptedWindowFits = windowFits.filter(w => {
          if (!Number.isFinite(w.value)) return false;
          if (model.type !== 'extended') return true;
          const deviation = Math.abs(w.value - preCenter);
          const baseBand = Number.isFinite(preRobustSpread) && preRobustSpread > 0 ? outlierK * preRobustSpread : fallbackBand;
          const localFactor = Number.isFinite(w.localStability) ? (0.75 + 0.5 * w.localStability) : 1.0;
          const profileFactor = Number.isFinite(w.profilePenalty) ? Math.max(0.5, Math.min(1.0, w.profilePenalty)) : 1.0;
          const band = Math.max(fallbackBand, baseBand * localFactor * profileFactor);
          if (deviation > band) return false;
          if (!Number.isFinite(w.fit.conditionNumber) || w.fit.conditionNumber > windowCondThreshold) return false;
          if (windowFitMedian != null && Number.isFinite(windowFitMedian) && w.fit.rms > Math.max(windowFitMedian * 4, windowFitErrorScale * 0.35)) return false;
          if (Number.isFinite(w.localStability) && w.localStability < 0.35) return false;
          return true;
        });
        const rejectedWindowFits = windowFits.filter(w => !acceptedWindowFits.includes(w));

        const rawWindowQuality = windowFits.map(w => {
          const condWeight = 1 / (1 + Math.log10(Math.max(1, w.fit.conditionNumber)));
          const errWeight = 1 / (1 + (w.fit.rms / Math.max(1e-9, windowFitErrorScale)));
          const localWeight = 0.35 + 0.65 * (Number.isFinite(w.localStability) ? w.localStability : 0.5);
          const profileWeight = Number.isFinite(w.profilePenalty) ? w.profilePenalty : 1.0;
          const quality = condWeight * errWeight * localWeight * profileWeight;
          w.qualityScore = quality;
          w.aggregateWeight = quality;
          return quality;
        });

        let refinedAcceptedWindowFits = acceptedWindowFits.slice();
        if (model.type === 'extended' && refinedAcceptedWindowFits.length) {
          const draftCenter = median(refinedAcceptedWindowFits.map(w => w.value).filter(Number.isFinite)) ?? preCenter;
          const draftVals = refinedAcceptedWindowFits.map(w => w.value).filter(Number.isFinite);
          const draftMad = draftVals.length >= 2 ? 1.4826 * mad(draftVals, draftCenter) : 0;
          const draftScale = Math.max(1e-9, Math.abs(draftCenter || 0), ...draftVals.map(v => Math.abs(v)));
          const draftBand = Math.max(0.015 * draftScale, 1.75 * (draftMad || 0));

          refinedAcceptedWindowFits.forEach(w => {
            const baseQuality = Number.isFinite(w.qualityScore) ? Math.max(1e-6, w.qualityScore) : 1e-6;
            const local = clamp(Number.isFinite(w.localStability) ? w.localStability : 0.5, 0, 1);
            const deviation = Math.abs(w.value - draftCenter);
            const deviationRatio = deviation / Math.max(1e-9, draftBand);
            const consensusWeight = clamp(1.05 - 0.48 * deviationRatio, 0.08, 1.0);
            const localAccent = 0.20 + 0.80 * Math.pow(local, 1.35);
            const qualityAccent = Math.pow(baseQuality, 1.35);
            const profileAccent = Math.pow(Number.isFinite(w.profilePenalty) ? w.profilePenalty : 1.0, 1.1);
            let aggregateWeight = qualityAccent * localAccent * consensusWeight * profileAccent;
            if (model.extendedType === 'nlogn' && w.label === 'full') aggregateWeight *= 0.76;
            if (model.extendedType === 'nlogn' && w.label === 'core' && local < 0.45) aggregateWeight *= 0.82;
            if (model.extendedType === 'log' && w.label === 'full' && deviationRatio > 0.8) aggregateWeight *= 0.92;
            w.deviationFromCenter = deviation;
            w.consensusWeight = consensusWeight;
            w.aggregateWeight = aggregateWeight;
          });

          if (refinedAcceptedWindowFits.length >= 4) {
            const ranked = refinedAcceptedWindowFits.map(w => ({
              w,
              deviation: Number.isFinite(w.deviationFromCenter) ? w.deviationFromCenter : Math.abs(w.value - draftCenter),
              aggregate: Number.isFinite(w.aggregateWeight) ? w.aggregateWeight : 0,
              quality: Number.isFinite(w.qualityScore) ? w.qualityScore : 0
            })).sort((a, b) => (a.aggregate - b.aggregate) || (a.quality - b.quality) || (b.deviation - a.deviation));
            const weakest = ranked[0];
            const minKeep = Math.max(3, options.extendedMinWindows ?? 4);
            if (weakest && weakest.aggregate < 0.018 && weakest.deviation > Math.max(draftBand, 0.07 * draftScale) && refinedAcceptedWindowFits.length - 1 >= minKeep) {
              refinedAcceptedWindowFits = refinedAcceptedWindowFits.filter(w => w !== weakest.w);
            }
          }
        }

        const finalRejectedWindowFits = windowFits.filter(w => !refinedAcceptedWindowFits.includes(w));
        const acceptedVals = refinedAcceptedWindowFits.map(w => w.value).filter(Number.isFinite);
        let center = preCenter;
        let acceptedTotalWeight = 0;
        if (model.type === 'extended' && refinedAcceptedWindowFits.length) {
          const weighted = refinedAcceptedWindowFits.map(w => {
            const weight = Number.isFinite(w.aggregateWeight) ? w.aggregateWeight : (Number.isFinite(w.qualityScore) ? w.qualityScore : 0);
            return { ref: w, value: w.value, weight };
          }).filter(x => Number.isFinite(x.value) && Number.isFinite(x.weight) && x.weight > 0);
          acceptedTotalWeight = weighted.reduce((s, x) => s + x.weight, 0);
          refinedAcceptedWindowFits.forEach(w => {
            const rawWeight = Number.isFinite(w.aggregateWeight) ? w.aggregateWeight : (Number.isFinite(w.qualityScore) ? w.qualityScore : 0);
            w.normalizedAggregateWeight = acceptedTotalWeight > 0 ? rawWeight / acceptedTotalWeight : 0;
          });
          finalRejectedWindowFits.forEach(w => {
            w.normalizedAggregateWeight = 0;
          });
          if (acceptedTotalWeight > 0) center = weighted.reduce((s, x) => s + x.value * x.weight, 0) / acceptedTotalWeight;
          else center = median(acceptedVals) ?? preCenter;
        } else if (acceptedVals.length) {
          center = acceptedVals[0];
        }

        const robustSpread = acceptedVals.length >= 2 ? 1.4826 * mad(acceptedVals, center) : preRobustSpread;
        const usedSpread = acceptedVals.length >= 2 ? Math.max(...acceptedVals) - Math.min(...acceptedVals) : spread;
        const scale = Math.max(1e-12, Math.abs(center || 0), ...acceptedVals.map(v => Math.abs(v)), ...vals.map(v => Math.abs(v)));
        const relMad = Number.isFinite(robustSpread) ? robustSpread / (scale + 1e-12) : Infinity;
        const usedRelSpread = Number.isFinite(usedSpread) ? usedSpread / (scale + 1e-12) : Infinity;
        const rawRelSpread = Number.isFinite(spread) ? spread / (preScale + 1e-12) : Infinity;
        const shrinkGain = (Number.isFinite(rawRelSpread) && Number.isFinite(usedRelSpread) && rawRelSpread > 0)
          ? clamp((rawRelSpread - usedRelSpread) / rawRelSpread, 0, 1)
          : 0;
        const avgQuality = refinedAcceptedWindowFits.length
          ? mean(refinedAcceptedWindowFits.map(w => Number.isFinite(w.aggregateWeight) ? w.aggregateWeight : (Number.isFinite(w.qualityScore) ? w.qualityScore : 0)))
          : 0;
        const avgNormalizedWeight = refinedAcceptedWindowFits.length
          ? mean(refinedAcceptedWindowFits.map(w => Number.isFinite(w.normalizedAggregateWeight) ? w.normalizedAggregateWeight : 0))
          : 0;
        const mainPenalty = fit.rms / Math.max(1e-9, Math.abs(center || 0), rms(curve.map(p => p.sEps)));
        const condPenalty = Math.log10(Math.max(1, fit.conditionNumber)) / 16;
        let stabilityScore;
        if (model.type === 'extended') {
          const enoughWindows = Math.min(1, refinedAcceptedWindowFits.length / Math.max(3, options.extendedMinWindows ?? 4));
          const rejectionPenalty = finalRejectedWindowFits.length / Math.max(1, windowFits.length) * 0.06;
          const avgLocalStability = refinedAcceptedWindowFits.length
            ? mean(refinedAcceptedWindowFits.map(w => Number.isFinite(w.localStability) ? w.localStability : 0.5))
            : 0;
          const qualityBoost = clamp(Math.sqrt(Math.max(0, avgQuality) / 0.24), 0, 1);
          const shrinkBoost = Math.pow(shrinkGain, 0.72);
          const tightnessBoost = clamp(1 - 0.85 * relMad - 0.28 * usedRelSpread, 0, 1);
          const penaltyBlend = 0.62 * mainPenalty + 0.30 * condPenalty + rejectionPenalty;
          stabilityScore = clamp(
            0.18
            + 0.30 * shrinkBoost
            + 0.20 * tightnessBoost
            + 0.14 * qualityBoost
            + 0.10 * avgLocalStability
            + 0.05 * Math.sqrt(Math.max(0, avgNormalizedWeight) / 0.34)
            - 0.34 * penaltyBlend,
            0,
            1
          ) * enoughWindows;
        } else {
          stabilityScore = Number.isFinite(usedSpread) ? clamp(1 - usedSpread / (scale + 1e-12), 0, 1) : 0;
        }

        const value = model.type === 'extended' && Number.isFinite(center) ? center : main.value;
        const extendedPromoteThreshold = options.extendedPromoteThreshold ?? 0.9;
        const extendedMinWindows = options.extendedMinWindows ?? 4;
        const extendedProvisional = model.type === 'extended' && (
          stabilityScore < extendedPromoteThreshold ||
          fit.conditionNumber > extendedConditionThreshold ||
          refinedAcceptedWindowFits.length < extendedMinWindows ||
          !Number.isFinite(relMad) || relMad > 0.08
        );
        const status = model.type === 'extended'
          ? (extendedProvisional ? 'exploratory' : 'success')
          : 'success';

        return {
          method: "expCutoff",
          status,
          value,
          stability: stabilityScore,
          notes: [
            fit.conditionNumber > 1e8 ? `condition number high: ${formatNum(fit.conditionNumber, 6)}` : "stable fit",
            ...(useResidualMode ? ['skeleton-subtracted residual fit'] : []),
            ...(model.type === 'extended' ? [`extended-aware basis: ${model.extendedType}`] : []),
            ...(model.type === 'extended' ? [`accepted windows: ${refinedAcceptedWindowFits.length}/${windowFits.length}`] : []),
            ...(model.type === 'extended' && extendedProvisional ? ['provisional: not used in ensemble'] : []),
            ...(model.type === 'extended' && !extendedProvisional ? ['extended fit passed robust multi-window check'] : [])
          ],
          details: {
            divergentTerms: basis.map((b, i) => ({ basis: b.label, coeff: fit.coeffs[i] })).filter(x => x.basis !== "1" && x.basis !== "eps"),
            fitError: fit.rms,
            conditionNumber: fit.conditionNumber,
            stabilityScore,
            windowValues: vals,
            acceptedWindowValues: acceptedVals,
            rejectedWindowValues: finalRejectedWindowFits.map(w => w.value).filter(Number.isFinite),
            windowSpread: Number.isFinite(usedSpread) ? usedSpread : null,
            rawWindowSpread: Number.isFinite(spread) ? spread : null,
            robustSpread: Number.isFinite(robustSpread) ? robustSpread : null,
            preRobustSpread: Number.isFinite(preRobustSpread) ? preRobustSpread : null,
            robustCenter: Number.isFinite(center) ? center : null,
            spreadShrinkGain: Number.isFinite(shrinkGain) ? shrinkGain : null,
            avgWindowQuality: Number.isFinite(avgQuality) ? avgQuality : null,
            curve: curve.map((p, i) => ({ ...p, fitted: fitVals[i] })),
            basis: basis.map(b => b.label),
            residualFinitePart: main.finitePartResidual,
            skeletonMode: useResidualMode,
            skeletonContribution: baseHurwitz?.status === 'success' ? baseHurwitz.value : null,
            windowFits: windowFits.map(w => ({
              label: w.label,
              a: w.a,
              b: w.b,
              profile: w.profile,
              size: w.size,
              value: w.value,
              fitError: w.fit.rms,
              conditionNumber: w.fit.conditionNumber,
              localStability: w.localStability,
              localSpread: w.localSpread,
              profilePenalty: w.profilePenalty,
              qualityScore: w.qualityScore,
              aggregateWeight: w.aggregateWeight,
              normalizedAggregateWeight: w.normalizedAggregateWeight,
              consensusWeight: w.consensusWeight,
              accepted: refinedAcceptedWindowFits.includes(w),
              status: refinedAcceptedWindowFits.includes(w) ? 'accepted' : 'rejected'
            }))
          }
        };
      } catch (err) {
        return {
          method: "expCutoff",
          status: "failed",
          value: null,
          stability: null,
          notes: [String(err.message || err)],
          details: {}
        };
      }
    }

    function cesaroRegularize(sequence, options = {}) {
      const N = sequence.length;
      const partials = new Float64Array(N);
      const cesaro = new Float64Array(N);
      let s = 0;
      let csum = 0;
      for (let i = 0; i < N; i++) {
        s += sequence[i];
        partials[i] = s;
        csum += s;
        cesaro[i] = csum / (i + 1);
      }
      const tailStart = Math.max(0, Math.floor(N * 0.9));
      const tail = Array.from(cesaro.slice(tailStart));
      const tailMean = mean(tail);
      const tailStd = Math.sqrt(variance(tail));
      const scale = Math.max(1e-9, Math.abs(tailMean), ...tail.map(v => Math.abs(v)));
      const relStd = tailStd / scale;
      const trend = tail.length > 1 ? Math.abs(tail[tail.length - 1] - tail[0]) / Math.max(1, tail.length - 1) : 0;
      const trendRel = trend / scale;
      const sampled = [];
      const step = Math.max(1, Math.floor(N / 256));
      for (let i = 0; i < N; i += step) sampled.push({ n: i + 1, partial: partials[i], cesaro: cesaro[i] });
      if (relStd < (options.stdThreshold ?? 1e-2) && trendRel < (options.trendThreshold ?? 2e-3)) {
        return {
          method: "cesaro",
          status: "success",
          value: tailMean,
          stability: clamp(1 - 20 * relStd - 50 * trendRel, 0, 1),
          notes: ["tail average appears convergent"],
          details: { partials: sampled, tailStd, trendRel }
        };
      }
      return {
        method: "cesaro",
        status: "not_applicable",
        value: null,
        stability: null,
        notes: ["Cesàro tail does not stabilize"],
        details: { partials: sampled, tailStd, trendRel }
      };
    }

    function isBoundedSequence(sequence, options = {}) {
      const N = Math.min(sequence.length, options.N_check ?? 8192);
      const head = Array.from(sequence.slice(0, N));
      const tail = Array.from(sequence.slice(Math.max(0, sequence.length - N)));
      const ampHead = Math.max(...head) - Math.min(...head);
      const ampTail = Math.max(...tail) - Math.min(...tail);
      const scale = Math.max(1e-9, rms(head), rms(tail), Math.abs(mean(head)), Math.abs(mean(tail)));
      const ratio = ampTail / Math.max(1e-9, ampHead, scale);
      const meanShift = Math.abs(mean(tail) - mean(head)) / Math.max(1e-9, scale);
      return {
        bounded: ratio < (options.rangeRatioThreshold ?? 1.5) && meanShift < (options.meanShiftThreshold ?? 0.2),
        ampHead,
        ampTail,
        ratio,
        meanShift
      };
    }

    function abelRegularize(sequence, model, options = {}) {
      const xMin = options.xMin ?? 0.5;
      const xMax = options.xMax ?? 0.999;
      const samples = options.samples ?? 50;

      const disallowAbel = (
        ((model.type === 'quasiPolynomial' || model.type === 'quasiPolynomialCandidate') && (model.degree ?? 0) >= 0 && (model.period ?? 1) === 1) ||
        (model.type === 'powerLaw') ||
        (model.type === 'extended') ||
        (model.type === 'none')
      );
      if (disallowAbel) {
        return {
          method: 'abel',
          status: 'not_applicable',
          value: null,
          stability: null,
          notes: [model.type === 'extended'
            ? 'Abel disabled for extended-growth skeleton in current build'
            : 'Abel disabled for non-oscillatory growth / unresolved skeleton'],
          details: {}
        };
      }

      const boundedInfo = isBoundedSequence(sequence, options);
      const xs = logspace(1 - xMax, 1 - xMin, samples).map(t => 1 - t).sort((a, b) => a - b);
      const curve = xs.map(x => {
        let s = 0;
        let xn = x;
        for (let i = 0; i < sequence.length; i++) {
          s += sequence[i] * xn;
          xn *= x;
        }
        return { x, A: s, t: 1 - x };
      });

      if (model.type === 'quasiPolynomial' && model.period === 2 && model.degree === 0) {
        const c0 = model.coefficients[0][0];
        const c1 = model.coefficients[1][0];
        if (Math.abs(c0 + c1) < 1e-10) {
          const value = c1 / 2;
          return {
            method: 'abel',
            status: 'success',
            value,
            stability: 'exact-ish',
            notes: ['period-2 alternating exact path'],
            details: { curve }
          };
        }
      }

      const peakAmps = (model.peaks || []).map(p => p.amplitude || 0);
      const strongestAmp = peakAmps.length ? Math.max(...peakAmps) : 0;
      const totalPeakAmp = peakAmps.reduce((s, x) => s + x, 0);
      const dcAbs = Math.abs(model.dcComponent ?? 0);
      const dcDominant = model.type === 'fourier' && dcAbs > (options.dcDominanceFactor ?? 3) * Math.max(1e-9, strongestAmp);
      const hardDcDominant = model.type === 'fourier' && dcAbs > (options.hardDcDominanceFactor ?? 8) * Math.max(1e-9, strongestAmp);
      const boundedMultiPeakDc = model.type === 'fourier' && boundedInfo.bounded && (model.peaks?.length ?? 0) >= 2 && dcAbs > Math.max(1e-9, strongestAmp) && dcAbs > 0.5 * totalPeakAmp;

      if (model.type === 'fourier' && (((dcDominant || boundedMultiPeakDc) && boundedInfo.bounded) || hardDcDominant)) {
        return {
          method: 'abel',
          status: 'not_applicable',
          value: null,
          stability: null,
          notes: ['Abel disabled for DC-dominant bounded Fourier skeleton; use Cesàro / inspect dcComponent'],
          details: { boundedInfo, dcComponent: model.dcComponent, peaks: model.peaks, dcDominant, hardDcDominant, boundedMultiPeakDc }
        };
      }

      const tailCount = model.type === 'fourier' ? Math.min(28, curve.length) : Math.min(20, curve.length);
      const tail = curve.slice(Math.max(0, curve.length - tailCount));
      const X = tail.map(p => [1, p.t, p.t * p.t]);
      const y = tail.map(p => p.A);

      try {
        const fit = leastSquares(X, y);
        const value = fit.coeffs[0];
        const fitVals = curve.map(p => fit.coeffs[0] + fit.coeffs[1] * p.t + fit.coeffs[2] * p.t * p.t);
        const tailResidual = y.map((v, i) => v - (fit.coeffs[0] + fit.coeffs[1] * tail[i].t + fit.coeffs[2] * tail[i].t * tail[i].t));
        const tailRms = rms(tailResidual);
        const scale = Math.max(1e-9, Math.abs(value), ...tail.map(p => Math.abs(p.A)));
        const stability = clamp(1 - tailRms / scale, 0, 1);

        if (model.type === 'fourier' && model.peaks && model.peaks.length >= 1) {
          const strongest = [...model.peaks].sort((a, b) => b.amplitude - a.amplitude)[0];
          const omega = strongest.frequency;
          const a = Number.isFinite(strongest.cosCoeff) ? strongest.cosCoeff : 0;
          const b = Number.isFinite(strongest.sinCoeff) ? strongest.sinCoeff : 0;
          const sinHalf = Math.sin(omega / 2);
          let candidate = null;
          if (Math.abs(sinHalf) > 1e-12) {
            const cotHalf = Math.cos(omega / 2) / sinHalf;
            candidate = -0.5 * a + 0.5 * b * cotHalf;
          }
          const candidateDiff = Number.isFinite(candidate) ? Math.abs(candidate - value) : Infinity;
          const useCandidate = model.peaks.length === 1 && Number.isFinite(candidate) && candidateDiff < Math.max(5e-4, 8 * tailRms);
          return {
            method: 'abel',
            status: 'success',
            value: useCandidate ? candidate : value,
            stability: useCandidate ? 'exact-ish' : stability,
            notes: [
              useCandidate
                ? 'single-frequency fourier exact-ish path v5'
                : (model.peaks.length > 1 || Math.abs(model.dcComponent ?? 0) > 0.05
                    ? 'fourier-tail extrapolation preferred (multi-peak / DC)'
                    : 'fourier-tail extrapolation preferred')
            ],
            details: {
              curve: curve.map((p, i) => ({ ...p, fitted: fitVals[i] })),
              fitError: fit.rms,
              tailRms,
              fourierCandidate: candidate,
              chosen: useCandidate ? 'fourierCandidate' : 'tailExtrapolation',
              boundedInfo,
              dcDominant,
              hardDcDominant,
              boundedMultiPeakDc
            }
          };
        }

        return {
          method: 'abel',
          status: 'success',
          value,
          stability,
          notes: [tailRms / scale < 1e-2 ? 'stable extrapolation' : 'extrapolation may be loose'],
          details: {
            curve: curve.map((p, i) => ({ ...p, fitted: fitVals[i] })),
            fitError: fit.rms,
            tailRms,
            boundedInfo,
            dcDominant,
            hardDcDominant,
            boundedMultiPeakDc
          }
        };
      } catch (err) {
        return {
          method: 'abel',
          status: 'failed',
          value: null,
          stability: null,
          notes: [String(err.message || err)],
          details: { curve, boundedInfo, dcDominant, hardDcDominant, boundedMultiPeakDc }
        };
      }
    }

    function windowRegularize(sequence, model, options = {}) {
      const N = sequence.length;
      const nMin = options.Nmin ?? Math.max(128, Math.floor(N / 8));
      const nMax = Math.min(options.Nmax ?? N, N);
      const samples = options.samples ?? 16;
      const windowType = options.windowType ?? 'hann';
      const Ns = [];
      const logA = Math.log(nMin), logB = Math.log(nMax);
      for (let i = 0; i < samples; i++) {
        const t = samples === 1 ? 0 : i / (samples - 1);
        const v = Math.round(Math.exp(logA + (logB - logA) * t));
        if (!Ns.length || v > Ns[Ns.length - 1]) Ns.push(v);
      }

      function w(u) {
        if (windowType === 'blackman') return 0.42 - 0.5 * Math.cos(2 * Math.PI * u) + 0.08 * Math.cos(4 * Math.PI * u);
        return 0.5 - 0.5 * Math.cos(2 * Math.PI * u);
      }

      const curve = Ns.map(M => {
        let s = 0;
        for (let n = 1; n <= M; n++) s += sequence[n - 1] * w(n / M);
        return {
          N: M,
          S: s,
          invN: 1 / M,
          invN2: 1 / (M * M),
          logN: Math.log(M),
          sqrtN: Math.sqrt(M),
          NlogN: M * Math.log(M),
          N2: M * M,
          N2logN: M * M * Math.log(M)
        };
      });

      function makeBasis(mode) {
        if (mode === 'linearGrowth') {
          return {
            label: 'model-aware polynomial basis',
            terms: [
              { label: 'N^2', fn: p => p.N2 },
              { label: 'N', fn: p => p.N },
              { label: '1', fn: () => 1 }
            ]
          };
        }
        if (mode === 'constantGrowth') {
          return {
            label: 'constant-growth basis',
            terms: [
              { label: 'N', fn: p => p.N },
              { label: '1', fn: () => 1 },
              { label: '1/N', fn: p => p.invN }
            ]
          };
        }
        if (mode === 'powerLaw') {
          const a = model.exponent ?? 0.5;
          return {
            label: 'power-law basis',
            terms: [
              { label: `N^${formatNum(a + 1, 4)}`, fn: p => p.N ** (a + 1) },
              { label: `N^${formatNum(Math.max(a, 0), 4)}`, fn: p => p.N ** Math.max(a, 0) },
              { label: '1', fn: () => 1 }
            ]
          };
        }
        if (mode === 'extendedLog') {
          return {
            label: 'extended log-growth basis (residual c0+c1/N fit)',
            terms: [
              { label: 'N log N', fn: p => p.NlogN },
              { label: 'N', fn: p => p.N },
              { label: 'log N', fn: p => p.logN }
            ]
          };
        }
        if (mode === 'extendedNlogn') {
          return {
            label: 'extended nlogn-growth basis (residual c0+c1/N fit)',
            terms: [
              { label: 'N^2 log N', fn: p => p.N2logN },
              { label: 'N^2', fn: p => p.N2 },
              { label: 'N log N', fn: p => p.NlogN },
              { label: 'N', fn: p => p.N }
            ]
          };
        }
        return {
          label: 'exploratory growth basis',
          terms: [
            { label: 'sqrt(N)', fn: p => p.sqrtN },
            { label: 'log(N)', fn: p => p.logN },
            { label: '1', fn: () => 1 }
          ]
        };
      }

      function chooseMode() {
        if (model.type === 'extended') {
          if (model.extendedType === 'log') return 'extendedLog';
          if (model.extendedType === 'nlogn') return 'extendedNlogn';
        }
        if (model.type === 'quasiPolynomial') {
          if ((model.degree ?? 0) >= 1) return 'linearGrowth';
          return 'constantGrowth';
        }
        if (model.type === 'powerLaw') return 'powerLaw';
        return 'exploratory';
      }

      function buildTailWindows(points, mode) {
        const len = points.length;
        const windows = [];
        const pushWindow = (label, startFrac, endFrac, profileWeight = 1) => {
          const start = Math.max(0, Math.min(len - 2, Math.floor(len * startFrac)));
          const end = Math.max(start + 2, Math.min(len, Math.ceil(len * endFrac)));
          const pts = points.slice(start, end);
          if (pts.length >= 4) windows.push({ label, points: pts, profileWeight });
        };
        if (mode === 'extendedLog' || mode === 'extendedNlogn') {
          pushWindow('full-tail', 0.00, 1.00, mode === 'extendedNlogn' ? 0.9 : 1.0);
          pushWindow('tight-inner', 0.12, 0.88, 1.05);
          pushWindow('core', 0.22, 0.82, 1.03);
          pushWindow('inner-core', 0.32, 0.74, 1.0);
          pushWindow('late-tail', 0.42, 0.94, 0.94);
        } else {
          pushWindow('full-tail', 0.00, 1.00, 1.0);
          pushWindow('core', 0.18, 0.86, 1.0);
          pushWindow('inner-core', 0.30, 0.78, 0.97);
        }
        return windows;
      }

      function fitWindow(windowSpec, basisSpec) {
        const pts = windowSpec.points;
        const X = pts.map(p => basisSpec.terms.map(t => t.fn(p)));
        const y = pts.map(p => p.S);
        const weights = pts.map((p, i) => {
          const frac = pts.length <= 1 ? 1 : i / (pts.length - 1);
          const edgeBoost = 0.85 + 0.35 * frac;
          if (basisSpec.label.includes('extended')) return edgeBoost;
          return 1;
        });
        const fit = leastSquaresScaled(X, y, weights);
        const oneIdx = basisSpec.terms.findIndex(t => t.label === '1');
        const fittedTailBase = pts.map((p, i) => X[i].reduce((s, v, j) => s + fit.coeffs[j] * v, 0));
        const residualBase = pts.map((p, i) => p.S - fittedTailBase[i]);

        let value = 0;
        let fpFitRms = null;
        let fpFitCondition = null;
        let fpFitCoeffs = null;
        if (oneIdx >= 0) {
          value = fit.coeffs[oneIdx];
        } else {
          const XR = pts.map(p => [1, 1 / Math.max(1, p.N)]);
          const yR = residualBase.slice();
          const weightsR = pts.map((p, i) => {
            const frac = pts.length <= 1 ? 1 : i / (pts.length - 1);
            return 0.95 + 0.25 * frac;
          });
          const fitR = leastSquaresScaled(XR, yR, weightsR);
          fpFitCoeffs = fitR.coeffs.slice();
          fpFitCondition = fitR.conditionNumber;
          value = Number.isFinite(fitR.coeffs[0]) ? fitR.coeffs[0] : (median(residualBase) ?? mean(residualBase) ?? 0);
          const residualFine = pts.map((p, i) => yR[i] - (fitR.coeffs[0] + fitR.coeffs[1] / Math.max(1, p.N)));
          fpFitRms = rms(residualFine);
        }

        const fittedAllBase = curve.map(p => basisSpec.terms.reduce((s, t, i) => s + fit.coeffs[i] * t.fn(p), 0));
        const fittedAll = curve.map((p, i) => {
          const corr = oneIdx >= 0 ? value : (value + ((fpFitCoeffs && Number.isFinite(fpFitCoeffs[1])) ? fpFitCoeffs[1] / Math.max(1, p.N) : 0));
          return fittedAllBase[i] + corr;
        });
        const tailResidual = pts.map((p, i) => {
          const corr = oneIdx >= 0 ? value : (value + ((fpFitCoeffs && Number.isFinite(fpFitCoeffs[1])) ? fpFitCoeffs[1] / Math.max(1, p.N) : 0));
          return p.S - (fittedTailBase[i] + corr);
        });
        const tailRms = rms(tailResidual);
        const scale = Math.max(1e-9, Math.abs(value), ...pts.map(p => Math.abs(p.S)));
        const stability = clamp(1 - tailRms / scale, 0, 1);
        return {
          label: windowSpec.label,
          profileWeight: windowSpec.profileWeight,
          points: pts,
          startN: pts[0]?.N ?? null,
          endN: pts[pts.length - 1]?.N ?? null,
