          effectiveN: Math.sqrt(Math.max(1, (pts[0]?.N ?? 1) * (pts[pts.length - 1]?.N ?? 1))),
          fit,
          value,
          fitVals: fittedAll,
          tailRms,
          stability,
          conditionNumber: fit.conditionNumber,
          fpFitRms,
          fpFitCondition,
          fpFitCoeffs
        };
      }

      function computePairwiseFinitePart(pool) {
        if (!Array.isArray(pool) || pool.length < 2) return null;
        const pairs = [];
        for (let i = 0; i < pool.length; i++) {
          for (let j = i + 1; j < pool.length; j++) {
            const a = pool[i], b = pool[j];
            const Na = Math.max(1, a.effectiveN ?? a.startN ?? 1);
            const Nb = Math.max(1, b.effectiveN ?? b.startN ?? 1);
            if (!Number.isFinite(a.value) || !Number.isFinite(b.value) || Math.abs(Nb - Na) < 1e-9) continue;
            const c0 = (b.value * Nb - a.value * Na) / (Nb - Na);
            const sep = Math.abs(Nb - Na) / Math.max(Na, Nb);
            const baseWt = Math.max(1e-9, (a.aggRaw ?? 1) * (b.aggRaw ?? 1));
            const sepWt = clamp(sep / 0.22, 0.15, 1.0);
            const raw = baseWt * sepWt;
            pairs.push({ labels: [a.label, b.label], value: c0, raw });
          }
        }
        if (!pairs.length) return null;
        const vals = pairs.map(p => p.value).filter(Number.isFinite);
        if (!vals.length) return null;
        const center = median(vals) ?? mean(vals) ?? 0;
        const m = Math.max(1e-12, mad(vals, center));
        const rescored = pairs.map(pair => {
          const consensus = 1 / (1 + Math.pow(Math.abs(pair.value - center) / (2.5 * m), 2));
          return { ...pair, consensus, use: pair.raw * consensus };
        });
        const sumUse = rescored.reduce((s, pair) => s + pair.use, 0) || 1;
        const norm = rescored.map(pair => ({ ...pair, use: pair.use / sumUse }));
        const value = norm.reduce((s, pair) => s + pair.value * pair.use, 0);
        const robustSpread = mad(norm.map(pair => pair.value), value);
        return { value, robustSpread, table: norm };
      }

      function aggregateExtendedWindow(windowFits, basisSpec) {
        const vals = windowFits.map(wf => wf.value).filter(Number.isFinite);
        const center0 = median(vals) ?? windowFits[0]?.value ?? 0;
        const mad0 = Math.max(1e-9, mad(vals, center0));
        const accepted = windowFits.filter(wf => {
          const z = Math.abs(wf.value - center0) / mad0;
          const condOk = (wf.conditionNumber ?? Infinity) < 5e7;
          return z < 6 && condOk;
        });
        const pool = accepted.length >= 3 ? accepted : windowFits;
        const poolVals = pool.map(wf => wf.value);
        const center = median(poolVals) ?? center0;
        const localMad = Math.max(1e-9, mad(poolVals, center));
        const weighted = pool.map(wf => {
          const relErr = wf.tailRms / Math.max(1e-9, Math.abs(wf.value), ...wf.points.map(p => Math.abs(p.S)));
          const consensus = 1 / (1 + Math.pow(Math.abs(wf.value - center) / (2.5 * localMad), 2));
          const condPenalty = 1 / (1 + Math.log10(1 + Math.max(1, wf.conditionNumber ?? 1)));
          const stabilityBoost = Math.pow(Math.max(1e-6, wf.stability), 1.15);
          const profile = wf.profileWeight ?? 1;
          const raw = Math.max(1e-9, consensus * condPenalty * stabilityBoost * profile / Math.max(1e-9, 0.35 + 9 * relErr));
          return { ...wf, relErr, consensus, aggRaw: raw };
        });
        const sumRaw = weighted.reduce((s, wf) => s + wf.aggRaw, 0) || 1;
        const normalized = weighted.map(wf => ({ ...wf, aggUse: wf.aggRaw / sumRaw }));
        const directValue = normalized.reduce((s, wf) => s + wf.value * wf.aggUse, 0);
        const pairwise = computePairwiseFinitePart(normalized);
        const directRobustSpread = mad(normalized.map(wf => wf.value), directValue);
        let value = directValue;
        let robustSpread = directRobustSpread;
        let pairwiseValue = null;
        let pairwiseRobustSpread = null;
        let usedPairwise = false;
        let blendMode = 'direct-only';
        if (pairwise && Number.isFinite(pairwise.value)) {
          pairwiseValue = pairwise.value;
          pairwiseRobustSpread = pairwise.robustSpread;
          const directScale = Math.max(1e-9, Math.abs(directValue), directRobustSpread, 1);
          const pairScale = Math.max(1e-9, Math.abs(pairwise.value), pairwise.robustSpread ?? 0, 1);
          const pairBetter = (pairwise.robustSpread ?? Infinity) < directRobustSpread * 1.15;
          const pairNotWild = Math.abs(pairwise.value) < 40 * directScale + 5;
          if (pairBetter && pairNotWild) {
            value = 0.35 * directValue + 0.65 * pairwise.value;
            robustSpread = Math.min(directRobustSpread, pairwise.robustSpread ?? directRobustSpread);
            usedPairwise = true;
            blendMode = 'blend(0.35 direct + 0.65 pairwise)';
          } else {
            blendMode = `direct-only (pairwise suppressed: better=${pairBetter ? 'yes' : 'no'}, notWild=${pairNotWild ? 'yes' : 'no'})`;
          }
        } else {
          blendMode = 'direct-only (no valid pairwise estimate)';
        }
        const usedSpread = Math.max(...normalized.map(wf => Math.abs(wf.value - value)), 0);
        const avgStability = mean(normalized.map(wf => wf.stability)) ?? 0;
        const avgQuality = mean(normalized.map(wf => wf.aggUse * wf.consensus)) ?? 0;
        const fitError = mean(normalized.map(wf => wf.tailRms)) ?? 0;
        const conditionNumber = mean(normalized.map(wf => wf.conditionNumber)) ?? 0;
        const shrinkGain = vals.length >= 2 ? clamp(1 - usedSpread / Math.max(1e-9, Math.max(...vals) - Math.min(...vals)), 0, 1) : 1;
        const stability = clamp(
          0.24 + 0.34 * avgStability + 0.22 * shrinkGain + 0.16 * Math.sqrt(Math.max(0, avgQuality))
          - 0.10 * Math.min(1, robustSpread / Math.max(1, Math.abs(value)))
          - 0.08 * Math.min(1, Math.log10(1 + Math.max(1, conditionNumber)) / 6),
          0,
          1
        );
        const table = windowFits.map(wf => {
          const used = normalized.find(x => x.label === wf.label);
          return {
            label: wf.label,
            status: pool.some(x => x.label === wf.label) ? 'accepted' : 'rejected',
            value: wf.value,
            fitError: wf.tailRms,
            conditionNumber: wf.conditionNumber,
            stability: wf.stability,
            profileWeight: wf.profileWeight,
            consensus: used?.consensus ?? null,
            aggRaw: used?.aggRaw ?? null,
            aggUse: used?.aggUse ?? null
          };
        });
        return {
          value,
          stability,
          fitError,
          conditionNumber,
          robustSpread,
          usedSpread,
          rawSpread: vals.length ? Math.max(...vals) - Math.min(...vals) : 0,
          shrinkGain,
          avgQuality,
          acceptedWindowValues: normalized.map(wf => wf.value),
          rejectedWindowValues: table.filter(r => r.status === 'rejected').map(r => r.value),
          fitVals: normalized[0]?.fitVals ?? curve.map(p => p.S),
          basis: basisSpec.terms.map(t => t.label),
          pairwiseFinitePart: pairwiseValue,
          pairwiseRobustSpread,
          directFinitePart: directValue,
          finalFinitePart: value,
          usedPairwise,
          blendMode,
          pairwiseCount: pairwise?.table?.length ?? 0,
          table,
          pairwiseTable: pairwise?.table ?? []
        };
      }

      try {
        const primaryMode = chooseMode();
        if (primaryMode === 'extendedLog' || primaryMode === 'extendedNlogn') {
          const basisSpec = makeBasis(primaryMode);
          const windows = buildTailWindows(curve, primaryMode);
          const windowFits = windows.map(w => fitWindow(w, basisSpec));
          const agg = aggregateExtendedWindow(windowFits, basisSpec);
          return {
            method: 'window',
            status: 'diagnostic',
            value: null,
            stability: agg.stability,
            notes: [
              windowType === 'hann' ? 'Hann window diagnostics' : 'Blackman window diagnostics',
              basisSpec.label,
              'diagnostic-only for extended skeletons',
              'finite-part estimates collapse near zero; inspect details',
              'not used in ensemble'
            ],
            details: {
              diagnosticFinitePart: agg.finalFinitePart,
              curve: curve.map((p, i) => ({ ...p, fitted: agg.fitVals[i] })),
              fitError: agg.fitError,
              tailRms: agg.fitError,
              conditionNumber: agg.conditionNumber,
              windowSpread: agg.usedSpread,
              rawWindowSpread: agg.rawSpread,
              robustSpread: agg.robustSpread,
              spreadShrinkGain: agg.shrinkGain,
              avgWindowQuality: agg.avgQuality,
              acceptedWindowValues: agg.acceptedWindowValues,
              rejectedWindowValues: agg.rejectedWindowValues,
              pairwiseFinitePart: agg.pairwiseFinitePart,
              pairwiseRobustSpread: agg.pairwiseRobustSpread,
              directFinitePart: agg.directFinitePart,
              finalFinitePart: agg.finalFinitePart,
              usedPairwise: agg.usedPairwise,
              blendMode: agg.blendMode,
              pairwiseCount: agg.pairwiseCount,
              windowType,
              basis: agg.basis,
              windowTable: agg.table,
              pairwiseTable: agg.pairwiseTable
            }
          };
        }

        const tail = curve.slice(Math.max(0, curve.length - Math.min(10, curve.length)));
        function tryFit(basisSpec) {
          const X = tail.map(p => basisSpec.terms.map(t => t.fn(p)));
          const y = tail.map(p => p.S);
          const fit = leastSquaresScaled(X, y);
          const oneIdx = basisSpec.terms.findIndex(t => t.label === '1');
          const value = oneIdx >= 0 ? fit.coeffs[oneIdx] : fit.coeffs[fit.coeffs.length - 1];
          const fitVals = curve.map(p => basisSpec.terms.reduce((s, t, i) => s + fit.coeffs[i] * t.fn(p), 0));
          const tailResidual = tail.map((p, i) => p.S - basisSpec.terms.reduce((s, t, j) => s + fit.coeffs[j] * t.fn(p), 0));
          const tailRms = rms(tailResidual);
          const scale = Math.max(1e-9, Math.abs(value), ...tail.map(p => Math.abs(p.S)));
          const stability = clamp(1 - tailRms / scale, 0, 1);
          return { basisSpec, fit, value, fitVals, tailRms, stability };
        }

        const trialModes = primaryMode === 'exploratory'
          ? ['exploratory', 'constantGrowth']
          : [primaryMode, 'exploratory'];
        let result = null;
        let lastError = null;
        for (const mode of trialModes) {
          try {
            result = tryFit(makeBasis(mode));
            break;
          } catch (err) {
            lastError = err;
          }
        }
        if (!result) throw lastError || new Error('window fit failed');
        return {
          method: 'window',
          status: result.basisSpec.label.includes('exploratory') ? 'exploratory' : 'success',
          value: result.value,
          stability: result.stability,
          notes: [
            windowType === 'hann' ? 'Hann window finite-part estimate' : 'Blackman window finite-part estimate',
            result.basisSpec.label,
            ...(result.basisSpec.label.includes('exploratory') ? ['not used in ensemble'] : [])
          ],
          details: {
            curve: curve.map((p, i) => ({ ...p, fitted: result.fitVals[i] })),
            fitError: result.fit.rms,
            tailRms: result.tailRms,
            windowType,
            basis: result.basisSpec.terms.map(t => t.label)
          }
        };
      } catch (err) {
        return {
          method: 'window',
          status: 'failed',
          value: null,
          stability: null,
          notes: [String(err.message || err)],
          details: { curve, windowType }
        };
      }
    }

    function buildEnsemble(results) {
      const successResults = results.filter(r => {
        if (!(Number.isFinite(r.value) && (r.status === "success" || r.status === "exploratory"))) return false;
        if (r.method === 'window') {
          const notes = r.notes || [];
          const exploratory = notes.some(n => String(n).includes('exploratory growth basis'));
          const excluded = notes.some(n => String(n).includes('not used in ensemble'));
          if (exploratory || excluded) return false;
        }
        if (r.method === 'expCutoff') {
          const notes = r.notes || [];
          const provisional = notes.some(n => String(n).includes('provisional: not used in ensemble'));
          if (provisional) return false;
        }
        return true;
      });
      const vals = successResults.map(r => r.value);
      if (!vals.length) {
        return { mean: null, median: null, maxDeviation: null, agreement: null };
      }
      if (vals.length === 1) {
        const only = successResults[0];
        const unstable = typeof only.stability === 'number' ? only.stability < 0.9 : false;
        const suspicious = (only.details?.conditionNumber ?? 0) > 1e12;
        return {
          mean: vals[0],
          median: vals[0],
          maxDeviation: null,
          agreement: suspicious || unstable ? 'low' : 'insufficient'
        };
      }
      const sorted = [...vals].sort((a, b) => a - b);
      const meanVal = mean(vals);
      const medianVal = sorted.length % 2 ? sorted[(sorted.length - 1) / 2] : (sorted[sorted.length / 2 - 1] + sorted[sorted.length / 2]) / 2;
      const ref = medianVal;
      const maxDeviation = Math.max(...vals.map(v => Math.abs(v - ref)));
      let agreement = "split";
      if (maxDeviation < 1e-4) agreement = "high";
      else if (maxDeviation < 1e-3) agreement = "moderate";
      else if (maxDeviation < 1e-2) agreement = "low";
      return { mean: meanVal, median: medianVal, maxDeviation, agreement };
    }

    function runBuiltInTests(settings) {
      const results = [];
      for (const tc of TEST_CASES) {
        try {
          const testNmax = (
            tc.id === 'T004' ? 8192 :
            tc.category === 'fourier' ? 65536 :
            tc.category === 'fourier-dc' ? 65536 :
            tc.category === 'extended' ? 65536 :
            tc.category === 'oscillation' ? 16384 :
            4096
          );
          const testSettings = tc.settingsPatch
            ? {
                ...settings,
                ...tc.settingsPatch,
                modelDetection: {
                  ...settings.modelDetection,
                  ...(tc.settingsPatch.modelDetection || {})
                },
                expCutoff: {
                  ...settings.expCutoff,
                  ...(tc.settingsPatch.expCutoff || {})
                },
                window: {
                  ...settings.window,
                  ...(tc.settingsPatch.window || {})
                }
              }
            : settings;
          const bundle = runFullAnalysis({
            expression: tc.expr,
            params: {},
            Nmax: testNmax,
            settings: testSettings
          });
          let actual = null;
          let status = 'missing';
          let pass = false;
          let error = Infinity;

          if (tc.method === 'modelType') {
            actual = bundle.modelDetection?.type ?? null;
            status = actual ? 'success' : 'missing';
            pass = actual === tc.expected;
            error = pass ? 0 : Infinity;
          } else if (tc.method === 'windowStatus') {
            const target = bundle.results.find(r => r.method === 'window');
            actual = target?.status ?? null;
            status = actual || 'missing';
            pass = actual === tc.expected;
            error = pass ? 0 : Infinity;
          } else if (tc.method === 'abelStatus') {
            const target = bundle.results.find(r => r.method === 'abel');
            actual = target?.status ?? null;
            status = actual || 'missing';
            pass = actual === tc.expected;
            error = pass ? 0 : Infinity;
          } else if (tc.method === 'expStatus') {
            const target = bundle.results.find(r => r.method === 'expCutoff');
            actual = target?.status ?? null;
            status = actual || 'missing';
            pass = actual === tc.expected;
            error = pass ? 0 : Infinity;
          } else if (tc.method === 'ensembleEmpty') {
            actual = bundle.ensemble?.median == null;
            status = 'success';
            pass = actual === tc.expected;
            error = pass ? 0 : Infinity;
          } else if (tc.method === 'expStabilityMax') {
            const target = bundle.results.find(r => r.method === 'expCutoff');
            actual = target?.stability ?? null;
            status = Number.isFinite(actual) ? 'success' : 'missing';
            pass = Number.isFinite(actual) && actual < tc.expected;
            error = pass ? 0 : Infinity;
          } else {
            const target = bundle.results.find(r => r.method === tc.method);
            actual = target?.value;
            status = target?.status || 'missing';
            error = Math.abs((actual ?? NaN) - tc.expected);
            pass = Number.isFinite(actual) && error <= tc.tol;
          }

          results.push({
            ...tc,
            actual,
            error,
            pass,
            status
          });
        } catch (e) {
          results.push({ ...tc, actual: null, error: Infinity, pass: false, status: String(e.message || e) });
        }
      }
      return results;
    }

    function summarizeTests(testResults) {
      const total = testResults.length;
      const passed = testResults.filter(t => t.pass).length;
      const byCategory = {};
      for (const t of testResults) {
        const key = t.category || 'other';
        if (!byCategory[key]) byCategory[key] = { total: 0, passed: 0 };
        byCategory[key].total += 1;
        if (t.pass) byCategory[key].passed += 1;
      }
      return { total, passed, byCategory };
    }

    function buildDiagnostics(bundle) {
      const out = [];
      const exp = bundle.results.find(r => r.method === "expCutoff");
      if (bundle.input.Nmax <= 128) out.push(`⚠ Nmax=${bundle.input.Nmax} may be too small for reliable estimation.`);
      if (bundle.modelDetection.confidence === "uncertain") out.push("⚠ Skeleton estimate is uncertain. Consider manual specification.");
      if (exp?.details?.conditionNumber > 1e8) out.push(`⚠ Fit condition number is high (${formatNum(exp.details.conditionNumber, 6)}). Result may be unstable.`);
      if (bundle.ensemble.maxDeviation != null && bundle.ensemble.maxDeviation > 1e-2) out.push("⚠ Methods disagree significantly. Check individual results.");
      if (bundle.modelDetection.type === "none" && bundle.results.find(r => r.method === "hurwitz")?.status === "not_applicable") {
        out.push("⚠ Sequence is not quasi-polynomial/power-law in the supported Phase 1 sense. Hurwitz path is skipped.");
      }
      if (bundle.modelDetection.type === 'fourier') {
        const peakAmps = (bundle.modelDetection.peaks || []).map(p => p.amplitude || 0);
        const strongestAmp = peakAmps.length ? Math.max(...peakAmps) : 0;
        const dcAbs = Math.abs(bundle.modelDetection.dcComponent ?? 0);
        if (dcAbs > 3 * Math.max(1e-9, strongestAmp)) {
          out.push(`ℹ DC component is dominant (${formatNum(bundle.modelDetection.dcComponent, 6)}). For bounded oscillatory data, dcEstimate may be more informative than Abel.`);
        }
      }
      return out;
    }

    function exportBundle(bundle) {
      const replacer = (key, value) => {
        if (value instanceof Float64Array) return Array.from(value);
        return value;
      };
      return JSON.stringify(bundle, replacer, 2);
    }

    function runFullAnalysis({ expression, params, Nmax, settings }) {
      const sequence = generateSequence(expression, params, Nmax);
      const modelDetection = detectModel(sequence, settings.modelDetection);
      const results = [
        hurwitzRegularize(modelDetection, sequence),
        expCutoffRegularize(sequence, modelDetection, settings.expCutoff),
        windowRegularize(sequence, modelDetection, settings.window || {}),
        cesaroRegularize(sequence, settings.cesaro || {}),
        abelRegularize(sequence, modelDetection, settings.abel || {}),
      ];

      const hurwitzRes = results.find(r => r.method === 'hurwitz' && r.status === 'success' && Number.isFinite(r.value));
      const expRes = results.find(r => r.method === 'expCutoff' && r.status === 'success' && Number.isFinite(r.value));
      const winIdx = results.findIndex(r => r.method === 'window' && (r.status === 'success' || r.status === 'exploratory') && Number.isFinite(r.value));
      if (winIdx >= 0) {
        const refs = [hurwitzRes?.value, expRes?.value].filter(Number.isFinite);
        if (refs.length) {
          const ref = refs[0];
          const w = results[winIdx];
          const diff = Math.abs(w.value - ref);
          const scale = Math.max(1e-9, Math.abs(ref), ...refs.map(v => Math.abs(v)));
          if (diff > Math.max(1e-3, 1e-2 * scale)) {
            results[winIdx] = {
              ...w,
              status: 'exploratory',
              notes: [...(w.notes || []), `large disagreement with reference methods (Δ=${formatNum(diff, 6)})`, 'not used in ensemble']
            };
          }
        }
      }

      const ensemble = buildEnsemble(results);
      const bundle = {
        input: { expression, params, Nmax },
        sequence,
        modelDetection,
        results,
        ensemble,
        diagnostics: [],
        meta: { version: "0.5-phase1-prototype", generatedAt: new Date().toISOString() }
      };
      bundle.diagnostics = buildDiagnostics(bundle);
      return bundle;
    }

    function summaryRows(bundle) {
      const rows = bundle.results.map(r => ({
        method: r.method,
        status: r.status,
        value: r.value,
        stability: r.stability,
        notes: r.notes.join('; ')
      }));
      if (bundle.modelDetection?.type === 'fourier' && Math.abs(bundle.modelDetection.dcComponent ?? 0) > 1e-9) {
        const dcDetails = bundle.modelDetection?.dcDetails || {};
        const dcStability = Number.isFinite(dcDetails.stability) ? dcDetails.stability : (bundle.modelDetection.confidence === 'good' ? 0.9 : 0.75);
        rows.push({
          method: 'dcEstimate',
          status: 'derived',
          value: bundle.modelDetection.dcComponent,
          stability: dcStability,
          notes: dcDetails.note || 'Fourier skeleton DC component (time-average candidate for bounded oscillatory data)'
        });
      }
      rows.push({
        method: "ensemble",
        status: "summary",
        value: bundle.ensemble.median,
        stability: bundle.ensemble.agreement,
        notes: (bundle.ensemble.agreement === 'insufficient' || bundle.ensemble.maxDeviation == null)
          ? 'only one successful method'
          : `max deviation=${formatNum(bundle.ensemble.maxDeviation, 6)}`
      });
      return rows;
    }

    function toScatterData(sequence, limit = 256) {
      const step = Math.max(1, Math.floor(sequence.length / limit));
      const out = [];
      for (let i = 0; i < sequence.length; i += step) out.push({ n: i + 1, a: sequence[i] });
      return out;
    }

    function toLineData(bundle, limit = 256) {
      const seq = bundle.sequence;
      const sk = bundle.modelDetection.skeleton || new Float64Array(seq.length);
      const re = bundle.modelDetection.residual || new Float64Array(seq.length);
      const step = Math.max(1, Math.floor(seq.length / limit));
      const out = [];
      for (let i = 0; i < seq.length; i += step) {
        out.push({ n: i + 1, seq: seq[i], skeleton: sk[i], residual: re[i] });
      }
      return out;
    }

    function download(filename, text) {
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function App() {

        expCutoff: { epsMin: 0.001, epsMax: 0.5, samples: 60, extendedPromoteThreshold: 0.9, extendedConditionThreshold: 1e9, extendedMinWindows: 4 },
        window: { Nmin: 256, Nmax: 65536, samples: 16, windowType: 'hann' },

      });

      const applyPreset = (name) => {

      const testSummary = summarizeTests(testResults);

      return (
        <div className="max-w-7xl mx-auto p-6 space-y-6">

          </div>

          <div className="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 text-sm text-slate-300">

              <li><span className="text-slate-100">sin(cos(n))</span>, <span className="text-slate-100">cos(sin(n))</span>, <span className="text-slate-100">abs(sin(n))</span> で <span className="text-slate-100">dcEstimate</span> を試す</li>
              <li><span className="text-slate-100">log(n)</span>, <span className="text-slate-100">n*log(n)</span>, <span className="text-slate-100">floor(sqrt(n))</span> は exploratory の例として読む</li>
            </ul>

            <div>
              <label className="block text-sm text-slate-300 mb-2">Preset</label>
              <select className="w-full bg-slate-950 border border-slate-700 rounded-xl p-2" value={preset}
                onChange={(e) => applyPreset(e.target.value)}>
                {PRESETS.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
              </select>

                        <li>大域成長の診断 (<code className="text-xs">floor(sqrt(n))</code>)</li>
                        <li>extended補助 (<code className="text-xs">log(n)</code>)</li>
                        <li>他手法の比較用 (<code className="text-xs">n, n^2</code>)</li>
                      </ul>
                    </div>
                  </div>

                  {/* Cesàro */}
                  <div className="bg-slate-950 border border-slate-800 rounded-xl p-4">
                    <h4 className="font-semibold text-slate-100">Cesàro</h4>
                    <p className="mt-2 text-xs text-slate-400">部分和の平均を見る。「普通の和は揺れるが、平均すると落ち着く」交代列や有界振動に向く。</p>
                    <div className="mt-3 text-sm">
                      <span className="text-emerald-300 font-medium text-xs block mb-1">向いている式:</span>
                      <code className="text-xs bg-slate-800 px-1 rounded block mb-1">(-1)^n</code>
                      <code className="text-xs bg-slate-800 px-1 rounded block">(n % 2 == 0) ? 1 : 0</code>
                    </div>
                  </div>

                  {/* Abel */}
                  <div className="bg-slate-950 border border-slate-800 rounded-xl p-4">
                    <h4 className="font-semibold text-slate-100">Abel</h4>
                    <p className="mt-2 text-xs text-slate-400">生成関数的な極限 <code className="text-xs bg-slate-800 px-1 rounded">x→1-</code> を見る。単一周波数の振動列・Fourier的な列の収束を捉えるのに強い。</p>
                    <div className="mt-3 text-sm">
                      <span className="text-emerald-300 font-medium text-xs block mb-1">向いている式:</span>
                      <span className="text-xs bg-slate-800 px-1 rounded mr-1 leading-loose">(-1)^n</span>
                      <span className="text-xs bg-slate-800 px-1 rounded mr-1 leading-loose">sin(n)</span>
                      <span className="text-xs bg-slate-800 px-1 rounded mr-1 leading-loose">cos(n)</span>
                      <span className="text-xs bg-slate-800 px-1 rounded mr-1 leading-loose">sin(2*n)</span>
                    </div>
                  </div>

                  {/* Fourier / dcEstimate */}
                  <div className="bg-slate-950 border border-slate-800 rounded-xl p-4">
                    <h4 className="font-semibold text-slate-100">Fourier / dcEstimate</h4>
                    <p className="mt-2 text-xs text-slate-400">有界で複雑に揺れる列について、DC（直流）成分を分離し、時間平均候補として提示する。</p>
                    <div className="mt-3 text-sm">
                      <span className="text-emerald-300 font-medium text-xs block mb-1">向いている式:</span>
                      <span className="text-xs bg-slate-800 px-1 rounded mr-1 leading-loose">sin(cos(n))</span>
                      <span className="text-xs bg-slate-800 px-1 rounded mr-1 leading-loose">cos(sin(n))</span>
                      <span className="text-xs bg-slate-800 px-1 rounded mr-1 leading-loose">abs(sin(n))</span>
                    </div>
                  </div>
                </div>
              </section>

              <section>
                <h3 className="text-xl font-semibold text-slate-200 mb-3 border-b border-slate-700 pb-2">3. 各計算法の精度向上と拡張方針</h3>
                <div className="space-y-4">
                  <div className="bg-slate-900 rounded-xl p-4 border border-violet-900">
                    <h4 className="font-medium text-violet-300 mb-2">今後の主眼：Hurwitz の mixed power 拡張</h4>
                    <p className="text-sm mb-3">
                      目標：<code className="bg-slate-950 text-slate-300 px-1 py-0.5 rounded">n^(3/2) + n^(7/5)</code> のように複数の成分が混ざる列を扱えるようにする。
                    </p>
                    <ol className="list-decimal pl-5 text-sm space-y-1 text-slate-300">
                      <li><strong>peeling 型検出:</strong> 支配的な冪を推定し、引いた残差から次の冪を探す。</li>
                      <li><strong>混合 Hurwitz 和:</strong> 検出した各成分 <code className="text-xs border border-slate-700 px-1">c_j n^α_j</code> を <code className="text-xs border border-slate-700 px-1">c_j ζ(-α_j)</code> にマップする。</li>
                      <li><strong>periodic + mixed:</strong> さらに residue class（剰余類）×混合冪へと繋げる。</li>
                    </ol>
                  </div>
                  <div className="grid md:grid-cols-2 gap-4">
                    <div>
                      <h4 className="font-medium text-slate-200 mb-1">Exp Cutoff の改善</h4>
                      <ul className="list-disc pl-5 text-sm space-y-1 text-slate-400">
                        <li>基底・窓・条件数管理の厳格化。</li>
                        <li>ε範囲の自動最適化。</li>
                        <li>骨格 contribution を理論式で別管理し、残差 fit と合成する二層構造化。</li>
                      </ul>
                    </div>
                    <div>
                      <h4 className="font-medium text-slate-200 mb-1">Window & Abel の改善</h4>
                      <ul className="list-disc pl-5 text-sm space-y-1 text-slate-400">
                        <li>Window: Tukey / Kaiser など窓 family の拡張と、品質ベースの診断UI強化。</li>
                        <li>Abel: tail 外挿次元の自動化(線形/2次/Pade)と、Fourier 情報による補助の統合。</li>
                      </ul>
                    </div>
                  </div>
                </div>
              </section>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
