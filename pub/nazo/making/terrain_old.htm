  const copy = [...arr];
  const result = [];
  for (let i = 0; i < Math.min(n, copy.length); i++) {
    const idx = Math.floor(Math.random() * copy.length);
    result.push(copy.splice(idx, 1)[0]);

  return result;
};

const gaussRandom = (mean, stddev) => {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v) * stddev + mean;
};
const rollLevel = (center, spread) => Math.max(1, Math.min(200, Math.round(gaussRandom(center, spread))));

  canyon:{peaceful:["浅い渓谷。小川が流れ、壁面に色とりどりの地層が見える。"],easy:["交易路として使われる峡谷。馬車がすれ違える程度の幅がある。"],moderate:["深い裂け目。底が見えず、壁面から奇妙な鉱石が露出している。"],hard:["峡谷が呼吸している。壁が周期的に迫り、潰されないよう走り抜ける必要がある。"],extreme:["この峡谷は世界に走った亀裂だ。壁の向こう側は別の次元が見える。"],mythic:["神が世界を作りかけて放棄した断面。地層に『設計変更メモ』が化石として残っている。"],transcendent:["深さが無限の峡谷。落ちた者は永遠に落ち続け、やがて落下そのものと同化する。"],incomprehensible:["裂け目ではない。世界が二つに分裂した証拠だ。あなたは今、どちら側にいるのか。"]},

  ruins:{peaceful:["古い村の跡。石壁の残骸に蔦が絡み、花が咲いている。穏やかな廃墟。"],easy:["かつての砦の跡。冒険者が残した焚き火跡と、簡易的な野営地がある。"],moderate:["巨大な神殿の廃墟。柱が倒れ、床に魔法陣の痕跡が残っている。"],hard:["崩壊した遺跡が自己修復を始めている。石が勝手に積み上がり、かつての姿を取り戻そうとしている。"],extreme:["時間が巻き戻り始めた遺跡。崩壊前の姿と廃墟が重なって見える。住人の幽影が日常を繰り返している。"],mythic:["この遺跡は未来の文明の跡だ。まだ発明されていない技術の残骸が散らばっている。"],transcendent:["遺跡が記憶している。訪れた者すべての人生を壁に刻む。あなたの未来もすでに刻まれている。"],incomprehensible:["ここに文明があった証拠はない。しかし遺跡がある。遺跡だけが先に存在し、文明が後から生まれるのを待っている。"]},

  abyss:{peaceful:["底の浅い裂け目。暗いが温かく、発光するキノコが道を照らしている。"],easy:["冒険者が調査済みの浅い深淵。ロープと目印が設置されている。"],moderate:["光の届かない深淵。自分の心臓の音だけが聞こえる。何かがそれに合わせて脈動している。"],hard:["深淵が見つめ返してきた。比喩ではなく、文字通り巨大な眼球が底にある。"],extreme:["ここは世界の下水道だ。あらゆる恐怖、忘れたい記憶、後悔が液体となって溜まっている。"],mythic:["深淵の底に扉がある。扉の向こうは『世界が存在しなかった場合の世界』だ。"],transcendent:["深淵そのものが意識を持ち、あなたに問いかけてくる。『なぜ落ちてきた？ 落としたのは私ではない。お前自身だ。』"],incomprehensible:["深さの限界を超えた。もはや深淵ではない。これは深淵が見る夢の中だ。"]},

// ─── DATA: CHAOS ────────────────────────────────────────────────────
const CP=["天空","地底","逆さまの","燃える","凍った","歌う","腐りゆく","時間が止まった","夢の中の","影の","水没した","浮遊する","回転する","透明な","裏返しの","記憶の中の","数式で構成された","言語でできた","感情が堆積した","誰かの夢の"];
const CD=["空に海が広がり、海の底に太陽がある。重力が90度横を向いている。","地面が鏡面で、空もまた鏡面だ。無限に反射する自分の姿の中で本物が分からない。","音が可視化され、色が聞こえる。共感覚が地形として固定されている。","過去の建物と未来の建物が同時に存在する。縄文式住居とサイバーパンクなビルが隣接する。","文字が地面から生えている。踏むと意味が変わる。「安全」を踏むと「危険」に変わった。","ここでは嘘が物理法則になっている。「火は冷たい」と言えば火が冷たくなる。","季節が一歩ごとに変わる。右足が春で左足が冬。","数学の定理が物理的な構造物として存在する。ゲーデルの不完全性定理は常に一つ足りない階段だ。","プールと教室とお墓が融合した空間。水中で授業を受けながら死者が復活するカリキュラム。","楽譜が地形になっている。ト音記号の丘を登り、全休符の谷間で休憩する。","ここは比喩が実体化する場所だ。「心が折れる」と言うと胸から折れた棒が出てくる。","全てが逆再生されている。木は地面に吸い込まれ、雨は空に昇る。","この場所は『括弧』の中にある。すべてが注釈であり、本文がどこにも存在しない。","全てが食べ物でできている世界だが食べようとすると岩に変わる。観測問題。","あらゆるものが半透明。存在の不透明度が50%に設定されている。"];
const CTC=["が融合し、さらにその上に","の残骸の上に","と量子もつれした","を母体として寄生する","の夢が実体化して生まれた","を材料に錬成された","と敵対的共生関係にある"];

// ─── GENERATOR ──────────────────────────────────────────────────────
function generateMap(center=100,spread=70){
  const level=rollLevel(center,spread);
  const tierInfo=getLevelTier(level);
  const chaosRoll=Math.random()*100;
  const t3=level>100?8:level>50?5:3;
  const t2=level>100?30:level>50?20:12;
  const isTriple=chaosRoll<t3;
  const isDouble=!isTriple&&chaosRoll<t2;
  const isChaos=isTriple||isDouble;
  let biomeName,biomeIcon,isChaosMap=false,chaosLevel=0,biomeIds=[];

  if(isTriple){
    const bs=pickN(BIOMES,3);biomeIds=bs.map(b=>b.id);
    biomeName=`${pick(CP)}${bs[0].name}${bs[1].name}${pick(CTC)}${bs[2].name}`;
    biomeIcon=bs.map(b=>b.icon).join("");isChaosMap=true;chaosLevel=3;
  }else if(isDouble){
    const bs=pickN(BIOMES,2);biomeIds=bs.map(b=>b.id);
    biomeName=(chance(40)?pick(CP):"")+bs[0].name+bs[1].name;
    biomeIcon=bs[0].icon+bs[1].icon;isChaosMap=true;chaosLevel=2;
  }else{
    const b=pick(BIOMES);biomeIds=[b.id];biomeName=b.name;biomeIcon=b.icon;
  }
  const bid=i=>biomeIds[i%biomeIds.length];
  const tier=tierInfo.tier;

  // Landscape
  let landscape;
  if(isChaosMap){
    const chaosBase=pick(CD);
    const ps=biomeIds.map(id=>{const d=L[id]?.[tier];return d?pick(d):"";});
    landscape=chaosBase+"\n\n"+biomeName+"特有の現象として、";
    if(chaosLevel===3){
      landscape+=ps[0].slice(0,ps[0].length/3|0)+"……しかし同時に、"+ps[1].slice(ps[1].length/3|0,(ps[1].length*2/3)|0)+"……そしてなぜか、"+ps[2].slice(ps[2].length/2|0);
      landscape+="\n\nこの地形を記述しようとした地理学者は三人が発狂し、一人が別の次元に引っ越した。";
    }else{
      landscape+=ps[0].slice(0,ps[0].length/2|0)+"……と同時に、"+ps[1].slice(ps[1].length/2|0);
      landscape+="\n\nなお、この地形に関する学術論文は査読を通らなかった。";
    }
  }else{
    landscape=pick(L[bid(0)]?.[tier]||["不思議な景色が広がっている。"]);
  }

  const vegs=biomeIds.map(id=>pick(V[id]||["不明な植物"]));
  const vegetation=isChaosMap?(chaosLevel===3?`${vegs[0]}と${vegs[1]}と${vegs[2]}が三つ巴で生態系を形成。学名をつけようとした植物学者のペンが折れた。`:`${vegs[0]}と${vegs[1]}が不可能な形で共生。植物学者が見たら気絶する。`):`${vegs[0]}や${pick(V[bid(0)]||["草"])}が自生している。`;
  const clims=biomeIds.map(id=>pick(C[id]||["不明"]));
  const climate=isChaosMap?(chaosLevel===3?`${clims.join("と")}が同一地点で同時発生。気象庁が「もう知らん」と声明。`:`${clims[0]}かと思えば${clims[1]}。天気予報士が匙を投げた。`):`気候: ${clims[0]}`;

  let items=[pick(I[bid(0)]||["？"]),pick(I[bid(0)]||["？"])];
  if(isChaosMap)biomeIds.slice(1).forEach(id=>items.push(pick(I[id]||["次元の欠片"])));
  if(level>80)items.push(pick(IH));if(level>150)items.push(pick(IH));
  items=[...new Set(items)];

  // Sister
  let sisterComment;
  if(isChaosMap){
    const r1=SB[bid(0)]?pick(SB[bid(0)]):pick(ST[tier]);
    const r2=biomeIds.length>1&&SB[bid(1)]?pick(SB[bid(1)]):null;
    sisterComment=r2&&chance(60)?r1+"\n\n（数秒後）\n\n"+r2+"\n\n妹の感情が地形に追いつけていない。":pick(ST[tier]);
  }else{
    sisterComment=chance(50)&&SB[bid(0)]?pick(SB[bid(0)]):pick(ST[tier]);
  }

  // Monsters
  const mc=isChaosMap?roll(3)+2:roll(3)+1;
  const monsters=[];
  for(let i=0;i<mc;i++){
    const useC=isChaosMap?chance(chaosLevel===3?85:70):chance(level>60?25:10);
    const adj=pick(MA[tier]||["謎の"]);
    if(useC){
      const p1=[...BM,...(BIM[bid(0)]||[])];
      const p2=isChaosMap?[...BM,...(BIM[bid(1)]||[]),...(biomeIds[2]?BIM[bid(2)]||[]:[])]:p1;
      const m1=pick(p1);let m2=pick(p2);while(m2===m1)m2=pick(p2);
      monsters.push({name:`${adj}${m1}${m2}`,chimera:true});
    }else{
      monsters.push({name:`${adj}${pick([...BM,...(BIM[bid(0)]||[])])}`,chimera:false});
    }
  }

  const waterName=pick(WB[bid(0)]||["水場"]);
  const waterDesc=pick(WD[tier]||["水がある。"]);
  let water;
  if(isChaosMap){
    const ew=biomeIds.slice(1).map(id=>pick(WB[id]||["異次元の液体"]));
    water=`【${waterName}×${ew.join("×")}】\n${waterDesc}\n……ただし、ここでは水の物理法則が${chaosLevel===3?"三重に":""}破綻している。`;
  }else water=`【${waterName}】\n${waterDesc}`;

  const ugB=UB[bid(0)]||"地下の様子は不明";
  const ugD=pick(UD[tier]||["特に異常はない。"]);
  let underground;
  if(isChaosMap){
    const ex=biomeIds.slice(1).map(id=>UB[id]||"別の地下");
    underground=`${ugB}。しかし${ex.join("であると同時に")}でもある。地下が${chaosLevel}重に重なる。\n${ugD}`;
  }else underground=`${ugB}。\n${ugD}`;

  // Events
  const ec=isChaosMap?roll(2)+1:(chance(60)?1:chance(30)?2:0);
  const events=[];
  if(ec>0){
    const ct=pickN(EV_TYPES,ec);
    for(const type of ct){
      const te=EV[type][tier]||EV[type].peaceful;
      events.push({type,typeLabel:EV_LABELS[type],...pick(te)});
    }
  }

  // Blocks
  const mods=BLOCK_MODS[tier]||[];
  const addMod=(name)=>mods.length>0&&chance(40)?pick(mods)+name:name;
  let blocks=[];
  if(isChaosMap){
    // All required from each biome
    for(const id of biomeIds){
      const b=BLOCKS[id];if(!b)continue;
      for(const r of b.required)blocks.push({name:addMod(r),required:true,from:id});
    }
    // Pick 1-2 optional from combined pools
    const allOpt=biomeIds.flatMap(id=>(BLOCKS[id]?.optional||[]).map(o=>({name:o,from:id})));
    const optPicks=pickN(allOpt,roll(2));
    for(const o of optPicks)blocks.push({name:addMod(o.name),required:false,from:o.from});
  }else{
    const b=BLOCKS[bid(0)];
    if(b){
      for(const r of b.required)blocks.push({name:addMod(r),required:true,from:bid(0)});
      const optPicks=pickN(b.optional,roll(2));
      for(const o of optPicks)blocks.push({name:addMod(o),required:false,from:bid(0)});
    }
  }
  // Deduplicate by name
  blocks=[...new Map(blocks.map(b=>[b.name,b])).values()];

  return{level,tierInfo,biomeName,biomeIcon,isChaosMap,chaosLevel,landscape,vegetation,climate,items,sisterComment,monsters,water,underground,events,blocks};
}


// ─── STATE ──────────────────────────────────────────────────────────
let currentDifficulty = DIFFICULTY_PRESETS[2];
let history = [];
let historyVisible = false;

// ─── HELPERS ────────────────────────────────────────────────────────
const esc = s => s.replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nl2br = s => esc(s).replace(/\n/g,'<br>');

function levelColor(lv){
  if(lv<=5)return"#6ec46e";if(lv<=15)return"#8bc34a";if(lv<=30)return"#ffc107";
  if(lv<=50)return"#ff9800";if(lv<=70)return"#f44336";if(lv<=100)return"#9c27b0";
  if(lv<=150)return"#e040fb";return"#ff1744";
}
function eventColor(t){return{treasure:"#ffd700",npc:"#66bbff",trap:"#ff6666",phenomenon:"#bb88ff",campsite:"#66cc88"}[t]||"#888"}

// ─── DIFFICULTY SELECTOR ────────────────────────────────────────────
function renderDiffGrid(){
  const grid=document.getElementById('diffGrid');
  grid.innerHTML=DIFFICULTY_PRESETS.map(d=>
    `<button class="diff-btn ${currentDifficulty.id===d.id?'active':''}" onclick="setDiff('${d.id}')">
      <div class="icon">${d.icon}</div><div class="label">${d.label}</div>
    </button>`
  ).join('');
  document.getElementById('diffDesc').innerHTML=
    `${currentDifficulty.desc}<span style="color:#333;margin-left:8px">(中心Lv.${currentDifficulty.center} ±${currentDifficulty.spread})</span>`;
}
function setDiff(id){
  currentDifficulty=DIFFICULTY_PRESETS.find(d=>d.id===id);
  renderDiffGrid();
}

// ─── GENERATE ───────────────────────────────────────────────────────
function generate(){
  const btn=document.getElementById('genBtn');
  btn.textContent='生 成 中 ...';btn.disabled=true;
  document.getElementById('empty').style.display='none';
  setTimeout(()=>{
    const m=generateMap(currentDifficulty.center,currentDifficulty.spread);
    history.unshift(m);if(history.length>50)history.pop();
    renderMap(m);
    renderHistBtn();
    btn.textContent='地 形 を 生 成';btn.disabled=false;
  },300);
}

// ─── RENDER MAP ─────────────────────────────────────────────────────
function renderMap(m){
  const lc=levelColor(m.level);
  const chaosClass=m.chaosLevel===3?'triple-chaos-text':m.isChaosMap?'chaos-text':'';
  const titleSize=m.biomeName.length>12?'16px':'24px';
  const titleLS=m.biomeName.length>12?'1px':'6px';
  const titleColor=m.chaosLevel===3?'#ff88ff':m.isChaosMap?'#ff66ff':'#e0dcd0';
  const borderColor=m.chaosLevel===3?'#ff44ff33':'#2a2a3a';
  const bgTitle=m.chaosLevel===3?'linear-gradient(180deg,#1a0a1f,#120a18)':'linear-gradient(180deg,#12121f,#0e0e1a)';
  const chaosBadge=m.isChaosMap?`<span class="chaos-badge ${m.chaosLevel===3?'triple-badge':''}">${m.chaosLevel===3?'超混沌マップ':'混沌マップ'}</span>`:'';
  const lvClass=m.level>100?'high-level':'';

  let html=`
    <div class="section" style="text-align:center;margin-bottom:32px;padding:24px;border:1px solid ${borderColor};background:${bgTitle}">
      <div style="font-size:48px;margin-bottom:8px" class="${chaosClass}">${m.biomeIcon}</div>
      <h2 style="font-size:${titleSize};font-weight:900;letter-spacing:${titleLS};color:${titleColor};margin-bottom:8px;line-height:1.5" class="${chaosClass}">${esc(m.tierInfo.label+m.biomeName)}</h2>
      ${chaosBadge}
      <div style="margin-top:12px;display:inline-block;padding:4px 20px;border:1px solid ${lc}44;color:${lc};font-size:14px;letter-spacing:3px" class="${lvClass}">LEVEL ${m.level}</div>
      <p style="margin-top:8px;font-size:12px;color:#888;letter-spacing:2px">${esc(m.tierInfo.desc)}</p>
    </div>`;

  html+=sec('風景','🗺️',`<p style="line-height:1.9;white-space:pre-wrap">${esc(m.landscape)}</p>`);
  html+=sec('植生・気候','🌿',`<p style="line-height:1.8">${esc(m.vegetation)}</p><p style="line-height:1.8;margin-top:8px;color:#999">${esc(m.climate)}</p>`);

  // Blocks
  if(m.blocks.length>0){
    html+=sec('地形ブロック','🧱',m.blocks.map(b=>{
      const color=b.required?'#a0b8c8':'#8a8a7a';
      const borderC=b.required?'#4a6a7a':'#3a3a3a';
      const tag=b.required?`<span style="font-size:9px;padding:0 4px;border:1px solid ${borderC};color:${color};margin-left:6px;letter-spacing:1px;opacity:.7">必須</span>`:'';
      return `<div style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;margin:0 6px 6px 0;border:1px solid ${borderC};background:#0a0a16;font-size:13px"><span style="color:${color}">${esc(b.name)}</span>${tag}</div>`;
    }).join(''));
  }

  html+=sec('採取可能アイテム','💎',m.items.map(it=>`<span class="item-tag">${esc(it)}</span>`).join(''));
  html+=sec('妹の感想','👧',`<p style="line-height:1.8;color:#d4a0a0;font-style:italic;white-space:pre-wrap">${esc(m.sisterComment)}</p>`);
  html+=sec('出現モンスター','👹',m.monsters.map(mo=>
    `<div style="padding:8px 12px;border-bottom:1px solid #1a1a2a;font-size:14px"><span style="color:${mo.chimera?'#ff8866':'#ccc'};font-weight:${mo.chimera?'bold':'normal'}">${esc(mo.name)}</span>${mo.chimera?'<span class="chimera-tag">CHIMERA</span>':''}</div>`
  ).join(''));

  if(m.events.length>0){
    html+=sec('特殊イベント','⚡',m.events.map((ev,i)=>{
      const c=eventColor(ev.type);
      return `<div class="event-card" style="border-color:${c}33;background:linear-gradient(135deg,${c}08,${c}04);animation-delay:${i*0.1}s">
        <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:20px">${ev.icon}</span>
          <span style="font-size:15px;font-weight:bold;color:${c}">${esc(ev.title)}</span>
          <span style="font-size:10px;padding:1px 8px;border:1px solid ${c}44;color:${c};letter-spacing:1px;opacity:.7">${esc(ev.typeLabel)}</span>
        </div>
        <p style="line-height:1.8;font-size:13px;color:#b0aca0">${esc(ev.desc)}</p>
      </div>`;
    }).join(''));
  }

  html+=sec('水場','💧',`<p style="line-height:1.9;white-space:pre-wrap">${esc(m.water)}</p>`);
  html+=sec('地下の様子','⛏️',`<p style="line-height:1.9;white-space:pre-wrap">${esc(m.underground)}</p>`);

  document.getElementById('content').innerHTML=html;
}

function sec(title,emoji,inner){
  return `<div class="section"><h3>${emoji} ${title}</h3>${inner}</div>`;
}

// ─── HISTORY ────────────────────────────────────────────────────────
function renderHistBtn(){
  const w=document.getElementById('histBtnWrap');
  w.style.display=history.length>1?'block':'none';
  w.innerHTML=`<button class="hist-btn" onclick="toggleHistory()">${historyVisible?'履歴を閉じる':'履歴 ('+history.length+'件)'}</button>`;
}
function toggleHistory(){
  historyVisible=!historyVisible;
  const p=document.getElementById('histPanel');
  p.style.display=historyVisible?'block':'none';
  if(historyVisible)renderHistList();
  renderHistBtn();
}
function renderHistList(){
  document.getElementById('histList').innerHTML=history.map((h,i)=>{
    const c=levelColor(h.level);
    const badge=h.isChaosMap?`<span class="chaos-badge ${h.chaosLevel===3?'triple-badge':''}">${h.chaosLevel===3?'超混沌':'混沌'}</span>`:'';
    const evBadge=h.events.length>0?`<span style="color:#555;margin-left:6px;font-size:10px">⚡×${h.events.length}</span>`:'';
    return `<div class="hist-item" style="opacity:${i===0?1:.6}" onclick="showHist(${i})"><span style="color:${c};font-weight:bold">Lv.${h.level}</span> ${h.biomeIcon} ${esc(h.biomeName)}${badge}${evBadge}</div>`;
  }).join('');
}
function showHist(i){
  renderMap(history[i]);
  historyVisible=false;
  document.getElementById('histPanel').style.display='none';
  renderHistBtn();
}

// ─── INIT ───────────────────────────────────────────────────────────
renderDiffGrid();
</script>
