<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
</head>
<body>
    <pre id="log"></pre>
    <script>
        function log(msg) {
            document.getElementById('log').textContent += msg + '\n';
        }
        try {
            let expr = '1/(x*sin(x))';
            let u = 'u_var';
            let M = 2;
            let exprNode = nerdamer(expr).sub('x', '(u_var+0)');
            let g = nerdamer('simplify((' + exprNode.text() + ')*u_var^2)');
            log('g.text(): ' + g.text());
            
            let tayNode = nerdamer('taylor(' + g.text() + ',u_var,0,6)');
            log('tayNode.text(): ' + tayNode.text());
            log('tayNode.toTeX(): ' + tayNode.toTeX());
            log('includes taylor(: ' + tayNode.text().includes('taylor('));
            
        } catch (e) {
            log('ERROR: ' + e.message);
        }
    </script>
</body>
</html>
