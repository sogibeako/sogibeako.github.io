<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>Otherworld 7-Segment</title>
  <style>
    .otherworld-clock {
      --ow-color: #00da12;
      --ow-off-opacity: 0.15;
      --ow-digit-w: 0.95em;
      --ow-digit-h: 1.70em;
      --ow-gap: 0.22em;
      --ow-seg-thick: 0.14em;

      display: inline-flex;
      align-items: center;
      gap: var(--ow-gap);
      font-size: 15px;
      /* 通常文字12px程度 */
      line-height: 1;
      color: var(--ow-color);
      vertical-align: middle;
      user-select: none;
      background-color: black;
      padding: 0.35em 0.45em;
      border-radius: 0.35em;
    }

    .ow7-digit {
      position: relative;
      width: var(--ow-digit-w);
      height: var(--ow-digit-h);
      flex: 0 0 auto;
    }

    .ow7-seg {
      position: absolute;
      background: currentColor;
      opacity: var(--ow-off-opacity);
      border-radius: 999px;
    }

    .ow7-seg.on {
      opacity: 1;
      box-shadow: 0 0 0.18em currentColor;
    }

    .ow7-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.48em;
      line-height: 1;
      color: #ffffff;
      opacity: 0.92;
      font-family: monospace;
      pointer-events: none;
    }

    /* segment positions */
    /* 横セグメント */
    .ow7-seg.s1 {
      left: 0.18em;
      top: 0.00em;
      width: 0.58em;
      height: var(--ow-seg-thick);
    }

    .ow7-seg.s7 {
      left: 0.18em;
      top: 0.78em;
      width: 0.58em;
      height: var(--ow-seg-thick);
    }

    .ow7-seg.s4 {
      left: 0.18em;
      top: 1.56em;
      width: 0.58em;
      height: var(--ow-seg-thick);
    }

    /* 縦セグメント */
    .ow7-seg.s6 {
      left: 0.00em;
      top: 0.12em;
      width: var(--ow-seg-thick);
      height: 0.58em;
    }

    .ow7-seg.s2 {
      left: 0.81em;
      top: 0.12em;
      width: var(--ow-seg-thick);
      height: 0.58em;
    }

    .ow7-seg.s5 {
      left: 0.00em;
      top: 0.90em;
      width: var(--ow-seg-thick);
      height: 0.58em;
    }

    .ow7-seg.s3 {
      left: 0.81em;
      top: 0.90em;
      width: var(--ow-seg-thick);
      height: 0.58em;
    }

    /* lower-right */

    .ow7-colon {
      position: relative;
      width: 0.22em;
      height: 1.70em;
      flex: 0 0 auto;
    }

    .ow7-colon::before,
    .ow7-colon::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 0.16em;
      height: 0.16em;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0.18em currentColor;
    }

    .ow7-label {
      display: none;
    }

    .ow7-colon::before {
      top: 0.45em;
    }

    .ow7-colon::after {
      top: 1.05em;
    }

    .ow7-separator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0.35em;
      height: 1.70em;
      flex: 0 0 auto;
    }
  </style>
</head>

<body>

  <p>
    異界時計:
    <span id="clock-a" class="otherworld-clock" style="--ow-seg-thick: 0.18em;"></span>
  </p>

  <p>
    直接ビット列:
    <span id="clock-b" class="otherworld-clock" style="--ow-seg-thick: 0.18em;"></span>
  </p>

  <script>
    /*
      セグメント番号:
         [1]
      [6]   [2]
         [7]
      [5]   [3]
         [4]
  
      標準7セグの数字対応:
      0 = 1111110
      1 = 0110000
      2 = 1101101
      3 = 1111001
      4 = 0110011
      5 = 1011011
      6 = 1011111
      7 = 1110000
      8 = 1111111
      9 = 1111011
    */

    const STANDARD_7SEG = {
      "0": "1111110",
      "1": "0110000",
      "2": "1101101",
      "3": "1111001",
      "4": "0110011",
      "5": "1011011",
      "6": "1011111",
      "7": "1110000",
      "8": "1111111",
      "9": "1111011"
    };

    const BITS_TO_DIGIT = Object.fromEntries(
      Object.entries(STANDARD_7SEG).map(([digit, bits]) => [bits, digit])
    );

    function createDigit(bits) {
      const digit = document.createElement("span");
      digit.className = "ow7-digit";
      digit.title = `bits: ${bits}${BITS_TO_DIGIT[bits] ? ` / 標準解釈: ${BITS_TO_DIGIT[bits]}` : ""}`;

      for (let i = 0; i < 7; i++) {
        const seg = document.createElement("span");
        seg.className = `ow7-seg s${i + 1}` + (bits[i] === "1" ? " on" : "");

        const label = document.createElement("span");
        label.className = "ow7-label";
        label.textContent = String(i + 1);

        seg.appendChild(label);
        digit.appendChild(seg);
      }

      return digit;
    }

    function createSeparator(token) {
      if (token === ":" || token === "：") {
        const colon = document.createElement("span");
        colon.className = "ow7-colon";
        return colon;
      }

      const sep = document.createElement("span");
      sep.className = "ow7-separator";
      sep.textContent = token;
      return sep;
    }

    function renderOtherworld7Seg(container, tokens) {
      container.textContent = "";

      for (const token of tokens) {
        if (/^[01]{7}$/.test(token)) {
          container.appendChild(createDigit(token));
        } else if (/^[0-9]$/.test(token)) {
          container.appendChild(createDigit(STANDARD_7SEG[token]));
        } else {
          container.appendChild(createSeparator(token));
        }
      }
    }

    function textTo7SegTokens(text) {
      return [...String(text)].map(ch => STANDARD_7SEG[ch] ? ch : ch);
    }

    /* 例1: ふつうの時刻文字列をそのまま */
    renderOtherworld7Seg(
      document.getElementById("clock-a"),
      textTo7SegTokens("12:08:13")
    );

    /* 例2: ビット列を直接指定 */
    renderOtherworld7Seg(
      document.getElementById("clock-b"),
      ["0010111", "1110001", ":","1001010", "1001011", ":", "0110010", "1101001"]
    );
    /*
    renderOtherworld7Seg(document.getElementById("clock-c"), [...]);
    renderOtherworld7Seg(document.getElementById("clock-d"), [...]);
    */

    /* 外から呼べるように公開 */
    window.renderOtherworld7Seg = renderOtherworld7Seg;
    window.textTo7SegTokens = textTo7SegTokens;
    window.STANDARD_7SEG = STANDARD_7SEG;
  </script>
</body>

</html>
