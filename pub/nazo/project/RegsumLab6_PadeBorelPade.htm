    function AutoBounds(values) {
      const finite = values.filter(Number.isFinite);
      if (!finite.length) return { min: -1, max: 1 };
      let min = Math.min(...finite);
      let max = Math.max(...finite);
      if (Math.abs(max - min) < 1e-12) { min -= 1; max += 1; }
      const pad = (max - min) * 0.08;
      return { min: min - pad, max: max + pad };
    }

    function SimpleLineChart({ data, lines, xKey, height = 360 }) {
      const width = 900;
      const m = { top: 20, right: 20, bottom: 32, left: 56 };
      const innerW = width - m.left - m.right;
      const innerH = height - m.top - m.bottom;
      const xs = data.map(d => d[xKey]);
      const ys = [];
      lines.forEach(line => data.forEach(d => ys.push(d[line.key])));
      const xMin = Math.min(...xs, 0), xMax = Math.max(...xs, 1);
      const { min: yMin, max: yMax } = AutoBounds(ys);
      const xScale = x => m.left + ((x - xMin) / Math.max(1e-12, xMax - xMin)) * innerW;
      const yScale = y => m.top + innerH - ((y - yMin) / Math.max(1e-12, yMax - yMin)) * innerH;
      const gridYs = 5, gridXs = 6;
      return (
        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full bg-slate-950 rounded-xl">
          {Array.from({ length: gridYs + 1 }, (_, i) => {
            const y = m.top + innerH * (i / gridYs);
            const val = yMax - (yMax - yMin) * (i / gridYs);
            return <g key={`gy-${i}`}><line x1={m.left} y1={y} x2={m.left + innerW} y2={y} stroke="#243041" strokeWidth="1" /><text x={m.left - 8} y={y + 4} textAnchor="end" fontSize="11" fill="#cbd5e1">{formatNum(val, 4)}</text></g>;
          })}
          {Array.from({ length: gridXs + 1 }, (_, i) => {
            const x = m.left + innerW * (i / gridXs);
            const val = xMin + (xMax - xMin) * (i / gridXs);
            return <g key={`gx-${i}`}><line x1={x} y1={m.top} x2={x} y2={m.top + innerH} stroke="#243041" strokeWidth="1" /><text x={x} y={height - 8} textAnchor="middle" fontSize="11" fill="#cbd5e1">{formatNum(val, 4)}</text></g>;
          })}
          <rect x={m.left} y={m.top} width={innerW} height={innerH} fill="none" stroke="#334155" strokeWidth="1" />
          {lines.map((line, idx) => {
            const pts = data.filter(d => Number.isFinite(d[line.key]));
            const path = pts.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(d[xKey])} ${yScale(d[line.key])}`).join(' ');

          })}
        </svg>
      );
    }

    function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }

    function formatNum(x, digits = 10) {
      if (x == null || !Number.isFinite(x)) return "—";
      if (Math.abs(x) < 1e-12) return "0";
      return Number(x).toPrecision(digits).replace(/\.0+$/, '').replace(/(\.[0-9]*?)0+$/, '$1');
    }

    function rationalApprox(x, maxDen = 1024, relTol = 1e-9) {
      if (x == null || !Number.isFinite(x)) return null;
      if (Math.abs(x) < 1e-12) return "0";
      if (Math.abs(x - Math.round(x)) <= relTol * Math.max(1, Math.abs(x))) return `${Math.round(x)}`;
      const sign = x < 0 ? -1 : 1;
      let v = Math.abs(x);
      let h1 = 1, h0 = 0, k1 = 0, k0 = 1;
      let iter = 0;
      while (iter++ < 32) {
        const a = Math.floor(v);
        const h2 = a * h1 + h0;
        const k2 = a * k1 + k0;
        if (k2 > maxDen) break;
        h0 = h1; h1 = h2; k0 = k1; k1 = k2;
        const frac = v - a;
        if (frac < 1e-14) break;
        v = 1 / frac;
      }
      let num = sign * h1, den = k1;
      if (!den) return null;
      const approx = num / den;
      const err = Math.abs(x - approx);
      const scale = Math.max(1, Math.abs(x));
      if (err > relTol * scale) return null;
      if (den === 1) return `${num}`;
      return `${num}/${den}`;
    }

    function approxRationalLabel(x) {
      const rational = rationalApprox(x);
      if (x == null || !Number.isFinite(x)) return null;
      if (!rational || rational === "0" || rational === `${Math.round(x)}`) return null;
      return rational;
    }

    function formatValueCell(x) {
      const rational = rationalApprox(x);
      if (!Number.isFinite(x)) return "—";
      if (!rational || rational === "0" || rational === `${Math.round(x)}`) return formatNum(x);

    function mean(arr) { if (!arr.length) return 0; let s = 0; for (const x of arr) s += x; return s / arr.length; }
    function rms(arr) { if (!arr.length) return 0; let s = 0; for (const x of arr) s += x * x; return Math.sqrt(s / arr.length); }
    function variance(arr) { if (arr.length < 2) return 0; const m = mean(arr); let s = 0; for (const x of arr) s += (x - m) * (x - m); return s / arr.length; }

    function parseParams(text) {
      const out = {};
      const trimmed = text.trim();
      if (!trimmed) return out;
      const parts = trimmed.split(/[,\n;]/).map(s => s.trim()).filter(Boolean);
      for (const part of parts) {
        const m = part.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.+)$/);
        if (!m) throw new Error(`Invalid parameter entry: ${part}`);
        const key = m[1];
        const value = Number(m[2]);
        if (!Number.isFinite(value)) throw new Error(`Invalid numeric value for ${key}`);
        out[key] = value;
      }
      return out;
    }

    function extractIdentifiers(expr) {
      const matches = expr.match(/[A-Za-z_][A-Za-z0-9_]*/g) || [];
      return [...new Set(matches)];
    }

    function sanitizeExpression(expr) { return expr.replace(/\*\*/g, "^").replace(/\^/g, "**"); }

    function buildEvaluator(expr, params) {
      const identifiers = extractIdentifiers(expr);
      const allowed = new Set(["n", "floor", "ceil", "round", "sqrt", "log", "sin", "cos", "tan", "abs", "pow", "pi", "e", ...Object.keys(params)]);
      for (const id of identifiers) { if (!allowed.has(id)) throw new Error(`Unknown identifier: ${id}`); }
      const safeExpr = sanitizeExpression(expr);
      const argNames = ["n", ...Object.keys(params)];
      const body = `const floor=Math.floor, ceil=Math.ceil, round=Math.round, sqrt=Math.sqrt, log=Math.log, sin=Math.sin, cos=Math.cos, tan=Math.tan, abs=Math.abs, pow=Math.pow, pi=Math.PI, e=Math.E; return (${safeExpr});`;
      const fn = new Function(...argNames, body);
      return (n) => {
        const args = [n, ...Object.keys(params).map(k => params[k])];
        const y = fn(...args);
        if (typeof y !== "number" || !Number.isFinite(y)) throw new Error(`Expression produced non-finite value at n=${n}`);
        return y;
      };
    }

    function generateSequence(expr, params, Nmax) {
      const evalFn = buildEvaluator(expr, params);
      const seq = new Float64Array(Nmax);
      for (let n = 1; n <= Nmax; n++) seq[n - 1] = evalFn(n);
      return seq;
    }

    function solveLinearSystem(A, b) {
      const n = A.length;
      const M = A.map((row, i) => [...row, b[i]]);
      for (let col = 0; col < n; col++) {
        let pivot = col;
        for (let r = col + 1; r < n; r++) { if (Math.abs(M[r][col]) > Math.abs(M[pivot][col])) pivot = r; }
        if (Math.abs(M[pivot][col]) < 1e-14) throw new Error("Singular matrix");
        [M[col], M[pivot]] = [M[pivot], M[col]];
        const div = M[col][col];
        for (let j = col; j <= n; j++) M[col][j] /= div;
        for (let r = 0; r < n; r++) {
          if (r === col) continue;
          const factor = M[r][col];
          for (let j = col; j <= n; j++) M[r][j] -= factor * M[col][j];
        }
      }
      return M.map(row => row[n]);
    }

    function matMulAtA(X) { const p = X[0].length; const out = Array.from({ length: p }, () => Array(p).fill(0)); for (let i = 0; i < X.length; i++) for (let a = 0; a < p; a++) for (let b = 0; b < p; b++) out[a][b] += X[i][a] * X[i][b]; return out; }
    function matMulAtY(X, y) { const p = X[0].length; const out = Array(p).fill(0); for (let i = 0; i < X.length; i++) for (let a = 0; a < p; a++) out[a] += X[i][a] * y[i]; return out; }

    function estimateConditionNumberGram(G) {
      let maxRow = 0, minDiag = Infinity, maxDiag = 0;
      for (let i = 0; i < G.length; i++) { let rs = 0; for (let j = 0; j < G.length; j++) rs += Math.abs(G[i][j]); maxRow = Math.max(maxRow, rs); minDiag = Math.min(minDiag, Math.abs(G[i][i])); maxDiag = Math.max(maxDiag, Math.abs(G[i][i])); }
      if (minDiag < 1e-20) return Infinity;
      return (maxRow || 1) * (maxDiag / minDiag);
    }

    function leastSquares(X, y) {
      const G = matMulAtA(X); const rhs = matMulAtY(X, y); const coeffs = solveLinearSystem(G, rhs);
      const fitted = X.map(row => row.reduce((s, v, i) => s + v * coeffs[i], 0));
      const residuals = fitted.map((v, i) => y[i] - v);
      const rss = residuals.reduce((s, v) => s + v * v, 0);
      return { coeffs, fitted, residuals, rss, rms: Math.sqrt(rss / Math.max(1, y.length)), conditionNumber: estimateConditionNumberGram(G) };
    }

    function leastSquaresScaled(X, y, weights = null) {
      const rows = X.length; const cols = X[0]?.length ?? 0;
      if (!rows || !cols) throw new Error('Empty design matrix');
      const w = weights && weights.length === rows ? weights.map(v => Math.max(1e-12, v)) : Array(rows).fill(1);
      const colScales = Array(cols).fill(0);

          const t = LAGUERRE_NODES[k]; const w = LAGUERRE_WEIGHTS[k];
          let sum = 0;
          for (let n = 1; n <= Math.min(nTerms, N); n++) {
            const logTerm = n * Math.log(Math.max(1e-300, t)) - logFactorial(n);
            if (logTerm > 700) { ok = false; break; }
            sum += sequence[n - 1] * Math.exp(logTerm);
          }
          if (!ok) break;
          integral += w * sum;
        }
        if (ok && Number.isFinite(integral)) truncCheck.push({ nTerms, value: integral });
      }
      const truncVals = truncCheck.map(tc => tc.value);
      const truncSpread = truncVals.length >= 2 ? Math.max(...truncVals) - Math.min(...truncVals) : Infinity;
      const truncScale = Math.max(1e-12, ...truncVals.map(v => Math.abs(v)));
      const truncRelSpread = truncSpread / truncScale;
      const truncStable = truncRelSpread < 1e-3;

      // Build visualization curve: e^{-t} f(t) as integrand
      const curveSamples = 80;
      const tMax = Math.min(40, LAGUERRE_NODES[Math.min(22, LAGUERRE_NODES.length - 1)]);
      const curve = [];
      for (let i = 0; i < curveSamples; i++) {
        const t = 0.02 + (i / (curveSamples - 1)) * tMax;
        const f = evalF(t);
        if (!f.overflow && Number.isFinite(f.value)) {
          curve.push({ t, f: f.value, integrand: Math.exp(-t) * f.value });
        }
      }

      // Determine stability
      let stabilityScore;
      if (relSpread < 1e-10) stabilityScore = 'exact-ish';
      else if (relSpread < 1e-6) stabilityScore = clamp(1 - 1e5 * relSpread, 0.95, 1);
      else if (relSpread < 1e-3) stabilityScore = clamp(0.95 - 500 * relSpread, 0.5, 0.95);
      else if (relSpread < 0.1) stabilityScore = clamp(0.5 - 5 * relSpread, 0, 0.5);
      else stabilityScore = 0;

      const isStable = stabilityScore === 'exact-ish' || (typeof stabilityScore === 'number' && stabilityScore > 0.5);

      if (!isStable) {
        return { method: 'borel', status: 'exploratory', value: best.value,
          stability: typeof stabilityScore === 'number' ? stabilityScore : 0,
          notes: ['Borel summation: quadrature not fully converged', `spread across orders: ${formatNum(relSpread, 4)}`, truncStable ? 'truncation-stable' : 'truncation-sensitive'],
          details: { quadratureResults: results.map(r => ({ nPoints: r.nPoints, value: r.value })), truncationCheck: truncCheck, truncRelSpread, curve, maxTermsUsed: maxTerms } };
      }

      return { method: 'borel', status: 'success', value: best.value,
        stability: stabilityScore,
        notes: [
          stabilityScore === 'exact-ish' ? 'Borel summation via Gauss-Laguerre: excellent convergence' : 'Borel summation via Gauss-Laguerre: good convergence',
          `${results.length} quadrature orders agree`,
          truncStable ? 'truncation-stable' : 'truncation-sensitive'
        ],
        details: { quadratureResults: results.map(r => ({ nPoints: r.nPoints, value: r.value })), truncationCheck: truncCheck, truncRelSpread, curve, maxTermsUsed: maxTerms } };
    }

    // =====================================================
    // === PADE / BOREL-PADE EXPERIMENTS (NEW in v0.10) ===
    // =====================================================
    function buildPadeApproximant(coeffs, L, M) {
      if (L < 0 || M < 1 || coeffs.length < L + M + 1) throw new Error('not enough coefficients for Pade order');
      const A = [];
      const b = [];
      for (let row = 0; row < M; row++) {
        const k = L + 1 + row;
        A.push(Array.from({ length: M }, (_, j) => coeffs[k - (j + 1)] ?? 0));
        b.push(-(coeffs[k] ?? 0));
      }
      const qTail = solveLinearSystem(A, b);
      const q = [1, ...qTail];
      const p = [];
      for (let i = 0; i <= L; i++) {
        let s = 0;
        for (let j = 0; j <= Math.min(i, M); j++) s += q[j] * (coeffs[i - j] ?? 0);
        p.push(s);
      }
      return { L, M, p, q };
    }

    function evalPoly(coeffs, x) {
      let y = 0;
      for (let i = coeffs.length - 1; i >= 0; i--) y = y * x + coeffs[i];
      return y;
    }

    function evalPade(approx, x) {
      const den = evalPoly(approx.q, x);
      if (!Number.isFinite(den) || Math.abs(den) < 1e-12) return { value: NaN, denominator: den };
      const num = evalPoly(approx.p, x);
      return { value: num / den, numerator: num, denominator: den };
    }

    function hasPositiveAxisPole(approx, tMax, samples = 256) {
      let prevT = 0;
      let prev = evalPoly(approx.q, prevT);
      let minAbs = Math.abs(prev);
      for (let i = 1; i <= samples; i++) {
        const t = (i / samples) * tMax;
        const q = evalPoly(approx.q, t);
        minAbs = Math.min(minAbs, Math.abs(q));
        if (Number.isFinite(prev) && Number.isFinite(q) && prev * q < 0) return { hasPole: true, nearT: 0.5 * (prevT + t), minAbs };
        prevT = t;
        prev = q;
      }
      return { hasPole: minAbs < 1e-7, nearT: null, minAbs };
    }

    function padeRegularize(sequence, options = {}) {
      const N = sequence.length;
      const maxOrder = Math.max(2, Math.min(options.maxOrder ?? 14, 32, Math.floor((N - 1) / 2)));
      const candidates = [];
      const coeffs = Array(maxOrder * 2 + 2).fill(0);
      for (let n = 1; n < coeffs.length && n <= N; n++) coeffs[n] = sequence[n - 1];

      for (let m = 1; m <= maxOrder; m++) {
        for (const delta of [-1, 0, 1]) {
          const l = m + delta;
          if (l < 0 || l + m >= coeffs.length) continue;
          try {
            const approx = buildPadeApproximant(coeffs, l, m);
            const atOne = evalPade(approx, 1);
            if (!Number.isFinite(atOne.value)) continue;
            candidates.push({ L: l, M: m, value: atOne.value, denominatorAtOne: atOne.denominator, approx });
          } catch {}
        }
      }

      if (!candidates.length) {
        return { method: 'pade', status: 'failed', value: null, stability: null, notes: ['Pade: no stable rational approximant could be built'], details: {} };
      }

      const tail = candidates.slice(-Math.min(9, candidates.length));
      const vals = tail.map(c => c.value).filter(Number.isFinite);
      const center = median(vals);
      const spread = vals.length >= 2 ? Math.max(...vals) - Math.min(...vals) : Infinity;
      const scale = Math.max(1e-12, ...vals.map(v => Math.abs(v)));
      const relSpread = Math.abs(spread) / scale;
      const best = tail.reduce((acc, c) => Math.abs(c.value - center) < Math.abs(acc.value - center) ? c : acc, tail[tail.length - 1]);
      const poleRisk = Math.abs(best.denominatorAtOne) < (options.poleTolerance ?? 1e-8);
      const curve = [];
      for (let i = 0; i <= 80; i++) {
        const z = i / 80;
        const ev = evalPade(best.approx, z);
        if (Number.isFinite(ev.value)) curve.push({ z, value: ev.value });
      }

      let stability = 0;
      if (relSpread < 1e-10) stability = 1;
      else if (relSpread < 1e-7) stability = 0.95;
      else if (relSpread < 1e-4) stability = clamp(0.9 - 1000 * relSpread, 0.55, 0.9);
      else if (relSpread < 1e-2) stability = clamp(0.55 - 30 * relSpread, 0.2, 0.55);

      const status = poleRisk ? 'exploratory' : (stability >= 0.55 ? 'success' : 'exploratory');
      return {
        method: 'pade',
        status,
        value: best.value,
        stability,
        notes: [
          `ordinary generating function Pade [${best.L}/${best.M}] evaluated at z=1`,
          `relative spread across nearby orders: ${formatNum(relSpread, 4)}`,
          poleRisk ? 'denominator is small near z=1; treat as exploratory' : 'no immediate pole at z=1'
        ],
        details: {
          chosen: { L: best.L, M: best.M, denominatorAtOne: best.denominatorAtOne },
          candidates: candidates.map(c => ({ L: c.L, M: c.M, value: c.value, denominatorAtOne: c.denominatorAtOne })),
          relSpread,
          curve
        }
      };
    }

    function borelPadeRegularize(sequence, model, options = {}) {
      const N = sequence.length;
      const maxOrder = Math.max(2, Math.min(options.maxOrder ?? 14, 24, Math.floor((N - 1) / 2)));
      const coeffs = Array(maxOrder * 2 + 2).fill(0);
      for (let n = 1; n < coeffs.length && n <= N; n++) {
        const logTerm = Math.log(Math.max(1e-300, Math.abs(sequence[n - 1]))) - logFactorial(n);
        coeffs[n] = sequence[n - 1] === 0 ? 0 : Math.sign(sequence[n - 1]) * Math.exp(logTerm);
      }

      const tMax = options.tMax ?? 48;
      const candidates = [];
      for (let m = 1; m <= maxOrder; m++) {
        for (const delta of [-1, 0, 1]) {
          const l = m + delta;
          if (l < 0 || l + m >= coeffs.length) continue;
          try {
            const approx = buildPadeApproximant(coeffs, l, m);
            const pole = hasPositiveAxisPole(approx, tMax, options.poleSamples ?? 256);
            if (pole.hasPole) {
              candidates.push({ L: l, M: m, value: NaN, poleRisk: true, minDenominatorAbs: pole.minAbs });
              continue;
            }
            let integral = 0;
            const fValues = [];
            const nPoints = Math.min(options.laguerreNodes ?? 30, LAGUERRE_NODES.length);
            let ok = true;
            for (let k = 0; k < nPoints; k++) {
              const t = LAGUERRE_NODES[k];
              const ev = evalPade(approx, t);
              if (!Number.isFinite(ev.value)) { ok = false; break; }
              const contribution = LAGUERRE_WEIGHTS[k] * ev.value;
              integral += contribution;
              fValues.push({ t, f: ev.value, integrand: Math.exp(-t) * ev.value, contribution });
            }
            if (ok && Number.isFinite(integral)) candidates.push({ L: l, M: m, value: integral, poleRisk: false, minDenominatorAbs: pole.minAbs, approx, fValues });
          } catch {}
        }
      }

      const finite = candidates.filter(c => Number.isFinite(c.value));
      if (!finite.length) {
        return { method: 'borelPade', status: 'not_applicable', value: null, stability: null, notes: ['Borel-Pade: no pole-free positive-axis approximant was available'], details: { candidates } };
      }

      const tail = finite.slice(-Math.min(9, finite.length));
      const vals = tail.map(c => c.value);
      const center = median(vals);
      const spread = vals.length >= 2 ? Math.max(...vals) - Math.min(...vals) : Infinity;
      const scale = Math.max(1e-12, ...vals.map(v => Math.abs(v)));
      const relSpread = Math.abs(spread) / scale;
      const best = tail.reduce((acc, c) => Math.abs(c.value - center) < Math.abs(acc.value - center) ? c : acc, tail[tail.length - 1]);
      const curve = [];
      const curveTMax = Math.min(tMax, 40);
      for (let i = 0; i <= 100; i++) {
        const t = (i / 100) * curveTMax;
        const ev = evalPade(best.approx, t);
        if (Number.isFinite(ev.value)) curve.push({ t, f: ev.value, integrand: Math.exp(-t) * ev.value });
      }

      let stability = 0;
      if (relSpread < 1e-9) stability = 0.98;
      else if (relSpread < 1e-6) stability = 0.9;
      else if (relSpread < 1e-3) stability = clamp(0.8 - 200 * relSpread, 0.55, 0.8);
      else if (relSpread < 0.05) stability = clamp(0.55 - 8 * relSpread, 0.15, 0.55);

      const poleRejected = candidates.filter(c => c.poleRisk).length;
      const status = stability >= 0.55 ? 'success' : 'exploratory';
      return {
        method: 'borelPade',
        status,
        value: best.value,
        stability,
        notes: [
          `Borel transform Pade [${best.L}/${best.M}] integrated by Gauss-Laguerre`,
          `relative spread across nearby orders: ${formatNum(relSpread, 4)}`,
          poleRejected ? `${poleRejected} positive-axis pole-risk candidates skipped` : 'no positive-axis pole risk detected in candidates'
        ],
        details: {
          chosen: { L: best.L, M: best.M, minDenominatorAbs: best.minDenominatorAbs },
          candidates: candidates.map(c => ({ L: c.L, M: c.M, value: c.value, poleRisk: c.poleRisk, minDenominatorAbs: c.minDenominatorAbs })),
          relSpread,
          curve,
          quadratureValues: best.fValues
        }
      };
    }

    // =====================================================
    // === EULER SUMMATION (NEW in v0.7) ==================
    // =====================================================
    function eulerRegularize(sequence, model, options = {}) {
      const N = sequence.length;
      const maxOrder = Math.min(options.eulerMaxOrder ?? 64, N - 1);

      // Check if this looks alternating / oscillatory
      const head = Array.from(sequence.slice(0, Math.min(200, N)));
      const signs = head.map(v => Math.sign(v)).filter(s => s !== 0);
      if (signs.length < 4) {
        return { method: 'euler', status: 'not_applicable', value: null, stability: null,
          notes: ['Euler summation: too few nonzero terms'], details: {} };
      }

      let signChanges = 0;
      for (let i = 1; i < signs.length; i++) if (signs[i] !== signs[i-1]) signChanges++;
      const signChangeRatio = signChanges / (signs.length - 1);

      // For non-alternating positive-growth: not applicable
      const isPositiveGrowth = (
        (model.type === 'quasiPolynomial' && (model.period ?? 1) === 1 && (model.degree ?? 0) >= 0) ||
        (model.type === 'powerLaw' && (model.period ?? 1) === 1) ||
        (model.type === 'extended')
      );
      if (isPositiveGrowth && signChangeRatio < 0.3) {
        return { method: 'euler', status: 'not_applicable', value: null, stability: null,
          notes: ['Euler summation: non-alternating growth sequence'],
          details: { signChangeRatio } };
      }

      // Euler transform on partial sums:
      // Build partial sums S_n = a_1 + a_2 + ... + a_n
      // Then apply the Euler transform to the sequence of partial sums.
      // The Euler transform of a sequence {s_0, s_1, s_2, ...} is:
      //   E_K = Σ_{j=0}^{K} C(K,j) s_j / 2^K
      // This is equivalent to the (1/2, 1/2) weighted average iterated K times.
      // For alternating series, this converges to the correct regularized value.

      // Build partial sums (starting from index 0: S_0 = a_1, S_1 = a_1+a_2, ...)
      const partialSums = new Float64Array(N);
      let ps = 0;
      for (let i = 0; i < N; i++) { ps += sequence[i]; partialSums[i] = ps; }

      function computeEulerTransform(order) {
        // Apply iterated averaging to the partial sums
        // Start with row = [S_0, S_1, ..., S_order]
        // Each iteration: row[j] = (row[j] + row[j+1]) / 2
        // After 'order' iterations, row[0] is the Euler transform

        const ord = Math.min(order, N - 1);
        const row = new Float64Array(ord + 1);
        for (let j = 0; j <= ord; j++) row[j] = partialSums[j];

        const intermediates = [{ k: 0, value: row[0] }];

        for (let k = 1; k <= ord; k++) {
          for (let j = 0; j <= ord - k; j++) {
            row[j] = (row[j] + row[j + 1]) / 2;
          }
          intermediates.push({ k, value: row[0] });

          // Early termination: if the value has stabilized
          if (intermediates.length >= 3) {
            const last3 = intermediates.slice(-3).map(x => x.value);
            const localSpread = Math.max(...last3) - Math.min(...last3);
            if (localSpread < 1e-15 * Math.max(1, Math.abs(row[0]))) break;
          }
        }

        return { value: row[0], intermediates };
      }

      // Compute at multiple orders to check convergence
      const orders = [
        Math.min(16, maxOrder),
        Math.min(24, maxOrder),
        Math.min(32, maxOrder),
        Math.min(48, maxOrder),
        maxOrder
      ].filter((v, i, arr) => arr.indexOf(v) === i && v > 0);

      const results = [];
      for (const ord of orders) {
        const r = computeEulerTransform(ord);
        if (Number.isFinite(r.value)) results.push({ order: ord, value: r.value, intermediates: r.intermediates });
      }

      if (results.length === 0) {
        return { method: 'euler', status: 'not_applicable', value: null, stability: null,
          notes: ['Euler summation: computation produced non-finite values'],
          details: {} };
      }

      const vals = results.map(r => r.value);
      const best = results[results.length - 1];
      const spread = vals.length >= 2 ? Math.max(...vals) - Math.min(...vals) : Infinity;
      const scale = Math.max(1e-12, ...vals.map(v => Math.abs(v)));
      const relSpread = spread / scale;

      // Build convergence curve from the highest-order computation
      const convergenceCurve = best.intermediates.map(im => ({
        k: im.k,
        partial: im.value
      }));

      let stabilityScore;
      if (relSpread < 1e-12) stabilityScore = 'exact-ish';
      else if (relSpread < 1e-8) stabilityScore = clamp(1 - 1e7 * relSpread, 0.95, 1);
      else if (relSpread < 1e-4) stabilityScore = clamp(0.95 - 5000 * relSpread, 0.6, 0.95);
      else if (relSpread < 0.01) stabilityScore = clamp(0.6 - 50 * relSpread, 0.2, 0.6);
      else stabilityScore = clamp(0.2 - 2 * relSpread, 0, 0.2);

      const isStable = stabilityScore === 'exact-ish' || (typeof stabilityScore === 'number' && stabilityScore > 0.5);

      if (!isStable) {
        return { method: 'euler', status: 'exploratory', value: best.value,
          stability: typeof stabilityScore === 'number' ? stabilityScore : 0,
          notes: ['Euler summation: iterated averaging not fully converged', `spread across orders: ${formatNum(relSpread, 4)}`],
          details: { orderResults: results.map(r => ({ order: r.order, value: r.value })), convergenceCurve, signChangeRatio } };
      }

      return { method: 'euler', status: 'success', value: best.value,
        stability: stabilityScore,
        notes: [
          stabilityScore === 'exact-ish'
            ? 'Euler summation: excellent convergence via iterated averaging of partial sums'
            : 'Euler summation: good convergence',
          `${results.length} orders agree`,
          `sign change ratio: ${formatNum(signChangeRatio, 3)}`
        ],
        details: { orderResults: results.map(r => ({ order: r.order, value: r.value })), convergenceCurve, signChangeRatio, maxOrderUsed: best.order } };
    }

    function buildEnsemble(results) {
      const successResults = results.filter(r => {
        if (!(Number.isFinite(r.value) && (r.status === "success" || r.status === "exploratory"))) return false;
        if ((r.notes || []).some(n => String(n).includes('not used in ensemble'))) return false;
        if (r.method === 'window') { const notes = r.notes || []; if (notes.some(n => String(n).includes('exploratory growth basis') || String(n).includes('not used in ensemble'))) return false; }
        if (r.method === 'expCutoff') { if ((r.notes || []).some(n => String(n).includes('not used in ensemble'))) return false; }
        // Borel exploratory is not included in ensemble
        if (r.method === 'borel' && r.status === 'exploratory') return false;
        if ((r.method === 'pade' || r.method === 'borelPade') && r.status === 'exploratory') return false;
        // Euler exploratory is not included in ensemble
        if (r.method === 'euler' && r.status === 'exploratory') return false;
        return true;
      });
      const vals = successResults.map(r => r.value);
      if (!vals.length) return { mean: null, median: null, maxDeviation: null, agreement: null };
      if (vals.length === 1) { const only = successResults[0]; const unstable = typeof only.stability === 'number' ? only.stability < 0.9 : false; const suspicious = (only.details?.conditionNumber ?? 0) > 1e12; return { mean: vals[0], median: vals[0], maxDeviation: null, agreement: suspicious || unstable ? 'low' : 'insufficient' }; }
      const sorted = [...vals].sort((a, b) => a - b); const meanVal = mean(vals);
      const medianVal = sorted.length % 2 ? sorted[(sorted.length - 1) / 2] : (sorted[sorted.length / 2 - 1] + sorted[sorted.length / 2]) / 2;
      const ref = medianVal; const maxDeviation = Math.max(...vals.map(v => Math.abs(v - ref)));
      let agreement = "split"; if (maxDeviation < 1e-4) agreement = "high"; else if (maxDeviation < 1e-3) agreement = "moderate"; else if (maxDeviation < 1e-2) agreement = "low";
      return { mean: meanVal, median: medianVal, maxDeviation, agreement };
    }

    function runBuiltInTests(settings) {
      const results = [];
      for (const tc of TEST_CASES) {
        try {
          const testNmax = (tc.id === 'T004' ? 8192 : tc.category === 'fourier' ? 65536 : tc.category === 'fourier-dc' ? 65536 : tc.category === 'extended' ? 65536 : tc.category === 'oscillation' ? 16384 : tc.category === 'borel' ? 4096 : 4096);
          const testSettings = tc.settingsPatch ? { ...settings, ...tc.settingsPatch, modelDetection: { ...settings.modelDetection, ...(tc.settingsPatch.modelDetection || {}) }, expCutoff: { ...settings.expCutoff, ...(tc.settingsPatch.expCutoff || {}) }, window: { ...settings.window, ...(tc.settingsPatch.window || {}) } } : settings;
          const bundle = runFullAnalysis({ expression: tc.expr, params: {}, Nmax: testNmax, settings: testSettings });
          let actual = null, status = 'missing', pass = false, error = Infinity;

          if (tc.method === 'modelType') { actual = bundle.modelDetection?.type ?? null; status = actual ? 'success' : 'missing'; pass = actual === tc.expected; error = pass ? 0 : Infinity; }
          else if (tc.method === 'windowStatus') { const target = bundle.results.find(r => r.method === 'window'); actual = target?.status ?? null; status = actual || 'missing'; pass = actual === tc.expected; error = pass ? 0 : Infinity; }
          else if (tc.method === 'abelStatus') { const target = bundle.results.find(r => r.method === 'abel'); actual = target?.status ?? null; status = actual || 'missing'; pass = actual === tc.expected; error = pass ? 0 : Infinity; }
          else if (tc.method === 'expStatus') { const target = bundle.results.find(r => r.method === 'expCutoff'); actual = target?.status ?? null; status = actual || 'missing'; pass = actual === tc.expected; error = pass ? 0 : Infinity; }
          else if (tc.method === 'borelStatus') { const target = bundle.results.find(r => r.method === 'borel'); actual = target?.status ?? null; status = actual || 'missing'; pass = actual === tc.expected; error = pass ? 0 : Infinity; }
          else if (tc.method === 'eulerStatus') { const target = bundle.results.find(r => r.method === 'euler'); actual = target?.status ?? null; status = actual || 'missing'; pass = actual === tc.expected; error = pass ? 0 : Infinity; }
          else if (tc.method === 'ensembleEmpty') { actual = bundle.ensemble?.median == null; status = 'success'; pass = actual === tc.expected; error = pass ? 0 : Infinity; }
          else if (tc.method === 'expStabilityMax') { const target = bundle.results.find(r => r.method === 'expCutoff'); actual = target?.stability ?? null; status = Number.isFinite(actual) ? 'success' : 'missing'; pass = Number.isFinite(actual) && actual < tc.expected; error = pass ? 0 : Infinity; }
          else { const target = bundle.results.find(r => r.method === tc.method); actual = target?.value; status = target?.status || 'missing'; error = Math.abs((actual ?? NaN) - tc.expected); pass = Number.isFinite(actual) && error <= tc.tol; }

          results.push({ ...tc, actual, error, pass, status });
        } catch (e) { results.push({ ...tc, actual: null, error: Infinity, pass: false, status: String(e.message || e) }); }
      }
      return results;
    }

    function summarizeTests(testResults) {
      const total = testResults.length; const passed = testResults.filter(t => t.pass).length; const byCategory = {};
      for (const t of testResults) { const key = t.category || 'other'; if (!byCategory[key]) byCategory[key] = { total: 0, passed: 0 }; byCategory[key].total += 1; if (t.pass) byCategory[key].passed += 1; }
      return { total, passed, byCategory };
    }

    function buildDiagnostics(bundle) {
      const out = []; const exp = bundle.results.find(r => r.method === "expCutoff");
      if (bundle.input.Nmax <= 128) out.push(`⚠ Nmax=${bundle.input.Nmax} may be too small for reliable estimation.`);
      if (bundle.modelDetection.confidence === "uncertain") out.push("⚠ Skeleton estimate is uncertain. Consider manual specification.");
      if (exp?.details?.conditionNumber > 1e8) out.push(`⚠ Fit condition number is high (${formatNum(exp.details.conditionNumber, 6)}). Result may be unstable.`);
      if (bundle.ensemble.maxDeviation != null && bundle.ensemble.maxDeviation > 1e-2) out.push("⚠ Methods disagree significantly. Check individual results.");
      if (bundle.modelDetection.type === "none" && bundle.results.find(r => r.method === "hurwitz")?.status === "not_applicable") out.push("⚠ Sequence is not quasi-polynomial/power-law in the supported sense. Hurwitz path is skipped.");
      if (bundle.modelDetection.type === 'fourier') { const peakAmps = (bundle.modelDetection.peaks || []).map(p => p.amplitude || 0); const strongestAmp = peakAmps.length ? Math.max(...peakAmps) : 0; const dcAbs = Math.abs(bundle.modelDetection.dcComponent ?? 0); if (dcAbs > 3 * Math.max(1e-9, strongestAmp)) out.push(`ℹ DC component is dominant (${formatNum(bundle.modelDetection.dcComponent, 6)}). dcEstimate may be more informative than Abel.`); }
      const borel = bundle.results.find(r => r.method === 'borel');
      if (borel?.status === 'success') out.push(`ℹ Borel summation agrees: ${formatNum(borel.value, 8)}`);
      else if (borel?.status === 'exploratory') out.push(`ℹ Borel summation returned exploratory value: ${formatNum(borel.value, 6)} (not fully converged).`);
      const pade = bundle.results.find(r => r.method === 'pade');
      if (pade?.status === 'success') out.push(`Pade continuation gives ${formatNum(pade.value, 8)}.`);
      else if (pade?.status === 'exploratory') out.push(`Pade continuation is exploratory: ${formatNum(pade.value, 6)}.`);
      const borelPade = bundle.results.find(r => r.method === 'borelPade');
      if (borelPade?.status === 'success') out.push(`Borel-Pade gives ${formatNum(borelPade.value, 8)}.`);
      else if (borelPade?.status === 'exploratory') out.push(`Borel-Pade is exploratory: ${formatNum(borelPade.value, 6)}.`);
      const dimReg = bundle.results.find(r => r.method === 'dimReg');
      if (dimReg?.status === 'success') out.push(`DimReg finite part gives ${formatNum(dimReg.value, 8)}.`);
      const euler = bundle.results.find(r => r.method === 'euler');
      if (euler?.status === 'success') out.push(`ℹ Euler summation agrees: ${formatNum(euler.value, 8)}`);
      else if (euler?.status === 'exploratory') out.push(`ℹ Euler summation returned exploratory value: ${formatNum(euler.value, 6)}.`);
      return out;
    }

    function exportBundle(bundle) {
      const replacer = (key, value) => { if (value instanceof Float64Array) return Array.from(value); return value; };
      return JSON.stringify(bundle, replacer, 2);
    }

    function runFullAnalysis({ expression, params, Nmax, settings }) {
      const sequence = generateSequence(expression, params, Nmax);
      const modelDetection = detectModel(sequence, settings.modelDetection);
      const results = [
        hurwitzRegularize(modelDetection, sequence),
        dimensionRegularize(modelDetection, sequence, settings.dimReg || {}),
        geometricContinuationRegularize(sequence, settings.geometric || {}),
        rationalGeneratingFunctionRegularize(sequence, settings.rationalGF || {}),
        padeRegularize(sequence, settings.pade || {}),
        expCutoffRegularize(sequence, modelDetection, settings.expCutoff),
        windowRegularize(sequence, modelDetection, settings.window || {}),
        cesaroRegularize(sequence, settings.cesaro || {}),
        abelRegularize(sequence, modelDetection, settings.abel || {}),
        borelRegularize(sequence, modelDetection, settings.borel || {}),
        borelPadeRegularize(sequence, modelDetection, settings.borelPade || {}),
        eulerRegularize(sequence, modelDetection, settings.euler || {}),
      ];
      const hurwitzRes = results.find(r => r.method === 'hurwitz' && r.status === 'success' && Number.isFinite(r.value));
      const expRes = results.find(r => r.method === 'expCutoff' && r.status === 'success' && Number.isFinite(r.value));
      const geoRes = results.find(r => r.method === 'geometricContinuation' && r.status === 'success' && Number.isFinite(r.value));
      if (geoRes && Math.abs(geoRes.details?.q ?? 0) >= 1) {
        for (const method of ['expCutoff', 'window', 'cesaro', 'abel', 'borel', 'borelPade', 'euler']) {
          const idx = results.findIndex(r => r.method === method && Number.isFinite(r.value));
          if (idx >= 0) {
            results[idx] = { ...results[idx], status: 'exploratory', notes: [...(results[idx].notes || []), 'geometric-growth sequence; not used in ensemble'] };
          }
        }
      }
      const winIdx = results.findIndex(r => r.method === 'window' && (r.status === 'success' || r.status === 'exploratory') && Number.isFinite(r.value));
      if (winIdx >= 0) {
        const refs = [hurwitzRes?.value, expRes?.value].filter(Number.isFinite);
        if (refs.length) { const ref = refs[0]; const w = results[winIdx]; const diff = Math.abs(w.value - ref); const scale = Math.max(1e-9, Math.abs(ref), ...refs.map(v => Math.abs(v))); if (diff > Math.max(1e-3, 1e-2 * scale)) results[winIdx] = { ...w, status: 'exploratory', notes: [...(w.notes || []), `large disagreement with reference methods (Δ=${formatNum(diff, 6)})`, 'not used in ensemble'] }; }
      }
      const ensemble = buildEnsemble(results);
      const bundle = { input: { expression, params, Nmax }, sequence, modelDetection, results, ensemble, diagnostics: [], meta: { version: "0.11-dim-reg", generatedAt: new Date().toISOString() } };
      bundle.diagnostics = buildDiagnostics(bundle);
      return bundle;
    }

    function summaryRows(bundle) {
      const rows = bundle.results.map(r => ({ method: r.method, status: r.status, value: r.value, stability: r.stability, notes: r.notes.join('; ') }));
      // Ramanujan summation label: when Hurwitz succeeds for quasi-polynomial, it's also the Ramanujan sum
      const hurwitz = bundle.results.find(r => r.method === 'hurwitz');
      if (hurwitz?.status === 'success' && Number.isFinite(hurwitz.value) && (bundle.modelDetection.type === 'quasiPolynomial' || bundle.modelDetection.type === 'powerLaw')) {
        rows.push({ method: 'ramanujan', status: 'derived', value: hurwitz.value, stability: hurwitz.stability, notes: 'Ramanujan summation (equivalent to Hurwitz/zeta regularization for this skeleton type)' });
      }
      if (bundle.modelDetection?.type === 'fourier' && Math.abs(bundle.modelDetection.dcComponent ?? 0) > 1e-9) {
        const dcDetails = bundle.modelDetection?.dcDetails || {}; const dcStability = Number.isFinite(dcDetails.stability) ? dcDetails.stability : (bundle.modelDetection.confidence === 'good' ? 0.9 : 0.75);
        rows.push({ method: 'dcEstimate', status: 'derived', value: bundle.modelDetection.dcComponent, stability: dcStability, notes: dcDetails.note || 'Fourier skeleton DC component' });
      }
      rows.push({ method: "ensemble", status: "summary", value: bundle.ensemble.median, stability: bundle.ensemble.agreement, notes: (bundle.ensemble.agreement === 'insufficient' || bundle.ensemble.maxDeviation == null) ? 'only one successful method' : `max deviation=${formatNum(bundle.ensemble.maxDeviation, 6)}` });
      return rows;
    }

    function paramsToText(params = {}) {
      return Object.entries(params).map(([k, v]) => `${k}=${v}`).join(", ");
    }

    function makeHistoryEntry(bundle) {
      const rows = summaryRows(bundle);
      const ensemble = rows.find(r => r.method === 'ensemble');
      return {
        id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        createdAt: new Date().toLocaleTimeString(),
        expression: bundle.input.expression,
        params: bundle.input.params || {},
        Nmax: bundle.input.Nmax,
        modelType: bundle.modelDetection?.type || 'unknown',
        confidence: bundle.modelDetection?.confidence || 'unknown',
        ensembleValue: ensemble?.value ?? null,
        ensembleAgreement: bundle.ensemble?.agreement ?? 'insufficient',
        maxDeviation: bundle.ensemble?.maxDeviation ?? null,
        diagnostics: bundle.diagnostics || [],
        methods: rows.map(r => ({
          method: r.method,
          status: r.status,
          value: r.value,
          stability: r.stability,
          notes: r.notes
        }))
      };
    }

    function getHistoryMethod(entry, method) {
      return entry?.methods?.find(r => r.method === method);
    }

    function toScatterData(sequence, limit = 256) { const step = Math.max(1, Math.floor(sequence.length / limit)); const out = []; for (let i = 0; i < sequence.length; i += step) out.push({ n: i + 1, a: sequence[i] }); return out; }
    function toLineData(bundle, limit = 256) { const seq = bundle.sequence; const sk = bundle.modelDetection.skeleton || new Float64Array(seq.length); const re = bundle.modelDetection.residual || new Float64Array(seq.length); const step = Math.max(1, Math.floor(seq.length / limit)); const out = []; for (let i = 0; i < seq.length; i += step) out.push({ n: i + 1, seq: seq[i], skeleton: sk[i], residual: re[i] }); return out; }
    function download(filename, text) { const blob = new Blob([text], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url); }

      );

      const importAnalysisJson = () => {

          if (parsed?.input && parsed?.results && parsed?.ensemble) {

            setBundle(restored);

            setHistory(prev => [entry, ...prev].slice(0, 12));

      };

      React.useEffect(() => { try { const params = parseParams(paramText); const result = runFullAnalysis({ expression, params, Nmax, settings }); setBundle(result); pushHistory(result); setError(""); } catch (err) { setError(String(err.message || err)); } }, []);

      const onRun = () => { try { const params = parseParams(paramText); const result = runFullAnalysis({ expression, params, Nmax, settings }); setBundle(result); pushHistory(result); setError(""); } catch (err) { setError(String(err.message || err)); setBundle(null); } };

      const rows = bundle ? summaryRows(bundle) : [];
      const selectedHistory = selectedHistoryIds.map(id => history.find(h => h.id === id)).filter(Boolean);
      const comparisonMethods = [...new Set(selectedHistory.flatMap(h => h.methods.map(m => m.method)))];
      const statusClassFor = (status) => status === 'success' ? 'text-emerald-300' : status === 'exploratory' ? 'text-amber-300' : status === 'not_applicable' ? 'text-slate-400' : status === 'summary' ? 'text-cyan-300' : status === 'derived' ? 'text-violet-300' : status === 'diagnostic' ? 'text-violet-300' : 'text-slate-200';

                  <option value="hann">hann</option>
                  <option value="blackman">blackman</option>
                </select>
              </label>
              <NumberSetting group="abel" field="samples" label="Abel samples" min="12" max="200" />
              <NumberSetting group="borel" field="borelMaxTerms" label="Borel max terms" min="16" max="170" />
              <NumberSetting group="borelPade" field="maxOrder" label="Borel-Pade max order" min="2" max="24" />
              <NumberSetting group="borelPade" field="laguerreNodes" label="Borel-Pade nodes" min="8" max="30" />
              <NumberSetting group="borelPade" field="tMax" label="Borel-Pade pole scan t" min="4" max="80" />
              <NumberSetting group="euler" field="eulerMaxOrder" label="Euler max order" min="4" max="128" />
            </div>
            <p className="text-xs text-slate-500 mt-3">Settings are applied on the next Run and are intentionally scoped to the most useful numerical controls.</p>
          </details>

          <details className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
            <summary className="cursor-pointer font-semibold">Expression operators & examples</summary>
            <div className="grid md:grid-cols-2 gap-4 mt-4 text-sm text-slate-300">
              <div>
                <h3 className="font-semibold text-slate-100 mb-2">Operators</h3>
                <ul className="list-disc pl-5 space-y-1">
                  <li><span className="font-mono text-slate-100">+ - * / %</span> for arithmetic and residue classes</li>
                  <li><span className="font-mono text-slate-100">^</span> or <span className="font-mono text-slate-100">**</span> for powers</li>
                  <li><span className="font-mono text-slate-100">== != &lt; &lt;= &gt; &gt;=</span> for comparisons</li>
                  <li><span className="font-mono text-slate-100">condition ? a : b</span> for piecewise sequences</li>
                  <li><span className="font-mono text-slate-100">sin cos tan sqrt log abs floor ceil round pow</span></li>
                  <li><span className="font-mono text-slate-100">pi</span>, <span className="font-mono text-slate-100">e</span>, and custom parameters such as <span className="font-mono text-slate-100">eps</span></li>
                </ul>
              </div>
              <div>
                <h3 className="font-semibold text-slate-100 mb-2">Examples</h3>
                <div className="grid gap-2">
                  {[
                    ['2^(n-1)', '1, 2, 4, 8, ... / geometric and rational GF'],
                    ['(n % 2 == 0) ? 1 : 0', '0, 1, 0, 1, ... / period-2 selector'],
                    ['(n % 3 == 0) ? 1 : 0', 'period-3 selector, related to 1/(1-z^3)'],
                    ['(-1)^n', 'alternating sequence'],
                    ['n + 0.001*sin(n)', 'polynomial trend plus perturbation'],
                    ['floor(sqrt(n))', 'stepwise non-polynomial growth'],
                    ['a*n + b', 'uses parameters, e.g. a=2, b=1']
                  ].map(([expr, desc]) => (
                    <button key={expr} className="text-left bg-slate-950 hover:bg-slate-800 border border-slate-800 rounded-lg p-2" onClick={() => { setPreset('__custom__'); setExpression(expr); }}>
                      <div className="font-mono text-cyan-300">{expr}</div>
                      <div className="text-xs text-slate-500 mt-1">{desc}</div>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </details>

          {error && <div className="bg-rose-950 border border-rose-800 text-rose-200 rounded-2xl p-4">{error}</div>}

          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 overflow-x-auto">
            <h2 className="text-xl font-semibold mb-3">Summary Table</h2>
            <table className="w-full text-sm">
              <thead><tr className="text-left border-b border-slate-800 text-slate-300"><th className="py-2 pr-4">Method</th><th className="py-2 pr-4">Status</th><th className="py-2 pr-4">Value</th><th className="py-2 pr-4">Stability</th><th className="py-2">Notes</th></tr></thead>
              <tbody>
                {rows.map((r, i) => {
                  const statusClass = r.status === 'success' ? 'text-emerald-300' : r.status === 'exploratory' ? 'text-amber-300' : r.status === 'not_applicable' ? 'text-slate-400' : r.status === 'summary' ? 'text-cyan-300' : r.status === 'derived' ? 'text-violet-300' : r.status === 'diagnostic' ? 'text-violet-300' : 'text-slate-200';
                  return (<tr key={i} className="border-b border-slate-900 align-top"><td className="py-2 pr-4 font-medium">{r.method}</td><td className={`py-2 pr-4 font-medium ${statusClass}`}>{r.status}</td><td className="py-2 pr-4">{formatValueCell(r.value)}</td><td className="py-2 pr-4">{typeof r.stability === 'number' ? formatNum(r.stability, 4) : (r.stability ?? '—')}</td><td className="py-2">{r.notes || '—'}</td></tr>);
                })}
              </tbody>
            </table>
          </div>

          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
              <div>
                <h2 className="text-xl font-semibold">Experiment History</h2>
                <p className="text-sm text-slate-400 mt-1">Recent runs are kept as lightweight snapshots. Select up to 3 runs to compare.</p>
              </div>
              <button className="bg-slate-950 border border-slate-700 text-slate-200 rounded-xl px-3 py-2 text-sm disabled:opacity-40" disabled={!history.length} onClick={() => { setHistory([]); setSelectedHistoryIds([]); }}>Clear</button>
            </div>

            {history.length === 0 ? (
              <div className="text-sm text-slate-400">No history yet. Press Run to add the current experiment.</div>
            ) : (

                <div className="lg:col-span-1 space-y-2 max-h-80 overflow-y-auto pr-1">
                  {history.map((entry, index) => {
                    const selected = selectedHistoryIds.includes(entry.id);
                    return (
                      <div key={entry.id} className={`border rounded-xl p-3 ${selected ? 'border-cyan-400 bg-cyan-950/20' : 'border-slate-800 bg-slate-950/60'}`}>

                          <input type="checkbox" className="mt-1 accent-cyan-400" checked={selected} onChange={() => toggleHistorySelection(entry.id)} />
                          <div className="min-w-0 flex-1">
                            <div className="flex flex-wrap items-center gap-2">
                              <span className="text-xs text-slate-500">#{history.length - index}</span>
                              <span className="text-xs text-slate-500">{entry.createdAt}</span>
                              <span className="text-xs text-slate-400">{entry.modelType}/{entry.confidence}</span>
                            </div>
                            <div className="font-mono text-sm text-slate-100 truncate mt-1" title={entry.expression}>{entry.expression}</div>
                            <div className="text-xs text-slate-400 mt-1">Nmax={entry.Nmax}{paramsToText(entry.params) ? ` / ${paramsToText(entry.params)}` : ''}</div>
                            <div className="text-xs text-cyan-300 mt-1">ensemble: {formatNum(entry.ensembleValue, 8)} <span className="text-slate-500">({entry.ensembleAgreement})</span></div>
                          </div>
                        </div>
                        <div className="flex gap-2 mt-3">
                          <button className="bg-slate-800 hover:bg-slate-700 text-slate-100 rounded-lg px-3 py-1 text-xs" onClick={() => restoreHistoryInput(entry)}>Use input</button>
                          <button className="bg-slate-800 hover:bg-slate-700 text-slate-100 rounded-lg px-3 py-1 text-xs" onClick={() => download(`regsum-history-${entry.id}.json`, JSON.stringify(entry, null, 2))}>Export</button>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="lg:col-span-2 overflow-x-auto">
                  {selectedHistory.length === 0 ? (
                    <div className="h-full min-h-40 flex items-center justify-center text-sm text-slate-400 border border-dashed border-slate-700 rounded-xl">Select history entries to compare their method values.</div>
                  ) : (
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="text-left border-b border-slate-800 text-slate-300">
                          <th className="py-2 pr-4">Method</th>
                          {selectedHistory.map(entry => (
                            <th key={entry.id} className="py-2 pr-4 min-w-48">
                              <div className="font-mono text-xs text-slate-100 truncate" title={entry.expression}>{entry.expression}</div>
                              <div className="text-xs text-slate-500">N={entry.Nmax} / {entry.modelType}</div>
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {comparisonMethods.map(method => (
                          <tr key={method} className="border-b border-slate-900 align-top">
                            <td className="py-2 pr-4 font-medium text-slate-200">{method}</td>
                            {selectedHistory.map(entry => {
                              const row = getHistoryMethod(entry, method);
                              return (
                                <td key={`${entry.id}-${method}`} className="py-2 pr-4">
                                  {row ? (
                                    <div className="leading-snug">
                                      <div>{formatValueCell(row.value)}</div>
                                      <div className={`text-xs font-medium ${statusClassFor(row.status)}`}>{row.status}</div>
                                      {typeof row.stability === 'number' && <div className="text-xs text-slate-500">stability {formatNum(row.stability, 4)}</div>}
                                    </div>
                                  ) : (
                                    <span className="text-slate-600">—</span>
                                  )}
                                </td>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            )}
          </div>

          <div className="flex flex-wrap gap-2">
            {["Sequence", "Skeleton", "DimReg", "ExpCutoff", "Window", "Pade", "Borel", "Borel-Pade", "Euler", "Cesaro", "Abel"].map(name => (
              <button key={name} className={`px-4 py-2 rounded-xl border ${tab === name ? 'bg-cyan-500 text-slate-950 border-cyan-400' : 'bg-slate-900 border-slate-700 text-slate-200'}`} onClick={() => setTab(name)}>{name}</button>
            ))}
          </div>

          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 h-[420px]">
            {tab === "Sequence" && <SimpleScatterChart data={scatterData} xKey="n" yKey="a" />}
            {tab === "Skeleton" && <SimpleLineChart data={skeletonData} xKey="n" lines={[{ key: 'seq', label: 'a_n', color: '#22d3ee' }, { key: 'skeleton', label: 'b_n', color: '#a78bfa' }, { key: 'residual', label: 'e_n', color: '#f59e0b' }]} />}
            {tab === "DimReg" && bundle && (() => {
              const dimData = dimRegResult?.details?.curve || [];
              if (!dimData.length) return <div className="flex items-center justify-center h-full text-slate-400">DimReg curve is available for period-1 polynomial, power-law, or supported log skeletons</div>;
              return <SimpleLineChart data={dimData} xKey="s" lines={[{ key: 'D', label: 'D(s)', color: '#34d399' }]} />;
            })()}
            {tab === "ExpCutoff" && <SimpleLineChart data={expData} xKey="eps" lines={[{ key: 'sEps', label: 'S(eps)', color: '#22d3ee' }, { key: 'fitted', label: 'fitted', color: '#f472b6' }]} />}
            {tab === "Window" && bundle && <SimpleLineChart data={bundle.results.find(r => r.method === 'window')?.details?.curve || []} xKey="N" lines={[{ key: 'S', label: 'windowed sum', color: '#22d3ee' }, { key: 'fitted', label: 'fitted', color: '#a78bfa' }]} />}
            {tab === "Pade" && bundle && (() => {
              const padeData = padeResult?.details?.curve || [];
              if (!padeData.length) return <div className="flex items-center justify-center h-full text-slate-400">Pade continuation did not produce a curve</div>;
              return <SimpleLineChart data={padeData} xKey="z" lines={[{ key: 'value', label: 'Pade F(z)', color: '#38bdf8' }]} />;
            })()}
            {tab === "Borel" && bundle && (() => {
              const borelData = borelResult?.details?.curve || [];
              if (!borelData.length) return <div className="flex items-center justify-center h-full text-slate-400">Borel summation not applicable for this sequence</div>;
              return <SimpleLineChart data={borelData} xKey="t" lines={[{ key: 'integrand', label: 'e^{-t} f(t)', color: '#34d399' }, { key: 'f', label: 'f(t)', color: '#60a5fa' }]} />;
            })()}
            {tab === "Borel-Pade" && bundle && (() => {
              const bpData = borelPadeResult?.details?.curve || [];
              if (!bpData.length) return <div className="flex items-center justify-center h-full text-slate-400">Borel-Pade not applicable for this sequence</div>;
              return <SimpleLineChart data={bpData} xKey="t" lines={[{ key: 'integrand', label: 'e^{-t} Pade(B)(t)', color: '#2dd4bf' }, { key: 'f', label: 'Pade(B)(t)', color: '#818cf8' }]} />;
            })()}
            {tab === "Euler" && bundle && (() => {
              const eulerData = eulerResult?.details?.convergenceCurve || [];
              if (!eulerData.length) return <div className="flex items-center justify-center h-full text-slate-400">Euler summation not applicable for this sequence</div>;
              return <SimpleLineChart data={eulerData} xKey="k" lines={[{ key: 'partial', label: 'Euler partial sum', color: '#f59e0b' }]} />;
            })()}
            {tab === "Cesaro" && bundle && <SimpleLineChart data={bundle.results.find(r => r.method === 'cesaro')?.details?.partials || []} xKey="n" lines={[{ key: 'partial', label: 'partial sum', color: '#22d3ee' }, { key: 'cesaro', label: 'cesaro mean', color: '#34d399' }]} />}
            {tab === "Abel" && bundle && <SimpleLineChart data={bundle.results.find(r => r.method === 'abel')?.details?.curve || []} xKey="x" lines={[{ key: 'A', label: 'A(x)', color: '#60a5fa' }, { key: 'fitted', label: 'fitted', color: '#f472b6' }]} />}
          </div>

          <details className="bg-slate-900 border border-slate-800 rounded-2xl p-4" open>
            <summary className="cursor-pointer font-semibold">Diagnostics & Warnings</summary>
            <ul className="mt-3 space-y-2 text-sm text-slate-300 list-disc pl-5">
              {(bundle?.diagnostics || ["No diagnostics yet"]).map((d, i) => <li key={i}>{d}</li>)}
            </ul>
            {bundle && <div className="mt-4 text-sm text-slate-400">skeleton type: <span className="text-slate-200">{bundle.modelDetection.type}</span>{bundle.modelDetection.type === 'quasiPolynomial' && ` / period=${bundle.modelDetection.period} / degree=${bundle.modelDetection.degree}`}{bundle.modelDetection.type === 'powerLaw' && ` / exponent=${formatNum(bundle.modelDetection.exponent, 8)}`}{bundle.modelDetection.type === 'fourier' && ` / peaks=${bundle.modelDetection.numPeaks} / dc=${formatNum(bundle.modelDetection.dcComponent, 6)}`}</div>}
          </details>

          {/* DimReg details panel */}
          {bundle && dimRegResult && (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
              <h3 className="font-semibold text-slate-100 mb-3">Dimensional Regularization Details</h3>
              <div className="text-sm text-slate-300">status: <span className={dimRegResult.status === 'success' ? 'text-emerald-300' : dimRegResult.status === 'not_applicable' ? 'text-slate-400' : 'text-amber-300'}>{dimRegResult.status}</span></div>
              <div className="text-sm text-slate-300 mt-2">finite part at s=0: {formatValueCell(dimRegResult.value)}</div>
              <div className="text-sm text-slate-300 mt-2">stability: {typeof dimRegResult.stability === 'number' ? formatNum(dimRegResult.stability, 4) : (dimRegResult.stability ?? '—')}</div>
              {Number.isFinite(dimRegResult.details?.poleCoeff) && Math.abs(dimRegResult.details.poleCoeff) > 1e-12 && <div className="text-sm text-amber-300 mt-2">pole coefficient: {formatNum(dimRegResult.details.poleCoeff, 10)} / s</div>}
              {dimRegResult.details?.parts?.length > 0 && (
                <div className="mt-3 overflow-x-auto">
                  <div className="text-xs text-slate-400 mb-1">Finite-part decomposition</div>
                  <table className="w-full text-xs">
                    <thead><tr className="text-left text-slate-400"><th className="py-1">term</th><th className="py-1">coefficient</th><th className="py-1">zeta / finite part</th><th className="py-1">contribution</th></tr></thead>
                    <tbody>
                      {dimRegResult.details.parts.map((r, i) => (
                        <tr key={i} className="border-t border-slate-800">
                          <td className="py-1">{r.term}</td>
                          <td className="py-1">{formatNum(r.coefficient, 8)}</td>
                          <td className="py-1">{r.zetaArgument != null ? `ζ(${formatNum(r.zetaArgument, 6)})` : formatNum(r.finitePart, 8)}</td>
                          <td className="py-1">{formatNum(r.contribution, 12)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              <div className="text-xs text-slate-500 mt-3">{dimRegResult.notes?.join('; ') || '—'}</div>
            </div>
          )}

          {/* Pade details panel */}
          {bundle && padeResult && (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
              <h3 className="font-semibold text-slate-100 mb-3">Pade Continuation Details</h3>
              <div className="text-sm text-slate-300">status: <span className={padeResult.status === 'success' ? 'text-emerald-300' : padeResult.status === 'not_applicable' ? 'text-slate-400' : 'text-amber-300'}>{padeResult.status}</span></div>
              <div className="text-sm text-slate-300 mt-2">value at z=1: {formatValueCell(padeResult.value)}</div>
              <div className="text-sm text-slate-300 mt-2">stability: {typeof padeResult.stability === 'number' ? formatNum(padeResult.stability, 4) : (padeResult.stability ?? '—')}</div>
              {padeResult.details?.chosen && <div className="text-sm text-slate-300 mt-2">chosen order: [{padeResult.details.chosen.L}/{padeResult.details.chosen.M}], Q(1)={formatNum(padeResult.details.chosen.denominatorAtOne, 8)}</div>}
              {padeResult.details?.candidates?.length > 0 && (
                <div className="mt-3 overflow-x-auto">
                  <div className="text-xs text-slate-400 mb-1">Nearby Pade orders</div>
                  <table className="w-full text-xs">
                    <thead><tr className="text-left text-slate-400"><th className="py-1">order</th><th className="py-1">value</th><th className="py-1">Q(1)</th></tr></thead>
                    <tbody>
                      {padeResult.details.candidates.slice(-12).map((r, i) => (
                        <tr key={i} className="border-t border-slate-800"><td className="py-1">[{r.L}/{r.M}]</td><td className="py-1">{formatNum(r.value, 12)}</td><td className="py-1">{formatNum(r.denominatorAtOne, 8)}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              <div className="text-xs text-slate-500 mt-3">{padeResult.notes?.join('; ') || '—'}</div>
            </div>
          )}

          {/* Borel details panel */}
          {bundle && borelResult && (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">

              <div className="text-sm text-slate-300">status: <span className={borelResult.status === 'success' ? 'text-emerald-300' : borelResult.status === 'not_applicable' ? 'text-slate-400' : 'text-amber-300'}>{borelResult.status}</span></div>
              <div className="text-sm text-slate-300 mt-2">value: {formatValueCell(borelResult.value)}</div>
              <div className="text-sm text-slate-300 mt-2">stability: {typeof borelResult.stability === 'number' ? formatNum(borelResult.stability, 4) : (borelResult.stability ?? '—')}</div>
              {borelResult.details?.maxTermsUsed && <div className="text-sm text-slate-300 mt-2">max terms used: {borelResult.details.maxTermsUsed}</div>}

              {borelResult.details?.quadratureResults?.length > 0 && (
                <div className="mt-3 overflow-x-auto">
                  <div className="text-xs text-slate-400 mb-1">Quadrature convergence (increasing number of Gauss-Laguerre nodes)</div>

                    <thead><tr className="text-left text-slate-400"><th className="py-1">nodes</th><th className="py-1">value</th></tr></thead>
                    <tbody>
                      {borelResult.details.quadratureResults.map((r, i) => (
                        <tr key={i} className="border-t border-slate-800"><td className="py-1">{r.nPoints}</td><td className="py-1">{formatNum(r.value, 12)}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {borelResult.details?.truncationCheck?.length > 0 && (
                <div className="mt-3 overflow-x-auto">
                  <div className="text-xs text-slate-400 mb-1">Truncation sensitivity (varying number of series terms)</div>
                  <table className="w-full text-xs">
                    <thead><tr className="text-left text-slate-400"><th className="py-1">terms</th><th className="py-1">value</th></tr></thead>
                    <tbody>
                      {borelResult.details.truncationCheck.map((r, i) => (
                        <tr key={i} className="border-t border-slate-800"><td className="py-1">{r.nTerms}</td><td className="py-1">{formatNum(r.value, 12)}</td></tr>
                      ))}
                    </tbody>
                  </table>
                  {borelResult.details.truncRelSpread != null && <div className="text-xs text-slate-400 mt-1">truncation relative spread: {formatNum(borelResult.details.truncRelSpread, 6)}</div>}
                </div>
              )}

              <div className="text-xs text-slate-500 mt-3">{borelResult.notes?.join('; ') || '—'}</div>
            </div>
          )}

          {/* Borel-Pade details panel */}
          {bundle && borelPadeResult && (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
              <h3 className="font-semibold text-slate-100 mb-3">Borel-Pade Details</h3>
              <div className="text-sm text-slate-300">status: <span className={borelPadeResult.status === 'success' ? 'text-emerald-300' : borelPadeResult.status === 'not_applicable' ? 'text-slate-400' : 'text-amber-300'}>{borelPadeResult.status}</span></div>
              <div className="text-sm text-slate-300 mt-2">value: {formatValueCell(borelPadeResult.value)}</div>
              <div className="text-sm text-slate-300 mt-2">stability: {typeof borelPadeResult.stability === 'number' ? formatNum(borelPadeResult.stability, 4) : (borelPadeResult.stability ?? '—')}</div>
              {borelPadeResult.details?.chosen && <div className="text-sm text-slate-300 mt-2">chosen order: [{borelPadeResult.details.chosen.L}/{borelPadeResult.details.chosen.M}], min |Q(t)|={formatNum(borelPadeResult.details.chosen.minDenominatorAbs, 8)}</div>}
              {borelPadeResult.details?.candidates?.length > 0 && (
                <div className="mt-3 overflow-x-auto">
                  <div className="text-xs text-slate-400 mb-1">Nearby Borel-Pade orders</div>
                  <table className="w-full text-xs">
                    <thead><tr className="text-left text-slate-400"><th className="py-1">order</th><th className="py-1">value</th><th className="py-1">pole risk</th><th className="py-1">min |Q|</th></tr></thead>
                    <tbody>
                      {borelPadeResult.details.candidates.slice(-12).map((r, i) => (
                        <tr key={i} className="border-t border-slate-800"><td className="py-1">[{r.L}/{r.M}]</td><td className="py-1">{formatNum(r.value, 12)}</td><td className="py-1">{r.poleRisk ? 'yes' : 'no'}</td><td className="py-1">{formatNum(r.minDenominatorAbs, 8)}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              <div className="text-xs text-slate-500 mt-3">{borelPadeResult.notes?.join('; ') || '—'}</div>
            </div>
          )}

          {/* Euler details panel */}
          {bundle && eulerResult && (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
              <h3 className="font-semibold text-slate-100 mb-3">Euler Summation Details</h3>
              <div className="text-sm text-slate-300">status: <span className={eulerResult.status === 'success' ? 'text-emerald-300' : eulerResult.status === 'not_applicable' ? 'text-slate-400' : 'text-amber-300'}>{eulerResult.status}</span></div>
              <div className="text-sm text-slate-300 mt-2">value: {formatValueCell(eulerResult.value)}</div>
              <div className="text-sm text-slate-300 mt-2">stability: {typeof eulerResult.stability === 'number' ? formatNum(eulerResult.stability, 4) : (eulerResult.stability ?? '—')}</div>
              {eulerResult.details?.maxOrderUsed && <div className="text-sm text-slate-300 mt-2">max order used: {eulerResult.details.maxOrderUsed}</div>}
              {eulerResult.details?.signChangeRatio != null && <div className="text-sm text-slate-300 mt-2">sign change ratio: {formatNum(eulerResult.details.signChangeRatio, 4)}</div>}

              {eulerResult.details?.orderResults?.length > 0 && (
                <div className="mt-3 overflow-x-auto">
                  <div className="text-xs text-slate-400 mb-1">Convergence across Euler transform orders</div>
                  <table className="w-full text-xs">
                    <thead><tr className="text-left text-slate-400"><th className="py-1">order</th><th className="py-1">value</th></tr></thead>
                    <tbody>
                      {eulerResult.details.orderResults.map((r, i) => (
                        <tr key={i} className="border-t border-slate-800"><td className="py-1">{r.order}</td><td className="py-1">{formatNum(r.value, 12)}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              <div className="text-xs text-slate-500 mt-3">{eulerResult.notes?.join('; ') || '—'}</div>
            </div>
          )}

          <div className="flex flex-wrap gap-3">
            <button className="bg-violet-400 text-slate-950 rounded-xl px-4 py-2 font-semibold" onClick={() => { try { setTestResults(runBuiltInTests(settings)); setError(''); } catch (err) { setError(String(err.message || err)); } }}>Run Built-in Tests</button>
            <button className="bg-emerald-400 text-slate-950 rounded-xl px-4 py-2 font-semibold" onClick={() => bundle && download("regsum-analysis.json", exportBundle(bundle))}>Export JSON</button>
          </div>

          <details className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
            <summary className="cursor-pointer font-semibold">Import JSON</summary>
            <div className="grid md:grid-cols-[1fr_auto] gap-3 mt-4 items-end">
              <label className="block">
                <span className="block text-sm text-slate-300 mb-2">Paste a RegSum export or history snapshot</span>
                <textarea className="w-full min-h-32 bg-slate-950 border border-slate-700 rounded-xl p-3 font-mono text-xs text-slate-100" value={importText} onChange={e => setImportText(e.target.value)} placeholder='{"input":{"expression":"n","params":{},"Nmax":4096}, ...}' />
              </label>
              <div className="flex md:flex-col gap-2">
                <button className="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-semibold rounded-xl px-4 py-2 disabled:opacity-40" disabled={!importText.trim()} onClick={importAnalysisJson}>Import</button>
                <button className="bg-slate-950 border border-slate-700 text-slate-200 rounded-xl px-4 py-2 disabled:opacity-40" disabled={!importText} onClick={() => setImportText('')}>Clear</button>
              </div>
            </div>
            <p className="text-xs text-slate-500 mt-3">Full exports restore the current analysis view and add a history entry. History snapshots are added to the comparison list.</p>
          </details>

          {testResults.length > 0 && (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 overflow-x-auto">
              <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
                <h2 className="text-xl font-semibold">Built-in Tests</h2>
                <div className="text-sm text-slate-300">PASS {testSummary.passed} / {testSummary.total}</div>
              </div>
              <div className="flex flex-wrap gap-2 mb-4">
                <button className={`px-3 py-1 rounded-lg border ${testFilter === 'all' ? 'bg-cyan-500 text-slate-950 border-cyan-400' : 'bg-slate-950 border-slate-700 text-slate-200'}`} onClick={() => setTestFilter('all')}>all</button>
                {Object.keys(testSummary.byCategory).map(cat => (
                  <button key={cat} className={`px-3 py-1 rounded-lg border ${testFilter === cat ? 'bg-cyan-500 text-slate-950 border-cyan-400' : 'bg-slate-950 border-slate-700 text-slate-200'}`} onClick={() => setTestFilter(cat)}>
                    {cat} ({testSummary.byCategory[cat].passed}/{testSummary.byCategory[cat].total})
                  </button>
                ))}
              </div>
              <table className="w-full text-sm mb-4">
                <thead><tr className="text-left border-b border-slate-800 text-slate-300"><th className="py-2 pr-4">ID</th><th className="py-2 pr-4">Cat</th><th className="py-2 pr-4">Expr</th><th className="py-2 pr-4">Method</th><th className="py-2 pr-4">Expected</th><th className="py-2 pr-4">Actual</th><th className="py-2 pr-4">Error</th><th className="py-2 pr-4">Tol</th><th className="py-2">Pass</th></tr></thead>
                <tbody>
                  {filteredTests.map((t, i) => (
                    <tr key={i} className="border-b border-slate-900"><td className="py-2 pr-4 font-medium">{t.id}</td><td className="py-2 pr-4 text-slate-400">{t.category}</td><td className="py-2 pr-4">{t.expr}</td><td className="py-2 pr-4">{t.method}</td><td className="py-2 pr-4">{typeof t.expected === 'string' ? t.expected : formatNum(t.expected, 8)}</td><td className="py-2 pr-4">{typeof t.actual === 'string' ? t.actual : formatNum(t.actual, 8)}</td><td className="py-2 pr-4">{Number.isFinite(t.error) ? formatNum(t.error, 6) : '—'}</td><td className="py-2 pr-4">{t.method === 'modelType' || t.method === 'borelStatus' || t.method === 'eulerStatus' ? '—' : formatNum(t.tol, 3)}</td><td className={`py-2 font-semibold ${t.pass ? 'text-emerald-400' : 'text-rose-400'}`}>{t.pass ? 'PASS' : 'FAIL'}</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          <div className="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 text-sm text-slate-400">
            <div className="font-semibold text-slate-200 mb-2">v0.9 changelog</div>
            <p><span className="text-emerald-300">Settings パネルと Import JSON</span>を追加。モデル検出、指数カットオフ、Window、Abel、Borel、Euler の主要パラメータを画面から調整できます。Export JSON の再読込にも対応しました。</p>
            <p className="mt-2"><span className="text-sky-300">geometricContinuation</span>を追加。単純な等比列 `C q^k` を検出し、幾何級数の解析接続 `C/(1-q)` を計算します。`Powers of two` プリセットを追加しました。</p>
            <p className="mt-2"><span className="text-indigo-300">rationalGeneratingFunction</span>を追加。低次線形漸化式から `P(z)/Q(z)` を復元し、極がない場合は `z=1` の解析接続値を表示します。式の演算子リストと例も追加しました。</p>
            <p><span className="text-cyan-300">実験履歴・比較ビュー</span>を追加。Run ごとに式、パラメータ、Nmax、モデル判定、各正則化法の値を保存し、最大3件まで横並び比較できます。履歴から入力欄へ戻すこともできます。</p>
            <p><span className="text-amber-300">オイラー総和法</span>を追加。前進差分 Δᵏa₁ を計算し、Σ Δᵏa₁ / 2^(k+1) で交代級数を総和します。複数の打ち切り次数（16, 24, 32, 48, 64）で収束を確認し、Euler タブで部分和の収束を可視化できます。</p>
            <p className="mt-2"><span className="text-violet-300">ラマヌジャン総和ラベル</span>を追加。Hurwitz が成功した多項式・冪則骨格に対して、Summary Table に ramanujan 行を derived として表示します。</p>
            <p className="mt-2 text-slate-500">v0.6 の全機能（Hurwitz / Exp Cutoff / Cesàro / Abel / Borel / Fourier / dcEstimate / Window / extended skeleton）はそのまま保持しています。</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
