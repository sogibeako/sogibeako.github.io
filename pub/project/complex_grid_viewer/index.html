<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Complex Grid Viewer</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Complex Grid Viewer</h1>
        <p>複素平面の格子が f(z) によってどう曲がるかを観察します。</p>
      </div>
      <div class="readout" id="statusText">ready</div>
    </header>

    <section class="controls" aria-label="controls">
      <label class="formula">
        <span>f(z)</span>
        <input id="formulaInput" type="text" value="z^2" spellcheck="false" autocomplete="off">
      </label>
      <button id="applyBtn" type="button">Apply</button>
      <select id="presetSelect" aria-label="preset functions">
        <option value="z^2">z^2</option>
        <option value="z^3 - z">z^3 - z</option>
        <option value="1 / z">1 / z</option>
        <option value="exp(z)">exp(z)</option>
        <option value="sin(z)">sin(z)</option>
        <option value="log(z)">log(z)</option>
        <option value="sqrt(z)">sqrt(z)</option>
        <option value="(z - 1) / (z + 1)">Mobius</option>
      </select>
      <label>
        <span>grid</span>
        <input id="gridStepInput" type="range" min="0.25" max="1.5" value="0.5" step="0.25">
      </label>
      <label>
        <span>range</span>
        <input id="rangeInput" type="range" min="2" max="8" value="4" step="1">
      </label>
      <label>
        <span>density</span>
        <input id="densityInput" type="range" min="18" max="90" value="46" step="4">
      </label>
      <button id="resetBtn" type="button">Reset View</button>
    </section>

    <section class="workspace">
      <article class="plane">
        <div class="plane-head">
          <h2>z-plane</h2>
          <span id="sourceCoord">z = 0 + 0i</span>
        </div>
        <canvas id="sourceCanvas"></canvas>
      </article>
      <article class="plane">
        <div class="plane-head">
          <h2>w-plane</h2>
          <span id="targetCoord">w = 0 + 0i</span>
        </div>
        <canvas id="targetCanvas"></canvas>
      </article>
    </section>

    <section class="notes" aria-label="examples">
      <button type="button" data-formula="z^2">fold</button>
      <button type="button" data-formula="z^3 - z">critical</button>
      <button type="button" data-formula="exp(z)">periodic</button>
      <button type="button" data-formula="1 / z">inversion</button>
      <button type="button" data-formula="sin(z)">trig</button>
      <button type="button" data-formula="(z - 1) / (z + 1)">mobius</button>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
