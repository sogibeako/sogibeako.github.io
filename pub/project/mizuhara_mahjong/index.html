<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>水原麻雀 - 統合麻雀システム</title>
  <link rel="stylesheet" href="style.css?v=20260622-mcr-complete-1">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Integrated Mahjong System</p>
        <h1>水原麻雀</h1>
      </div>
      <div class="top-actions">
        <button id="newRoundBtn" class="primary">新しい局</button>
        <button id="autoPlayBtn">オート進行</button>
        <button id="tsumoBtn">和了判定</button>
        <button id="debugBtn">デバッグ</button>
      </div>
    </header>

    <section class="layout">
      <section class="game-shell">
        <div class="play-area">
          <div class="table-viewport" id="tableViewport">
          <div class="table" id="table">
            <div class="seat seat-top" id="seat2"></div>
            <div class="seat seat-right" id="seat3"></div>
            <div class="seat seat-bottom" id="seat0"></div>
            <div class="seat seat-left" id="seat1"></div>

            <div class="wall wall-top" id="wallTop"></div>
            <div class="wall wall-right" id="wallRight"></div>
            <div class="wall wall-bottom" id="wallBottom"></div>
            <div class="wall wall-left" id="wallLeft"></div>

            <div class="river river-top" id="river2"></div>
            <div class="river river-right" id="river3"></div>
            <div class="river river-bottom" id="river0"></div>
            <div class="river river-left" id="river1"></div>

            <div class="riichi-sticks" id="riichiSticks"></div>

            <div class="table-meld table-meld-bottom" id="tableMeld0"></div>
            <div class="table-meld table-meld-left" id="tableMeld1"></div>
            <div class="table-meld table-meld-top" id="tableMeld2"></div>
            <div class="table-meld table-meld-right" id="tableMeld3"></div>

            <div class="center-console">
              <div class="round-name" id="roundName">東一局</div>
              <div class="center-meta">
                <span id="wallCount">山 0</span>
                <span id="ruleName">標準リーチ</span>
              </div>
            </div>

            <div class="call-panel" id="callPanel" hidden></div>
            <div class="score-overlay" id="scoreOverlay" hidden></div>
          </div>
          </div>

          <aside class="player-status" id="playerStatus"></aside>
        </div>

        <div class="player-console">
          <div class="console-info">
            <div>
              <span class="label">ドラ表示牌</span>
              <div class="dora-row" id="doraTiles"></div>
            </div>
            <div>
              <span class="label">状況</span>
              <strong id="turnStatus">配牌中</strong>
            </div>
            <div>
              <span class="label">花牌</span>
              <div class="flower-row" id="flowers"></div>
            </div>
          </div>
          <div class="hand" id="hand"></div>
          <div class="debug-panel" id="debugPanel" hidden></div>
        </div>
      </section>

      <aside class="sidepanel">
        <section class="panel">
          <h2>ルールセット</h2>
          <div class="preset-grid" id="presets"></div>
        </section>

        <section class="panel rule-panel">
          <h2>牌宇宙OS</h2>
          <label class="toggle"><input id="flowersToggle" type="checkbox"> 花牌を入れる</label>
          <label class="toggle"><input id="whiteStormToggle" type="checkbox"> 白を12枚にする</label>
          <label class="toggle"><input id="cosmicToggle" type="checkbox"> 宇宙順子を認める</label>
          <label class="toggle"><input id="chinaToggle" type="checkbox"> 中国麻将役を混ぜる</label>
          <label class="stacked">
            <span>白の枚数</span>
            <input id="whiteCountInput" type="number" min="4" max="24" value="4">
          </label>
        </section>

        <section class="panel">
          <h2>解析</h2>
          <div class="analysis" id="analysis"></div>
        </section>

        <section class="panel yaku-lab">
          <h2>役判定ラボ</h2>
          <div class="lab-actions">
            <button id="refreshLabBtn">再判定</button>
            <button id="copyAgariBtn">アガリデータをコピー</button>
          </div>
          <div class="lab-result" id="labResult"></div>
          <textarea id="agariData" spellcheck="false" readonly></textarea>
        </section>

        <section class="panel log-panel">
          <h2>ログ</h2>
          <div class="log" id="log"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="app.js?v=20260622-mcr-complete-1"></script>
</body>
</html>
