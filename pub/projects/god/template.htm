<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>* column * // 湫埜と雨滴 </title>
    <style>
        /* 色は出来るだけ、SB Creative出版『日本の美しい色と言葉』から取っていく。 */
        /* 当ページはp256『しとしと』 */
        /* 氷雨 #e3e8f1 */
        /* 俄雨 #6290b1 */
        /* 長雨 #afd3e6 */
        /* 秋雨 #609aa0 */
        /* 五月雨 #9ec8d1 */
        body {
            font-size: 1rem;
            background-color: #111822;
            /* 青っぽい背景色 */
            margin: 0;
            padding: 0;
            text-align: center;
            line-height: 1.6;
        }

        h1 {
            background-color: #609aa0;
            /* 秋雨 175,211,230*/
            color: black;
            /* 文字は黒でよい */
            padding: 0.5em;
            /* 内側の余白で見た目よく */
        }

        h2 {
            background-color: #609aa0;
            /* 秋雨 */
            color: black;
            /* 文字は黒でよい */
            padding: 0.5em;
            /* 内側の余白で見た目よく */
        }

        .p_left {
            text-align: left;
        }

        .wrapper {
            max-width: 700px;
            width: 80%;
            margin: 50px auto;
            padding: 20px;
            border: 0px solid #111;
            background-color: #afd3e6;
            /* 長雨 */
            font-family: "Segoe UI", "Arial Unicode MS", "MS PGothic", "sans-serif";
        }

        .inner_wrapper {
            width: 600px;
            margin: 10px auto;
            padding: 20px;
            border: 1px solid #111;
            background-color: #ffffee;
            font-family: "Segoe UI", "Arial Unicode MS", "MS PGothic", sans-serif;
        }

        .grid-table {
            display: grid;
            grid-template-columns: 90px 240px;
            gap: 2px;
        }

        .grid-table2 {
            display: grid;
            grid-template-columns: 90px 240px 120px;
            gap: 2px;
        }

        .grid-table3 {
            display: grid;
            grid-template-columns: 90px 90px 120px;
            gap: 2px;
        }

        .cell {
            border: 0px solid #cccccc;
            padding: 4px 8px;
            background-color: #eeeeee;
            line-break: strict;
            /* 日本語の自然な改行ルールに従う */
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .cell-blue {
            border: 0px solid #aaaaff;
            padding: 4px 8px;
            background-color: #ddddff;
            line-break: strict;
            /* 日本語の自然な改行ルールに従う */
            word-break: break-word;
            overflow-wrap: break-word;
        }

        img.top-image {
            width: 100%;
            max-width: 800px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        hr {
            border-width: 2px 0 0 0;
            /* 線の太さ */
            border-style: dashed;
            /* 線の種類 */
            border-color: #609aa0
                /* 線の色 */
        }

        .br-sp {
            display: none;
        }

        pre,
        pre code {
            background-color: #bbbbbb;
            color: #000;
            padding: 0.5em;
            display: block;
            overflow-x: auto;
            border-radius: 4px;
            font-family: "Courier New", Courier, monospace;
        }

        code {
            background-color: #bbbbbb;
            color: #000;
            padding: 0.1em 0.3em;
            border-radius: 3px;
            font-family: "Courier New", Courier, monospace;
            display: inline-block;
            line-height: 1.2;
        }

        @media screen and (max-width: 600px) {
            body {
                font-size: 0.7rem;
            }

            h1,
            h2 {
                font-size: 1rem;
            }

            .wrapper,
            .inner_wrapper {
                width: 95%;
                padding: 10px;
                word-wrap: break-word;
                box-sizing: border-box;
            }

            .grid-table {
                grid-template-columns: 50px 200px;

            }

            .grid-table2 {
                grid-template-columns: 50px 200px 100px;
            }

            .grid-table3 {
                grid-template-columns: 50px 50px 100px;
            }

            .br-sp {
                display: inline;
            }
        }
    </style>

</head>
