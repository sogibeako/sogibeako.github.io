<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16x16 Glitch Tile Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="glitchCanvas"></canvas>

    <div id="uiOverlay" class="ui-overlay">
        <h1>Glitch Tile Canvas</h1>
        <div class="control-group">
            <label for="uploadInput" class="upload-btn">Upload Sprite Sheet (PNG)</label>
            <input type="file" id="uploadInput" accept="image/png, image/jpeg">
        </div>

        <div class="control-group">
            <label>Glitch Probability: <span id="probValue">10%</span></label>
            <input type="range" id="glitchProb" min="0" max="100" value="10">
        </div>

        <div class="control-group">
            <label>Update Interval (ms): <span id="intervalValue">100ms</span></label>
            <input type="range" id="updateInterval" min="16" max="1000" value="100" step="10">
        </div>

        <div class="control-group">
            <label>Color Palette</label>
            <select id="paletteSelect">
                <option value="default">Default (16 Colors)</option>
                <option value="gameboy">GameBoy (4 Colors)</option>
                <option value="neon">Neon Cyber (High Contrast)</option>
                <option value="grayscale">Grayscale</option>
                <option value="custom">Custom (Edit below)</option>
            </select>
        </div>

        <div id="customPaletteContainer" class="control-group hidden">
            <label>Custom Palette</label>
            <div id="paletteGrid" class="palette-grid">
                <!-- Generated by JS -->
            </div>
        </div>

        <div class="control-group">
            <label>
                <input type="checkbox" id="transparentMode"> Transparent Background
            </label>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>

</html>
