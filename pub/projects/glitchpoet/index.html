<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GlitchPoet — レトロゲームのチートバグが生むテキスト破壊を再現する変換器">
    <title>GlitchPoet — チートバグテキスト変換器</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ▸ Header -->
    <header class="header">
        <div>
            <div class="header-title">GlitchPoet</div>
            <div class="header-subtitle">チートバグテキスト変換器</div>
        </div>
        <div class="header-controls">
            <label class="toggle-switch" id="crtToggle">
                <span>CRT</span>
                <input type="checkbox">
                <span class="toggle-track"></span>
            </label>
        </div>
    </header>

    <!-- ▸ Main -->
    <div class="main-container" id="app">
        <!-- ── 入力パネル ── -->
        <div class="panel input-panel">

            <!-- テキスト入力 -->
            <div class="panel-section">
                <div class="panel-section-title">入力テキスト</div>
                <textarea id="textInput" class="text-input"
                    placeholder="テキストを入力してください…&#10;&#10;1行1エントリ、またはJSON配列で入力できます。">好きです。ずっと前から。
待ち合わせ場所はいつもの公園で。
今日の放課後、屋上に来てくれない？
あの日見た夕焼けを、まだ覚えてる。
ごめん、もう遅いんだ。</textarea>
                <div class="input-mode-indicator" id="inputModeIndicator">📄 プレーンテキスト（1行1エントリ）</div>
                <label class="file-load-btn" id="fileLoadBtn">
                    📁 ファイル読込
                    <input type="file" accept=".txt,.json" style="display:none" id="fileInput">
                </label>
            </div>

            <!-- 異世界データ入力 -->
            <div class="panel-section">
                <details class="other-world-details">
                    <summary class="panel-section-title" style="cursor:pointer; display:inline-flex;">
                        <span>異世界データ（オプション）</span>
                    </summary>
                    <div class="other-world-container">
                        <p class="other-world-desc">
                            「異世界参照」「DMA転送異常」などで読み込まれるダミーデータを指定できます。
                            <br>空欄の場合はランダム生成されます。
                        </p>
                        <textarea id="otherWorldInput" class="text-input" style="min-height:80px;"
                            placeholder="ここに「異世界」として扱いたいテキストを入力...&#10;（例：全く異なるジャンルの文章、意味不明な記号列など）"></textarea>
                    </div>
                </details>
            </div>

            <!-- モード切替 -->
            <div class="panel-section">
                <div class="panel-section-title">モード</div>
                <div class="mode-tabs">
                    <button class="mode-tab active" data-mode="simple" id="modeSimple">簡易</button>
                    <button class="mode-tab" data-mode="detail" id="modeDetail">詳細</button>
                </div>
            </div>

            <!-- 破壊度スライダー -->
            <div class="panel-section">
                <div class="panel-section-title">破壊度</div>
                <div class="slider-container">
                    <div class="slider-label-row">
                        <span class="destruction-name" id="destructionName"
                            style="background:rgba(126,200,227,0.2);color:#7ec8e3;">微損</span>
                        <span class="destruction-value" id="destructionValue" style="color:#7ec8e3;">0.10</span>
                    </div>
                    <input type="range" id="destructionSlider" min="0" max="100" value="10" step="1">
                </div>
            </div>

            <!-- シード -->
            <div class="panel-section">
                <div class="panel-section-title">シード値</div>
                <div class="seed-row">
                    <input type="number" id="seedInput" class="seed-input" value="42" min="0">
                    <button class="seed-random-btn" id="seedRandomBtn">🎲</button>
                </div>
            </div>

            <!-- アクション -->
            <div class="panel-section">
                <div class="action-buttons">
                    <button class="btn btn-primary" id="generateBtn">▶ 生成</button>
                    <div class="batch-row">
                        <button class="btn btn-secondary" id="batchBtn" style="flex:1;">▶▶ 連続生成</button>
                        <select class="batch-select" id="batchCount">
                            <option value="10">×10</option>
                            <option value="50">×50</option>
                            <option value="100">×100</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── 出力パネル ── -->
        <div class="panel output-panel">
            <!-- メッセージウィンドウ -->
            <div class="panel-section">
                <div class="panel-section-title">出力</div>
                <div class="message-window">
                    <div class="message-window-inner" id="outputDisplay">
                        <span class="placeholder">ここに変換結果が表示されます…</span><span class="cursor-blink"></span>
                    </div>
                </div>
                <div class="toggle-row">
                    <button class="toggle-btn" id="diffToggle">DIFF表示</button>
                    <button class="toggle-btn" id="annoToggle">注釈表示</button>
                </div>
                <div class="diff-container" id="diffContainer"></div>
            </div>

            <!-- 履歴・ブックマーク -->
            <div class="panel-section">
                <div class="panel-section-title">生成履歴</div>
                <div class="history-list" id="historyList">
                    <!-- 動的に追加 -->
                </div>
                <div class="export-row">
                    <button class="btn btn-secondary" id="exportTextBtn" style="flex:1;">📄 テキスト出力</button>
                    <button class="btn btn-secondary" id="exportJsonBtn" style="flex:1;">{ } JSON出力</button>
                    <button class="btn btn-secondary" id="exportBookmarkBtn" style="flex:1;">★ ブックマークのみ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ▸ 詳細モードパネル -->
    <div class="detail-panel" id="detailPanel">
        <!-- app.js で動的に生成 -->
    </div>

    <!-- ▸ Scripts -->
    <script src="js/prng.js"></script>
    <script src="js/memory.js"></script>
    <script src="js/glitch-engine.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
