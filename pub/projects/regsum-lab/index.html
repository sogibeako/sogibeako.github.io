<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RegSum Lab — Regularized Summation Dashboard</title>
    <meta name="description"
        content="Compare multiple regularization methods for divergent series: Hurwitz zeta, exponential cutoff, Cesàro, Abel, and windowed finite parts." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                }
            }
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 12px;
        }

        .glass-inner {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.08);
            border-radius: 8px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #22d3ee, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-size: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
            font-size: 13px;
        }

        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.6);
            color: #f1f5f9;
        }

        .status-success {
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-not_applicable {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-failed {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-skipped {
            color: #94a3b8;
            background: rgba(148, 163, 184, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-summary {
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        table.summary-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        table.summary-table th {
            text-align: left;
            padding: 10px 14px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #94a3b8;
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        }

        table.summary-table td {
            padding: 10px 14px;
            font-size: 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.06);
            vertical-align: middle;
        }

        table.summary-table tr:hover td {
            background: rgba(148, 163, 184, 0.04);
        }

        .tab-btn {
            padding: 8px 18px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all .2s;
        }

        .tab-btn.active {
            color: #22d3ee;
            border-bottom-color: #22d3ee;
        }

        .tab-btn:hover:not(.active) {
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="number"] {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #f1f5f9;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        input:focus {
            border-color: #0ea5e9;
        }

        select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #f1f5f9;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"] {
            accent-color: #0ea5e9;
        }

        .collapsible-header {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            transition: background .2s;
        }

        .collapsible-header:hover {
            background: rgba(148, 163, 184, 0.06);
        }

        .fade-in {
            animation: fadeIn .3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .recharts-wrapper {
            font-family: 'Inter', sans-serif !important;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="engine.js"></script>
    <script src="ui.js"></script>
</body>

</html>
