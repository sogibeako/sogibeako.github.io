<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>CatDiagram2 Builder</title>
  <link rel="stylesheet" href="./style.css">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"], ["$", "$"]]
      },
      svg: {
        fontCache: "global"
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="./cat-diagram.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- CatDiagramBuilder will inject UI here -->
  <div id="app"></div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const builder = new CatDiagramBuilder('#app', {
        initialData: {
          options: { layout: "manual" },
          nodes: [
            { id: "A", label: "\\mathcal{A}", x: 150, y: 150 },
            { id: "B", label: "\\mathcal{B}", x: 350, y: 150 }
          ],
          arrows: [
            { from: "A", to: "B", label: "F", curve: 0 }
          ]
        }
      });
    });
  </script>
</body>
</html>
