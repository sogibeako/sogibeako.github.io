<h2>ポーションってどうやって動くの？</h2>
例えば [quaff] -> [回復ポーション] を選択したタイミングで、必要な効果をもたらすようにする。<br>
（例、メッセージを表示し、HP+50、または最大値まで回復処理）<br>

<br>

一方、[quaff] -> [鉄の剣] に対しては出来れば効果を指定したくない。<br>
効果を持たないアイテムを指定した場合は、「え？」と表示されるようにする。<br>
