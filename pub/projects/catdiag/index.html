<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Theory Diagram Layout Engine (v0.1)</title>
  <link rel="stylesheet" href="./style.css">
  
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <h1>圏論図式レイアウト機構 v0.1 テスト</h1>
  
  <h2>1. 基本の四角形 (Square)</h2>
  <div id="diagram-square"></div>

  <h2>2. プルバック (Pullback)</h2>
  <div id="diagram-pullback"></div>

  <h2>3. 自然変換 (Naturality Square)</h2>
  <div id="diagram-naturality"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
