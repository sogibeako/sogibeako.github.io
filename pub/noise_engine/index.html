<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noise_engine v0.5</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="crt-overlay"></div>
    <div class="main-container">

        <header>
            <div class="title-section">
                <h1>noise_engine</h1>
                <span class="subtitle">v0.5 | Balanced Noise</span>
            </div>

            <div class="transport-section">
                <button id="startBtn" class="primary-btn">START ENGINE</button>
                <button id="recBtn" class="rec-btn" disabled>REC</button>
            </div>
        </header>

        <section class="monitor-section">
            <div class="monitor-header">MASTER_SCOPE</div>
            <div class="canvas-container">
                <canvas id="scopeCanvas"></canvas>
            </div>
        </section>

        <section class="sequencer-section">
            <div class="seq-header">16-STEP SEQUENCER</div>
            <div id="stepEditor" class="steps-container">
                <!-- Steps will be generated by JS -->
            </div>
        </section>

        <div class="controls-layout">
            <section class="control-panel mode-panel">
                <h3>VOICE MODE</h3>
                <div class="radio-group" id="modeSelector">
                    <label><input type="radio" name="voiceMode" value="pure"> PURE</label>
                    <label><input type="radio" name="voiceMode" value="digital" checked> DIGI</label>
                    <label><input type="radio" name="voiceMode" value="noise"> NOISE</label>
                    <label><input type="radio" name="voiceMode" value="sample"> SAMPLE</label>
                </div>

                <div class="random-toggles">
                    <button id="waveRandBtn" class="toggle-btn" title="Randomize waveforms on each step">WAVE RAND:
                        <span class="status">OFF</span></button>
                    <button id="dynRandBtn" class="toggle-btn" title="Randomize dynamics/gain on each step">DYNAMICS
                        RAND: <span class="status">OFF</span></button>
                </div>
            </section>

            <section class="control-panel params-panel">
                <h3>PARAMETERS</h3>
                <div class="sliders-grid">
                    <div class="slider-group">
                        <label>BPM: <span id="bpmVal">120</span></label>
                        <input type="range" id="bpmSlider" min="40" max="500" value="120">
                    </div>

                    <div class="slider-group">
                        <label>GATE: <span id="gateVal">100%</span></label>
                        <input type="range" id="gateSlider" min="0" max="100" value="100">
                    </div>

                    <div class="slider-group">
                        <label>PITCH: <span id="pitchVal">1.00</span></label>
                        <input type="range" id="pitchSlider" min="0.1" max="4.0" step="0.01" value="1.0">
                    </div>

                    <div class="slider-group" title="Pitch deviation range">
                        <label>RANGE: <span id="rangeVal">±0 st</span></label>
                        <input type="range" id="rangeSlider" min="0.0" max="2.0" step="0.01" value="0.0">
                    </div>

                    <div class="slider-group">
                        <label>DECAY: <span id="decayVal">0.10s</span></label>
                        <input type="range" id="decaySlider" min="0.01" max="1.0" step="0.01" value="0.10">
                    </div>

                    <div class="slider-group">
                        <label>RATCHET: <span id="stutterVal">1</span></label>
                        <select id="stutterSelect" class="ratchet-select">
                            <!-- 1 to 16 -->
                            <option value="1" selected>1 (OFF)</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="6">6</option>
                            <option value="8">8</option>
                            <option value="12">12</option>
                            <option value="16">16</option>
                            <option value="17">AUTO</option>
                        </select>
                    </div>

                    <div class="slider-group" title="Quantization magnitude (Pseudo-Bit Depth)">
                        <label>BIT CRUSH: <span id="bitVal">16</span></label>
                        <input type="range" id="bitSlider" min="1" max="16" step="0.1" value="16">
                    </div>

                    <div class="slider-group" title="Sample rate reduction factor">
                        <label>DOWNSAMPLE: <span id="downVal">1</span></label>
                        <input type="range" id="downSlider" min="1" max="40" step="1" value="1">
                    </div>

                    <div class="slider-group">
                        <label>MASTER VOL: <span id="masterVolVal">100%</span></label>
                        <input type="range" id="masterVolSlider" min="0" max="2" step="0.01" value="1.0">
                    </div>
                </div>
            </section>
        </div>

        <section class="sample-section">
            <div class="sample-header">
                <h3>SAMPLE LOADER</h3>
                <div class="sample-controls">
                    <label class="file-upload-btn">
                        LOAD WAV
                        <input type="file" id="wavLoader" accept="audio/*,.wav">
                    </label>
                </div>
            </div>
            <div id="sampleInfo" class="sample-info-display">
                NO SAMPLE LOADED
            </div>
        </section>

    </div>

    <script src="audio_engine.js"></script>
    <script src="app.js"></script>
</body>

</html>
