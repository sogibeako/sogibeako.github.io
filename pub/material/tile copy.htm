<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>タイル配布 * 湫埜と雨滴 *</title>
    <style>
        /* 色は出来るだけ、SB Creative出版『日本の美しい色と言葉』から取っていく。 */
        /* 当ページはp256『しとしと』 */
        /* 氷雨 #e3e8f1 */
        /* 俄雨 #6290b1 */
        /* 長雨 #afd3e6 */
        /* 秋雨 #609aa0 */
        /* 五月雨 #9ec8d1 */

        body {
            font-size: 1rem;
            background-color: #111822;
            background-image: none;
            background-repeat: repeat;
            background-size: auto;
            background-position: top left;
            margin: 0;
            padding: 0;
            text-align: left;
            line-height: 1.6;
        }

        h1 {
            background-color: #609aa0;
            color: black;
            padding: 0.5em;
        }

        h2 {
            background-color: #6290b1;
            color: black;
            padding: 0.2em;
        }

        h3 {
            background-color: #fde5c5;
            color: black;
            padding: 0.1em;
        }

        dt {
            font-weight: bold;
        }

        .wrapper {
            max-width: 700px;
            width: 80%;
            margin: 50px auto;
            padding: 20px;
            border: 0px solid #111;
            background-color: #afd3e6;
            background-image: none;
            background-repeat: repeat;
            background-size: auto;
            background-position: top left;
            font-family: "Segoe UI", "Arial Unicode MS", "MS PGothic", "sans-serif";
        }

        img.tile {
            width: 120px;
            height: auto;
            display: block;
            margin: 0;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        img.tile:hover {
            transform: scale(1.04);
            opacity: 0.9;
        }

        .inner_wrapper {
            width: 600px;
            margin: 10px auto;
            padding: 20px;
            border: 1px solid #111;
            background-color: #ffffee;
            font-family: "Segoe UI", "Arial Unicode MS", "MS PGothic", sans-serif;
        }

        .eqwrap {
            overflow-x: auto;
            margin: 0.5em 0;
        }

        hr {
            border-width: 2px 0 0 0;
            border-style: dashed;
            border-color: #609aa0;
        }

        table.tile-table {
            border-collapse: collapse;
            width: 100%;
        }

        table.tile-table th,
        table.tile-table td {
            border: 1px solid #666;
            padding: 8px;
            vertical-align: middle;
        }

        table.tile-table td.tile-cell {
            width: 1%;
            white-space: nowrap;
        }

        img.tile {
            width: 120px;
            height: auto;
            display: block;
            margin: 0;
        }

        ol {
            font-weight: bold;
        }

        ol li {
            font-weight: normal;
        }

        .p_left {
            text-align: left;
        }

        details {
            margin: 1em 0;
            padding: 0.5em;
            border: 1px solid #609aa0;
            border-radius: 4px;
            background-color: #e3e8f1;
        }

        details summary {
            cursor: pointer;
            font-weight: bold;
            color: #333;
        }

        /* ============================================================
     案D: 雨窓ボタン（Canvas雨粒アニメーション背景）
     ============================================================ */
        .rain-window-btn {
            position: relative;
            width: 200px;
            height: 64px;
            background: rgba(17, 24, 34, 0.85);
            border: 2px solid #609aa055;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: border-color 0.4s, box-shadow 0.4s;
            margin: 0 auto;
        }

        .rain-window-btn canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .rain-window-btn .rw-label {
            position: relative;
            z-index: 1;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: #e3e8f1;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
            transition: text-shadow 0.4s;
        }

        .rain-window-btn:hover {
            border-color: #9ec8d1;
            box-shadow: 0 0 24px rgba(158, 200, 209, 0.15);
        }

        .rain-window-btn:hover .rw-label {
            text-shadow: 0 0 10px rgba(158, 200, 209, 0.5), 0 1px 4px rgba(0, 0, 0, 0.6);
        }

        /* ====== レスポンシブ ====== */
        @media (max-width: 600px) {
            h1 {
                font-size: 1rem;
            }

            .rain-badge {
                width: 140px;
                height: 46px;
            }

            .rain-badge .badge-label {
                font-size: 0.75rem;
            }

            .ripple-btn {
                width: 150px;
                height: 48px;
            }

            .rain-window-btn {
                width: 160px;
                height: 54px;
            }

            .drop-links-grid {
                grid-template-columns: 1fr;
            }
        }

        @media screen and (max-width: 600px) {
            body {
                font-size: 0.7rem;
            }

            h1,
            h2 {
                font-size: 1rem;
            }

            .wrapper,
            .inner_wrapper {
                width: 95%;
                padding: 10px;
                word-wrap: break-word;
                box-sizing: border-box;
            }

            .grid-table,
            .grid-table2 {
                grid-template-columns: 1fr;
            }

            .br-sp {
                display: inline;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="p_left">
            現在位置 : <a href="../index.html">ホーム</a> ＞ <a href="index.htm">Matelial</a> ＞
            <a href="tile.htm"><b>タイル配布</b></a>
        </div>
        <hr />
        <div class="p_left">
            <h1>タイル配布</h1>
            試作したタイルを配布しています。<br />
            <br />
            <h2>木のフローリング敷き詰め（2026-03-29）</h2>
            <table class="tile-table">
                <tr>
                    <td class="tile-cell"><img src="tile/wood_flooring01.png" class="tile"></td>
                    <td>オーソドックスな木のフローリングです。</td>
                </tr>
                <tr>
                    <td class="tile-cell"><img src="tile/wood_flooring02.png" class="tile"></td>
                    <td>オーソドックスな木のフローリングです。</td>
                </tr>
                <tr>
                    <td class="tile-cell"><img src="tile/wood_flooring03.png" class="tile"></td>
                    <td>オーソドックスな木のフローリングです。</td>
                </tr>
                <tr>
                    <td class="tile-cell"><img src="tile/wood_flooring04.png" class="tile"></td>
                    <td>オーソドックスな木のフローリングです。</td>
                </tr>
            </table>
        </div>
        <div style="text-align: center;">
            <a href="index.htm" class="rain-window-btn">
                <canvas data-rainwindow="true"></canvas>
                <span class="rw-label">Back</span>
            </a>
        </div>
    </div>

    <script>
        document.querySelectorAll('img.tile').forEach(img => {
            img.addEventListener('click', () => {
                const wrapper = document.querySelector('.wrapper');
                wrapper.style.backgroundImage = `url('${img.getAttribute('src')}')`;
            });
        });
    </script>

    <script>
        /* ============================================================
           案D: 雨窓 — 常に降る雨粒
           ============================================================ */
        document.querySelectorAll('canvas[data-rainwindow]').forEach(cv => {
            const dpr = window.devicePixelRatio || 1;
            const parent = cv.parentElement;
            const rect = parent.getBoundingClientRect();
            cv.width = rect.width * dpr;
            cv.height = rect.height * dpr;
            const ctx = cv.getContext('2d');
            ctx.scale(dpr, dpr);
            const w = rect.width, h = rect.height;

            const drops = Array.from({ length: 30 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                speed: 0.5 + Math.random() * 1.5,
                len: 4 + Math.random() * 10,
                opacity: 0.15 + Math.random() * 0.35,
                width: 0.5 + Math.random() * 0.8
            }));

            // 水滴の着弾スプラッシュ
            const splashes = [];

            function draw() {
                ctx.clearRect(0, 0, w, h);

                // 雨粒
                drops.forEach(d => {
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x - 0.3, d.y + d.len);
                    ctx.strokeStyle = `rgba(158,200,209,${d.opacity})`;
                    ctx.lineWidth = d.width;
                    ctx.stroke();
                    d.y += d.speed;
                    if (d.y > h) {
                        splashes.push({ x: d.x, y: h - 2, r: 0, opacity: 0.4 });
                        d.y = -d.len - Math.random() * 20;
                        d.x = Math.random() * w;
                    }
                });

                // スプラッシュ
                splashes.forEach(s => {
                    s.r += 0.3;
                    s.opacity -= 0.015;
                    if (s.opacity <= 0) return;
                    ctx.beginPath();
                    ctx.ellipse(s.x, s.y, s.r * 1.5, s.r * 0.5, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(158,200,209,${s.opacity})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                });

                // 古いスプラッシュを除去
                while (splashes.length > 0 && splashes[0].opacity <= 0) splashes.shift();

                requestAnimationFrame(draw);
            }
            draw();
        });
    </script>
    <!-- jQuery（先） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- Lightbox2（後） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
</body>

</html>
