                  <th className="py-2 pr-4">Status</th>
                  <th className="py-2 pr-4">Value</th>
                  <th className="py-2 pr-4">Stability</th>
                  <th className="py-2">Notes</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i} className="border-b border-slate-900 align-top">
                    <td className="py-2 pr-4 font-medium">{r.method}</td>
                    <td className="py-2 pr-4">{r.status}</td>
                    <td className="py-2 pr-4">{formatNum(r.value)}</td>
                    <td className="py-2 pr-4">{typeof r.stability === 'number' ? formatNum(r.stability, 4) : (r.stability ?? '—')}</td>
                    <td className="py-2">{r.notes || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="flex flex-wrap gap-2">
            {["Sequence", "Skeleton", "ExpCutoff", "Window", "Compare", "Cesaro", "Abel"].map(name => (
              <button key={name} className={`px-4 py-2 rounded-xl border ${tab === name ? 'bg-cyan-500 text-slate-950 border-cyan-400' : 'bg-slate-900 border-slate-700 text-slate-200'}`} onClick={() => setTab(name)}>{name}</button>
            ))}
          </div>

          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 h-[420px]">
            {tab === "Sequence" && (
              <SimpleScatterChart data={scatterData} xKey="n" yKey="a" />
            )}
            {tab === "Skeleton" && (
              <SimpleLineChart
                data={skeletonData}
                xKey="n"
                lines={[
                  { key: 'seq', label: 'a_n', color: '#22d3ee' },
                  { key: 'skeleton', label: 'b_n', color: '#a78bfa' },
                  { key: 'residual', label: 'e_n', color: '#f59e0b' },
                ]}
              />
            )}
            {tab === "ExpCutoff" && (
              <SimpleLineChart
                data={expData}
                xKey="eps"
                lines={[
                  { key: 'sEps', label: 'S(eps)', color: '#22d3ee' },
                  { key: 'fitted', label: 'fitted', color: '#f472b6' },
                ]}
              />
            )}
            {tab === "Window" && bundle && (
              <SimpleLineChart
                data={bundle.results.find(r => r.method === 'window')?.details?.curve || []}
                xKey="N"
                lines={[
                  { key: 'S', label: 'windowed sum', color: '#22d3ee' },
                  { key: 'fitted', label: 'fitted', color: '#a78bfa' },
                ]}
              />
            )}
            {tab === "Compare" && bundle && (
              <div className="h-full overflow-auto">
                <div className="grid md:grid-cols-2 gap-4">
                  {bundle.results.filter(r => r.status === "success").map((r, i) => (
                    <div key={i} className="bg-slate-950 border border-slate-800 rounded-2xl p-4">
                      <div className="font-semibold">{r.method}</div>
                      <div className="text-2xl mt-2">{formatNum(r.value)}</div>
                      <div className="text-slate-400 mt-2">stability: {typeof r.stability === 'number' ? formatNum(r.stability, 4) : r.stability}</div>
                      <div className="text-xs text-slate-500 mt-2">{r.notes.join('; ') || '—'}</div>
                    </div>
                  ))}
                  <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4">
                    <div className="font-semibold">ensemble</div>
                    <div className="text-2xl mt-2">{formatNum(bundle.ensemble.median)}</div>
                    <div className="text-slate-400 mt-2">agreement: {bundle.ensemble.agreement || '—'}</div>
                    <div className="text-xs text-slate-500 mt-2">{(bundle.ensemble.agreement === 'insufficient' || bundle.ensemble.maxDeviation == null)
                        ? 'only one successful method'
                        : `max deviation: ${formatNum(bundle.ensemble.maxDeviation, 6)}`}</div>
                  </div>
                </div>
              </div>
            )}
            {tab === "Cesaro" && bundle && (
              <SimpleLineChart
                data={bundle.results.find(r => r.method === 'cesaro')?.details?.partials || []}
                xKey="n"
                lines={[
                  { key: 'partial', label: 'partial sum', color: '#22d3ee' },
                  { key: 'cesaro', label: 'cesaro mean', color: '#34d399' },
                ]}
              />
            )}
            {tab === "Abel" && bundle && (
              <SimpleLineChart
                data={bundle.results.find(r => r.method === 'abel')?.details?.curve || []}
                xKey="x"
                lines={[
                  { key: 'A', label: 'A(x)', color: '#60a5fa' },
                  { key: 'fitted', label: 'fitted', color: '#f472b6' },
                ]}
              />
            )}
          </div>

          <details className="bg-slate-900 border border-slate-800 rounded-2xl p-4" open>
            <summary className="cursor-pointer font-semibold">Diagnostics & Warnings</summary>
            <ul className="mt-3 space-y-2 text-sm text-slate-300 list-disc pl-5">
              {(bundle?.diagnostics || ["No diagnostics yet"]).map((d, i) => <li key={i}>{d}</li>)}
            </ul>
            {bundle && (
              <div className="mt-4 text-sm text-slate-400">
                skeleton type: <span className="text-slate-200">{bundle.modelDetection.type}</span>
                {bundle.modelDetection.type === 'quasiPolynomial' && ` / period=${bundle.modelDetection.period} / degree=${bundle.modelDetection.degree}`}
                {bundle.modelDetection.type === 'powerLaw' && ` / exponent=${formatNum(bundle.modelDetection.exponent, 8)}`}
                {bundle.modelDetection.type === 'fourier' && ` / peaks=${bundle.modelDetection.numPeaks} / ω1=${formatNum(bundle.modelDetection.peaks?.[0]?.frequency, 6)} / amp1=${formatNum(bundle.modelDetection.peaks?.[0]?.amplitude, 6)} / dc=${formatNum(bundle.modelDetection.dcComponent, 6)}`}
              </div>
            )}
          </details>

          <div className="flex flex-wrap gap-3">
            <button className="bg-violet-400 text-slate-950 rounded-xl px-4 py-2 font-semibold" onClick={() => {
              try {
                const results = runBuiltInTests(settings);
                setTestResults(results);
                setError('');
              } catch (err) {
                setError(String(err.message || err));
              }
            }}>Run Built-in Tests</button>
            <button className="bg-emerald-400 text-slate-950 rounded-xl px-4 py-2 font-semibold" onClick={() => bundle && download("regsum-analysis.json", exportBundle(bundle))}>Export JSON</button>
          </div>

          {bundle && (
            <div className="grid md:grid-cols-2 gap-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
                <h3 className="font-semibold text-slate-100 mb-3">Hurwitz details</h3>
                <div className="text-sm text-slate-300">status: {hurwitzResult?.status || '—'}</div>
                <div className="text-sm text-slate-300 mt-2">value: {formatNum(hurwitzResult?.value)}</div>
                <div className="text-sm text-slate-300 mt-2">path: {hurwitzResult?.details?.exactForm || '—'}</div>
                {hurwitzResult?.details?.residueBreakdown?.length ? (
                  <div className="mt-3 overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead><tr className="text-left text-slate-400"><th className="py-1">residue</th><th className="py-1">contribution</th></tr></thead>
                      <tbody>
                        {hurwitzResult.details.residueBreakdown.map((x, i) => (
                          <tr key={i} className="border-t border-slate-800"><td className="py-1">{x.residue}</td><td className="py-1">{formatNum(x.contribution, 8)}</td></tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ) : null}
              </div>
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
                <h3 className="font-semibold text-slate-100 mb-3">Exp Cutoff details</h3>
                <div className="text-sm text-slate-300">status: {expResult?.status || '—'}</div>
                <div className="text-sm text-slate-300 mt-2">value: {formatNum(expResult?.value)}</div>
                {bundle?.modelDetection?.type === 'fourier' && (
                  <div className="text-xs text-amber-300 mt-2">fourier骨格ではこのExp Cutoffはまだ一般基底フィットなので、Abel優先で読むのがおすすめです。</div>
                )}
                <div className="text-sm text-slate-300 mt-2">fit error: {formatNum(expResult?.details?.fitError, 6)}</div>
                <div className="text-sm text-slate-300 mt-2">condition #: {formatNum(expResult?.details?.conditionNumber, 6)}</div>
                {bundle?.results?.find(r => r.method === 'abel')?.details?.chosen && (
                  <div className="text-xs text-slate-400 mt-2">Abel choice: {bundle.results.find(r => r.method === 'abel').details.chosen}</div>
                )}
                <div className="mt-3 overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead><tr className="text-left text-slate-400"><th className="py-1">basis</th><th className="py-1">coeff</th></tr></thead>
                    <tbody>
                      {(expResult?.details?.divergentTerms || []).map((x, i) => (
                        <tr key={i} className="border-t border-slate-800"><td className="py-1">{x.basis}</td><td className="py-1">{formatNum(x.coeff, 8)}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {testResults.length > 0 && (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 overflow-x-auto">
              <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
                <h2 className="text-xl font-semibold">Built-in Tests</h2>
                <div className="text-sm text-slate-300">PASS {testSummary.passed} / {testSummary.total}</div>
              </div>
              <div className="flex flex-wrap gap-2 mb-4">
                <button className={`px-3 py-1 rounded-lg border ${testFilter === 'all' ? 'bg-cyan-500 text-slate-950 border-cyan-400' : 'bg-slate-950 border-slate-700 text-slate-200'}`} onClick={() => setTestFilter('all')}>all</button>
                {Object.keys(testSummary.byCategory).map(cat => (
                  <button key={cat} className={`px-3 py-1 rounded-lg border ${testFilter === cat ? 'bg-cyan-500 text-slate-950 border-cyan-400' : 'bg-slate-950 border-slate-700 text-slate-200'}`} onClick={() => setTestFilter(cat)}>
                    {cat} ({testSummary.byCategory[cat].passed}/{testSummary.byCategory[cat].total})
                  </button>
                ))}
              </div>
              <table className="w-full text-sm mb-4">
                <thead>
                  <tr className="text-left border-b border-slate-800 text-slate-300">
                    <th className="py-2 pr-4">ID</th>
                    <th className="py-2 pr-4">Category</th>
                    <th className="py-2 pr-4">Expr</th>
                    <th className="py-2 pr-4">Method</th>
                    <th className="py-2 pr-4">Expected</th>
                    <th className="py-2 pr-4">Actual</th>
                    <th className="py-2 pr-4">Error</th>
                    <th className="py-2 pr-4">Tol</th>
                    <th className="py-2">Pass</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredTests.map((t, i) => (
                    <tr key={i} className="border-b border-slate-900">
                      <td className="py-2 pr-4 font-medium">{t.id}</td>
                      <td className="py-2 pr-4 text-slate-400">{t.category || 'other'}</td>
                      <td className="py-2 pr-4">{t.expr}</td>
                      <td className="py-2 pr-4">{t.method}</td>
                      <td className="py-2 pr-4">{typeof t.expected === 'string' ? t.expected : formatNum(t.expected, 8)}</td>
                      <td className="py-2 pr-4">{typeof t.actual === 'string' ? t.actual : formatNum(t.actual, 8)}</td>
                      <td className="py-2 pr-4">{Number.isFinite(t.error) ? formatNum(t.error, 6) : '—'}</td>
                      <td className="py-2 pr-4">{t.method === 'modelType' ? '—' : formatNum(t.tol, 3)}</td>
                      <td className={`py-2 font-semibold ${t.pass ? 'text-emerald-400' : 'text-rose-400'}`}>{t.pass ? 'PASS' : 'FAIL'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="grid md:grid-cols-3 gap-3">
                {Object.entries(testSummary.byCategory).map(([cat, stat]) => (
                  <div key={cat} className="bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm">
                    <div className="font-medium text-slate-100">{cat}</div>
                    <div className="text-slate-400 mt-1">{stat.passed} / {stat.total} passed</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 text-sm text-slate-400">
            <div className="font-semibold text-slate-200 mb-2">この試作版に含めたもの</div>
            <ul className="list-disc pl-5 space-y-1">
              <li>安全寄りの式パーサと数列生成</li>
              <li>準多項式検出と soft quasi acceptance</li>
              <li>単項の非整数冪の power-law 検出</li>
              <li>軽量な extended skeleton 検出（log(n), n log n）</li>
              <li>single-frequency と軽量 multi-peak Fourier 骨格検出</li>
              <li>Hurwitz/Bernoulli と functional equation による exact-ish ルート</li>
              <li>Exp Cutoff の骨格差し引き residual fit と extended-aware 基底</li>
              <li>Cesàro / Abel と適用可否判定</li>
              <li>Summary Table / Plot / JSON Export-Import</li>
              <li>カテゴリ別 Built-in Tests（extended 系ステータス検証を含む）</li>
            </ul>
            <div className="font-semibold text-slate-200 mt-4 mb-2">読み方ガイド</div>
            <ul className="list-disc pl-5 space-y-1">
              <li><span className="text-slate-200">exact-ish</span>: 閉形式または解析接続寄り。まず最優先で読む候補です。</li>
              <li><span className="text-slate-200">0.9 以上の stability</span>: 数値的にはかなり安定。複数手法が一致していれば強いです。</li>
              <li><span className="text-slate-200">condition number が極端に高い</span>: 値は出ても不安定なことがあります。Notes と Diagnostics を優先して読んでください。</li>
              <li><span className="text-slate-200">not_applicable</span>: 失敗ではなく、むしろ誠実な応答です。</li>
              <li><span className="text-slate-200">ensemble</span>: 補助的な要約です。個別手法の行を必ず優先してください。</li>
              <li><span className="text-slate-200">dcEstimate</span>: bounded な Fourier 系で DC 成分が強いときの時間平均候補です。stability は窓ごとの平均の揺れから見積もります。</li>
            </ul>
            <div className="font-semibold text-slate-200 mt-4 mb-2">まだ未実装</div>
            <ul className="list-disc pl-5 space-y-1">
              <li>軽量な model-aware Window regularization</li>
              <li>より厳密な multi-peak / DC-dominant Fourier skeletons</li>
              <li>より広い extended skeletons（power-log 混合など）と専用正則化</li>
              <li>より賢い Ensemble weighting</li>
              <li>フーリエ骨格検出</li>
              <li>完全なテスト自動実行 UI と回帰テスト保存</li>
            </ul>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
